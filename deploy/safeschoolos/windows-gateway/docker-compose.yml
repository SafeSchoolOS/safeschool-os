# SafeSchoolOS Windows Gateway
# Gateway mode: EdgeRuntime sync engine only, no local SafeSchool app
# Syncs edge device data to SafeSchool cloud
#
# Usage: docker compose up -d

services:
  edgeruntime:
    image: ghcr.io/bwattendorf/edgeruntime:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8470}:8470"
    volumes:
      - edgeruntime-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - EDGERUNTIME_DATA_DIR=/app/data
      - EDGERUNTIME_API_PORT=8470
      - EDGERUNTIME_CONFIG=/app/config.yaml
      - EDGERUNTIME_SITE_ID=${SITE_ID:-}
      - EDGERUNTIME_CLOUD_SYNC_KEY=${CLOUD_SYNC_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8470/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  edgeruntime-data:
