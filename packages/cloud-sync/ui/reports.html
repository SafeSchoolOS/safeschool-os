<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports & Data Export</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #8b5cf6; --accent-hover: #7c3aed; --accent-dim: rgba(139,92,246,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; padding: 1.5rem; overflow-y: auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.title { font-size: 1.25rem; font-weight: 700; }
.subtitle { color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
.stat-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.blue { color: var(--blue); }
.stat-value.purple { color: var(--purple); }
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
.tab { padding: 0.6rem 1.25rem; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.btn { padding: 0.4rem 0.9rem; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; border-radius: 4px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.6rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); border-bottom: 1px solid var(--border); }
td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
tr:hover { background: var(--bg2); }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
.badge-complete { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-running { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-scheduled { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-pdf { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-csv { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-excel { background: rgba(59,130,246,0.15); color: var(--blue); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.template-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; transition: border-color 0.15s; }
.template-card:hover { border-color: var(--accent); }
.template-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 0.75rem; }
.form-row { margin-bottom: 0.75rem; }
.form-label { display: block; font-size: 0.8rem; color: var(--text3); margin-bottom: 0.25rem; }
.form-input { width: 100%; padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; outline: none; }
.form-input:focus { border-color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
select.filter { padding: 0.4rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; outline: none; appearance: none; padding-right: 24px; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5'%3e%3cpath d='M0 0l4 5 4-5z' fill='%235a5c72'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; }
.progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 0.5rem; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; loadData(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  var currentTab = 'generate';
  var reportHistory = [];
  var scheduledReports = [];

  var TEMPLATES = [
    { id: 'access-summary', name: 'Access Summary', description: 'Daily/weekly/monthly summary of all access events including grants, denials, and anomalies.', icon: 'A', color: 'var(--blue)' },
    { id: 'door-activity', name: 'Door Activity', description: 'Detailed door-by-door activity report with open/close counts, held-open events, and forced entries.', icon: 'D', color: 'var(--green)' },
    { id: 'visitor-log', name: 'Visitor Log', description: 'Complete visitor check-in/check-out log with host details, badge assignments, and duration.', icon: 'V', color: 'var(--purple)' },
    { id: 'cardholder-audit', name: 'Cardholder Audit', description: 'Credential lifecycle audit: issuances, suspensions, revocations, and access zone changes.', icon: 'C', color: 'var(--amber)' },
    { id: 'compliance', name: 'Compliance Report', description: 'Regulatory compliance report covering lockdown drills, response times, and Alyssa\'s Law metrics.', icon: 'R', color: 'var(--red)' },
    { id: 'incident-summary', name: 'Incident Summary', description: 'Incident report with resolution times, severity distribution, and trend analysis.', icon: 'I', color: '#ec4899' },
  ];

  var FORMATS = ['PDF', 'CSV', 'Excel'];
  var SCHEDULES = ['Daily', 'Weekly', 'Monthly'];

  function genHistory() {
    var items = [];
    var names = ['Access Summary - March 2026', 'Door Activity Report - Week 10', 'Visitor Log - March 14', 'Cardholder Audit - Q1 2026',
      'Compliance Report - February 2026', 'Incident Summary - March', 'Access Summary - February 2026', 'Door Activity Report - Week 9',
      'Visitor Log - March 7', 'Compliance Report - January 2026', 'Cardholder Audit - February', 'Access Summary - January 2026',
      'Incident Summary - February', 'Door Activity Report - Week 8', 'Visitor Log - February 28'];
    var formats = ['PDF', 'CSV', 'Excel', 'PDF', 'PDF', 'CSV', 'PDF', 'Excel', 'CSV', 'PDF', 'PDF', 'CSV', 'Excel', 'PDF', 'CSV'];
    var sizes = ['2.4 MB', '856 KB', '1.1 MB', '4.2 MB', '3.8 MB', '512 KB', '2.1 MB', '1.8 MB', '445 KB', '3.5 MB', '2.9 MB', '678 KB', '1.5 MB', '1.9 MB', '389 KB'];
    var statuses = ['Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete', 'Complete'];

    for (var i = 0; i < 15; i++) {
      var daysAgo = i * 2 + Math.floor(Math.random() * 3);
      items.push({
        id: 'RPT-' + String(3001 + i),
        name: names[i],
        generatedAt: new Date(Date.now() - daysAgo * 86400000).toISOString(),
        format: formats[i],
        size: sizes[i],
        status: statuses[i],
        templateId: TEMPLATES[i % TEMPLATES.length].id,
      });
    }
    return items;
  }

  function genScheduled() {
    return [
      { id: 'SCHED-1', name: 'Daily Access Summary', schedule: 'Daily', nextRun: new Date(Date.now() + 12 * 3600000).toISOString(), recipients: 'security-team@company.com', format: 'PDF', templateId: 'access-summary' },
      { id: 'SCHED-2', name: 'Weekly Door Activity', schedule: 'Weekly', nextRun: new Date(Date.now() + 3 * 86400000).toISOString(), recipients: 'facilities@company.com', format: 'Excel', templateId: 'door-activity' },
      { id: 'SCHED-3', name: 'Monthly Compliance', schedule: 'Monthly', nextRun: new Date(Date.now() + 16 * 86400000).toISOString(), recipients: 'compliance@company.com, admin@company.com', format: 'PDF', templateId: 'compliance' },
      { id: 'SCHED-4', name: 'Weekly Visitor Summary', schedule: 'Weekly', nextRun: new Date(Date.now() + 5 * 86400000).toISOString(), recipients: 'frontdesk@company.com', format: 'CSV', templateId: 'visitor-log' },
      { id: 'SCHED-5', name: 'Monthly Incident Report', schedule: 'Monthly', nextRun: new Date(Date.now() + 20 * 86400000).toISOString(), recipients: 'security-director@company.com', format: 'PDF', templateId: 'incident-summary' },
    ];
  }

  reportHistory = genHistory();
  scheduledReports = genScheduled();

  async function loadData() {
    try {
      var res = await api('GET', '/api/v1/data/reports?limit=50');
      if (res && (res.reports || res.entities) && (res.reports || res.entities).length > 0) {
        reportHistory = (res.reports || res.entities).map(function(r) {
          var d = r.data || r;
          return { id: d.id || r.id, name: d.name || '', generatedAt: d.generatedAt || r.createdAt, format: d.format || 'PDF', size: d.size || '-', status: d.status || 'Complete', templateId: d.templateId || '' };
        });
      }
    } catch(e) {}
    render();
  }

  function formatDate(ts) {
    if (!ts) return '-';
    var d = new Date(ts);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function render() {
    var totalGenerated = reportHistory.length;
    var scheduledCount = scheduledReports.length;
    var templateCount = TEMPLATES.length;

    var html = '';
    html += '<div class="header"><div><div class="title">Reports & Data Export</div>';
    html += '<div class="subtitle">Generate, schedule, and download security reports. ReportsAdapter interface.</div></div></div>';

    html += '<div class="stats">';
    html += '<div class="stat"><div class="stat-label">Reports Generated</div><div class="stat-value blue">' + totalGenerated + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Scheduled Reports</div><div class="stat-value purple">' + scheduledCount + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Templates</div><div class="stat-value green">' + templateCount + '</div></div>';
    html += '</div>';

    html += '<div class="tabs">';
    var tabs = [
      { key: 'generate', label: 'Generate Report' },
      { key: 'scheduled', label: 'Scheduled (' + scheduledCount + ')' },
      { key: 'history', label: 'History (' + totalGenerated + ')' }
    ];
    tabs.forEach(function(t) {
      html += '<button class="tab' + (currentTab === t.key ? ' active' : '') + '" data-tab="' + t.key + '">' + t.label + '</button>';
    });
    html += '</div>';

    if (currentTab === 'generate') {
      html += renderGenerateTab();
    } else if (currentTab === 'scheduled') {
      html += renderScheduledTab();
    } else {
      html += renderHistoryTab();
    }

    document.getElementById('app').innerHTML = html;

    // Bind
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() { currentTab = this.dataset.tab; render(); });
    });
    document.querySelectorAll('.gen-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tmplId = this.dataset.template;
        var tmpl = TEMPLATES.find(function(t) { return t.id === tmplId; });
        if (!tmpl) return;
        var card = this.closest('.template-card');
        var format = card.querySelector('.format-select') ? card.querySelector('.format-select').value : 'PDF';
        var newReport = {
          id: 'RPT-' + Date.now(),
          name: tmpl.name + ' - ' + new Date().toLocaleDateString(),
          generatedAt: new Date().toISOString(),
          format: format,
          size: (Math.random() * 4 + 0.5).toFixed(1) + ' MB',
          status: 'Complete',
          templateId: tmplId,
        };
        reportHistory.unshift(newReport);
        currentTab = 'history';
        render();
      });
    });
    document.querySelectorAll('.dl-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        // Simulated download
        this.textContent = 'Downloaded';
        this.disabled = true;
      });
    });
  }

  function renderGenerateTab() {
    var html = '<div class="template-grid">';
    var today = new Date().toISOString().split('T')[0];
    var weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

    TEMPLATES.forEach(function(t) {
      html += '<div class="template-card">';
      html += '<div class="template-icon" style="background:' + t.color + '22;color:' + t.color + '">' + t.icon + '</div>';
      html += '<div style="font-weight:700;margin-bottom:0.375rem">' + esc(t.name) + '</div>';
      html += '<div style="font-size:0.8rem;color:var(--text2);margin-bottom:0.75rem;line-height:1.4">' + esc(t.description) + '</div>';

      html += '<div class="form-grid" style="margin-bottom:0.75rem">';
      html += '<div class="form-row"><label class="form-label">From</label><input class="form-input" type="date" value="' + weekAgo + '"></div>';
      html += '<div class="form-row"><label class="form-label">To</label><input class="form-input" type="date" value="' + today + '"></div>';
      html += '</div>';

      html += '<div style="display:flex;gap:0.5rem;align-items:center">';
      html += '<select class="filter format-select" style="flex:1">';
      FORMATS.forEach(function(f) { html += '<option>' + f + '</option>'; });
      html += '</select>';
      html += '<button class="btn btn-accent gen-btn" data-template="' + t.id + '">Generate</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderScheduledTab() {
    var html = '<table><thead><tr>';
    html += '<th>Name</th><th>Schedule</th><th>Format</th><th>Next Run</th><th>Recipients</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    scheduledReports.forEach(function(s) {
      var formatClass = 'badge-' + s.format.toLowerCase();
      html += '<tr>';
      html += '<td style="font-weight:600">' + esc(s.name) + '</td>';
      html += '<td><span class="badge badge-scheduled">' + esc(s.schedule) + '</span></td>';
      html += '<td><span class="badge ' + formatClass + '">' + esc(s.format) + '</span></td>';
      html += '<td style="font-size:0.8rem;color:var(--text2)">' + formatDate(s.nextRun) + '</td>';
      html += '<td style="font-size:0.8rem;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.recipients) + '</td>';
      html += '<td><button class="btn btn-sm btn-outline">Edit</button> <button class="btn btn-sm btn-outline" style="border-color:var(--red);color:var(--red)">Delete</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  function renderHistoryTab() {
    var html = '<table><thead><tr>';
    html += '<th>Name</th><th>Generated</th><th>Format</th><th>Size</th><th>Status</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    reportHistory.forEach(function(r) {
      var formatClass = 'badge-' + r.format.toLowerCase();
      var statusClass = r.status === 'Complete' ? 'badge-complete' : r.status === 'Running' ? 'badge-running' : 'badge-failed';
      html += '<tr>';
      html += '<td style="font-weight:600">' + esc(r.name) + '</td>';
      html += '<td style="font-size:0.8rem;color:var(--text2)">' + formatDate(r.generatedAt) + '</td>';
      html += '<td><span class="badge ' + formatClass + '">' + esc(r.format) + '</span></td>';
      html += '<td style="font-size:0.8rem;color:var(--text2)">' + esc(r.size) + '</td>';
      html += '<td><span class="badge ' + statusClass + '">' + esc(r.status) + '</span></td>';
      html += '<td><button class="btn btn-sm btn-outline dl-btn">Download</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  loadData();
})();
</script>
</body>
</html>
