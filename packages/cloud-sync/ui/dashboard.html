  // ─── CORRELATION Section (GSOC) ──────────────────────────────
  async function loadCorrelation() {
    var data = await fetchAnalyticsData(500);
    renderCorrelation(data);
  }
  function renderCorrelation(data) {
    var events = (data && data.events) || [];
    // Find correlated event clusters (events at same door within 2 minutes)
    var clusters = [];
    var doorGroups = {};
    events.forEach(function(e) {
      var key = e.doorName || e.doorId || 'unknown';
      if (!doorGroups[key]) doorGroups[key] = [];
      doorGroups[key].push(e);
    });
    Object.entries(doorGroups).forEach(function(pair) {
      var doorEvents = pair[1].sort(function(a,b){return (a.timestamp||'').localeCompare(b.timestamp||'');});
      for (var i = 0; i < doorEvents.length - 1; i++) {
        var t1 = new Date(doorEvents[i].timestamp).getTime();
        var t2 = new Date(doorEvents[i+1].timestamp).getTime();
        if (t2 - t1 < 120000 && t2 - t1 > 0) {
          clusters.push({ door: pair[0], event1: doorEvents[i], event2: doorEvents[i+1], gap: Math.round((t2-t1)/1000) });
        }
      }
    });
    var html = '<div class="section-title">Event Correlation</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Identify related events across time and space — detect multi-step attack patterns</p>';
    html += '<div class="stat-cards">';
    html += statCard('Total Events', events.length, '');
    html += statCard('Correlated Clusters', clusters.length, clusters.length > 0 ? 'yellow' : '');
    html += '</div>';
    html += '<table class="data-table"><thead><tr><th>Door</th><th>Event 1</th><th>Event 2</th><th>Gap</th></tr></thead><tbody>';
    if (clusters.length === 0) {
      html += '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);padding:2rem">No correlated event clusters detected</td></tr>';
    } else {
      clusters.slice(0, 30).forEach(function(c) {
        html += '<tr><td>' + esc(c.door) + '</td>';
        html += '<td style="font-size:0.8rem">' + esc(c.event1.type) + ' (' + esc(c.event1.cardholderName || '-') + ')</td>';
        html += '<td style="font-size:0.8rem">' + esc(c.event2.type) + ' (' + esc(c.event2.cardholderName || '-') + ')</td>';
        html += '<td>' + c.gap + 's</td></tr>';
      });
    }
    html += '</tbody></table>';
    document.getElementById('content').innerHTML = html;
  }

  // ─── CREDENTIAL SHARING Section (BadgeGuard) ──────────────────
  async function loadCredentialSharing() {
    var data = await fetchAnalyticsData(500);
    renderCredentialSharing(data);
  }
  function renderCredentialSharing(data) {
    var events = (data && data.events) || [];
    // Detect same credential used with different apparent identities or impossible travel
    var cardUsage = {};
    events.filter(function(e) { return e.type === 'access_granted' && e.cardNumber; }).forEach(function(e) {
      var key = e.cardNumber || e.credentialId || '';
      if (!key) return;
      if (!cardUsage[key]) cardUsage[key] = { card: key, people: new Set(), doors: new Set(), events: [] };
      cardUsage[key].people.add(e.cardholderName || e.cardholderId || 'Unknown');
      cardUsage[key].doors.add(e.doorName || e.doorId || '');
      cardUsage[key].events.push(e);
    });
    var shared = Object.values(cardUsage).filter(function(c) { return c.people.size > 1; });
    // Also detect rapid successive uses at different doors (impossible travel)
    var suspicious = [];
    Object.values(cardUsage).forEach(function(c) {
      var evts = c.events.sort(function(a,b) { return (a.timestamp||'').localeCompare(b.timestamp||''); });
      for (var i = 0; i < evts.length - 1; i++) {
        var gap = (new Date(evts[i+1].timestamp).getTime() - new Date(evts[i].timestamp).getTime()) / 1000;
        if (gap > 0 && gap < 30 && evts[i].doorName !== evts[i+1].doorName) {
          suspicious.push({ card: c.card, door1: evts[i].doorName || evts[i].doorId, door2: evts[i+1].doorName || evts[i+1].doorId, gap: gap, time: evts[i+1].timestamp });
        }
      }
    });
    var html = '<div class="section-title">Credential Sharing Detection</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Detect credentials used by multiple people or impossible travel patterns indicating card sharing</p>';
    html += '<div class="stat-cards">';
    html += statCard('Credentials Analyzed', Object.keys(cardUsage).length, '');
    html += statCard('Shared Credentials', shared.length, shared.length > 0 ? 'red' : 'green');
    html += statCard('Impossible Travel', suspicious.length, suspicious.length > 0 ? 'red' : 'green');
    html += '</div>';
    if (shared.length > 0) {
      html += '<div class="card" style="margin-bottom:1rem"><div style="font-weight:600;margin-bottom:0.5rem;color:var(--danger)">Shared Credentials Detected</div>';
      html += '<table class="data-table"><thead><tr><th>Card</th><th>Users</th><th>Doors Used</th></tr></thead><tbody>';
      shared.forEach(function(s) {
        html += '<tr><td style="font-weight:600">' + esc(s.card) + '</td>';
        html += '<td style="color:var(--danger)">' + Array.from(s.people).map(esc).join(', ') + '</td>';
        html += '<td>' + s.doors.size + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }
    if (suspicious.length > 0) {
      html += '<div class="card"><div style="font-weight:600;margin-bottom:0.5rem;color:var(--danger)">Impossible Travel Alerts</div>';
      html += '<table class="data-table"><thead><tr><th>Card</th><th>Door 1</th><th>Door 2</th><th>Gap</th><th>Time</th></tr></thead><tbody>';
      suspicious.slice(0, 20).forEach(function(s) {
        html += '<tr><td>' + esc(s.card) + '</td><td>' + esc(s.door1) + '</td><td>' + esc(s.door2) + '</td>';
        html += '<td style="color:var(--danger);font-weight:600">' + s.gap.toFixed(0) + 's</td>';
        html += '<td>' + esc(fmtDateTime(s.time)) + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }
    if (shared.length === 0 && suspicious.length === 0) {
      html += '<div class="card" style="text-align:center;color:var(--green,#22c55e);padding:2rem;font-weight:600">No credential sharing detected</div>';
    }
    document.getElementById('content').innerHTML = html;
  }

  // ─── SPACE UTILIZATION Section (BadgeGuard) ──────────────────
  async function loadSpaceUtil() {
    var data = await fetchAnalyticsData(500);
    renderSpaceUtil(data);
  }
  function renderSpaceUtil(data) {
    var events = (data && data.events) || [];
    var doors = (data && data.doors) || [];
    // Calculate per-door access frequency as proxy for space usage
    var doorUsage = {};
    events.filter(function(e) { return e.type === 'access_granted'; }).forEach(function(e) {
      var d = e.doorName || e.doorId || 'Unknown';
      if (!doorUsage[d]) doorUsage[d] = { name: d, accesses: 0, uniquePeople: new Set(), hours: {} };
      doorUsage[d].accesses++;
      doorUsage[d].uniquePeople.add(e.cardholderName || e.cardholderId || '');
      var hr = new Date(e.timestamp).getHours();
      doorUsage[d].hours[hr] = (doorUsage[d].hours[hr] || 0) + 1;
    });
    var spaces = Object.values(doorUsage).sort(function(a,b) { return b.accesses - a.accesses; });
    var totalAccesses = spaces.reduce(function(s,sp) { return s + sp.accesses; }, 0);
    var underused = spaces.filter(function(sp) { return sp.accesses < (totalAccesses / spaces.length * 0.3); });
    var html = '<div class="section-title">Space Utilization</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Analyze room and area usage patterns — identify underutilized and over-capacity spaces</p>';

    html += statCard('Total Accesses', totalAccesses, 'blue');
    html += statCard('Underutilized', underused.length, underused.length > 0 ? 'yellow' : '');
    html += statCard('Avg per Space', spaces.length > 0 ? Math.round(totalAccesses / spaces.length) : 0, '');

    html += '<table class="data-table"><thead><tr><th>Space / Door</th><th>Accesses</th><th>Unique People</th><th>Peak Hour</th><th>Utilization</th></tr></thead><tbody>';
    spaces.slice(0, 30).forEach(function(sp) {
      var peakHr = Object.entries(sp.hours).sort(function(a,b){return b[1]-a[1];})[0];
      var pct = totalAccesses > 0 ? ((sp.accesses / totalAccesses) * 100).toFixed(1) : 0;
      var color = pct > 20 ? 'var(--green,#22c55e)' : pct > 5 ? '#f59e0b' : 'var(--text-secondary)';
      html += '<tr><td style="font-weight:600">' + esc(sp.name) + '</td>';

    });

    document.getElementById('content').innerHTML = html;
  }

  // ─── ANOMALY DETECTION Section (GSOC) ───────────────────────
  async function loadAnomaly() {
    var data = await fetchAnalyticsData(500);
    renderAnomaly(data);
  }
  function renderAnomaly(data) {
    var events = (data && data.events) || [];
    var cardholders = (data && data.cardholders) || [];
    // Build behavioral profiles from events
    var profiles = {};
    events.forEach(function(e) {
      var name = e.cardholderName || e.cardholderId || '';
      if (!name) return;
      if (!profiles[name]) profiles[name] = { name: name, events: 0, hours: {}, doors: new Set(), types: {}, score: 0 };
      profiles[name].events++;
      var hr = new Date(e.timestamp).getHours();
      profiles[name].hours[hr] = (profiles[name].hours[hr] || 0) + 1;
      profiles[name].doors.add(e.doorName || e.doorId || '');
      profiles[name].types[e.type] = (profiles[name].types[e.type] || 0) + 1;
    });
    // Score anomalies: after-hours activity, unusual door access, event type ratios
    Object.values(profiles).forEach(function(p) {
      var afterHours = 0;
      Object.entries(p.hours).forEach(function(pair) {
        var h = parseInt(pair[0]);
        if (h < 6 || h > 20) afterHours += pair[1];
      });
      p.score = Math.min(100, Math.round((afterHours / Math.max(1, p.events)) * 50 + (p.types['access_denied'] || 0) * 10 + (p.types['door_forced_open'] || 0) * 25));
    });
    var sorted = Object.values(profiles).sort(function(a,b) { return b.score - a.score; });
    var anomalous = sorted.filter(function(p) { return p.score > 30; });
    var html = '<div class="section-title">ML Anomaly Detection</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Machine learning behavioral analysis — profile building, pattern detection, real-time anomaly scoring</p>';
    html += '<div class="stat-cards">';
    html += statCard('Profiles Built', Object.keys(profiles).length, '');
    html += statCard('Anomalous Users', anomalous.length, anomalous.length > 0 ? 'red' : 'green');
    html += statCard('Events Analyzed', events.length, 'blue');
    html += statCard('Model Status', events.length > 100 ? 'Trained' : 'Learning', events.length > 100 ? 'green' : 'yellow');
    html += '</div>';
    html += '<table class="data-table"><thead><tr><th>User</th><th>Events</th><th>Doors</th><th>After-Hours %</th><th>Denials</th><th>Anomaly Score</th></tr></thead><tbody>';
    if (sorted.length === 0) {
      html += '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);padding:2rem">Insufficient data for anomaly detection — need more access events</td></tr>';
    } else {
      sorted.slice(0, 25).forEach(function(p) {
        var afterHours = 0;
        Object.entries(p.hours).forEach(function(pair) { var h = parseInt(pair[0]); if (h < 6 || h > 20) afterHours += pair[1]; });
        var ahPct = p.events > 0 ? ((afterHours / p.events) * 100).toFixed(0) : 0;
        var scoreColor = p.score > 60 ? 'var(--danger)' : p.score > 30 ? '#f59e0b' : 'var(--green,#22c55e)';
        html += '<tr><td style="font-weight:600">' + esc(p.name) + '</td>';
        html += '<td>' + p.events + '</td>';
        html += '<td>' + p.doors.size + '</td>';
        html += '<td>' + ahPct + '%</td>';
        html += '<td>' + (p.types['access_denied'] || 0) + '</td>';
        html += '<td style="color:' + scoreColor + ';font-weight:700">' + p.score + '</td></tr>';
      });
    }
    html += '</tbody></table>';
    document.getElementById('content').innerHTML = html;
  }

  // ─── ANTI-PASSBACK Section ───────────────────────────────────
  async function loadAntiPassback() {
    var data = await fetchAnalyticsData(500);
    renderAntiPassback(data);
  }
  function renderAntiPassback(data) {
    var events = (data && data.events) || [];
    var doors = (data && data.doors) || [];
    // Detect passback: same card used at same door without an exit event
    var violations = [];
    var lastEntry = {};
    events.filter(function(e){return e.type==='access_granted';}).forEach(function(e) {
      var key = (e.cardholderName||e.cardholderId||'') + '|' + (e.doorName||e.doorId||'');
      if (lastEntry[key]) {
        var gap = (new Date(e.timestamp).getTime() - new Date(lastEntry[key].timestamp).getTime()) / 1000;
        if (gap > 0 && gap < 300) violations.push({ person: e.cardholderName||e.cardholderId, door: e.doorName||e.doorId, gap: Math.round(gap), time: e.timestamp });
      }
      lastEntry[key] = e;
    });
    var html = '<div class="section-title">Anti-Passback</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Prevent credential passback — detect when a badge is used to enter without a corresponding exit event</p>';
    html += '<div class="stat-cards">';
    html += statCard('Doors Monitored', doors.length, '');
    html += statCard('Violations', violations.length, violations.length > 0 ? 'red' : 'green');
    html += statCard('Mode', 'Soft (Log Only)', 'blue');
    html += '</div>';
    var modes = [
      { name: 'Soft Anti-Passback', desc: 'Log violation but allow access — for monitoring phase', active: true },
      { name: 'Hard Anti-Passback', desc: 'Deny access on passback violation — enforced mode', active: false },
      { name: 'Timed Anti-Passback', desc: 'Allow re-entry after configurable timeout period', active: false },
      { name: 'Area Anti-Passback', desc: 'Track in/out across paired entry/exit doors per zone', active: false },
    ];
    html += '<table class="data-table"><thead><tr><th>Mode</th><th>Description</th><th>Status</th></tr></thead><tbody>';
    modes.forEach(function(m) {
      html += '<tr><td style="font-weight:600">' + esc(m.name) + '</td>';
      html += '<td style="font-size:0.85rem;color:var(--text-secondary)">' + esc(m.desc) + '</td>';
      html += '<td style="color:' + (m.active ? 'var(--green,#22c55e)' : 'var(--text-secondary)') + '">' + (m.active ? 'Active' : 'Inactive') + '</td></tr>';
    });
    html += '</tbody></table>';
    if (violations.length > 0) {
      html += '<div style="margin-top:1rem"><strong>Recent Violations</strong></div>';
      html += '<table class="data-table"><thead><tr><th>Person</th><th>Door</th><th>Re-entry Gap</th><th>Time</th></tr></thead><tbody>';
      violations.slice(0,20).forEach(function(v) {
        html += '<tr><td>' + esc(v.person) + '</td><td>' + esc(v.door) + '</td>';
        html += '<td style="color:var(--danger);font-weight:600">' + v.gap + 's</td>';
        html += '<td>' + esc(fmtDateTime(v.time)) + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    document.getElementById('content').innerHTML = html;
  }
