<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1d2e;
  --bg-tertiary: #242840;
  --border: #2e3348;
  --text-primary: #e4e6f0;
  --text-secondary: #8b8fa3;
  --accent: #00ff88;
  --accent-hover: #33ffaa;
  --accent-dim: rgba(0,255,136,0.15);
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #3b82f6;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }

/* Login */
.login-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); z-index: 1000; }
.login-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 360px; }
.login-box h1 { font-size: 1.25rem; margin-bottom: 0.25rem; color: var(--accent); }
.login-box p { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.5rem; }
.login-box label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
.login-box input { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 0.9rem; margin-bottom: 1rem; outline: none; }
.login-box input:focus { border-color: var(--accent); }
.login-box .btn-login { width: 100%; padding: 0.6rem; background: var(--accent); color: #0f0f23; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; }
.login-box .btn-login:hover { background: var(--accent-hover); }
.login-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 0.5rem; display: none; }
.login-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; color: var(--text-secondary); font-size: 0.8rem; }
.login-divider::before, .login-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }
.oauth-buttons { display: flex; flex-direction: column; gap: 0.5rem; display: none; }
.oauth-buttons.visible { display: flex; }
.btn-oauth { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-tertiary); color: var(--text-primary); font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
.btn-oauth:hover { background: var(--border); }
.btn-oauth svg { width: 18px; height: 18px; flex-shrink: 0; }

/* App layout */
.app { display: none; height: 100vh; flex-direction: column; }
.app.visible { display: flex; }

/* Top bar */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 48px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 1.5rem; }
.topbar-left h1 { font-size: 1rem; font-weight: 600; color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 0.75rem; }

/* Nav bar */
.navbar { display: flex; gap: 0; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 1rem; flex-shrink: 0; overflow-x: auto; }
.nav-btn { padding: 0.6rem 1rem; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
.nav-btn:hover { color: var(--text-primary); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Content area */
.content { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }

/* Buttons */
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }
.btn-sm:hover { background: var(--border); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #0f0f23; font-weight: 600; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-warning { background: var(--warning); border-color: var(--warning); color: #0f0f23; }

/* Stat cards */
.stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
.stat-card .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.5rem; }
.stat-card .stat-value { font-size: 1.75rem; font-weight: 700; }
.stat-card .stat-value.green { color: var(--success); }
.stat-card .stat-value.red { color: var(--danger); }
.stat-card .stat-value.yellow { color: var(--warning); }
.stat-card .stat-value.blue { color: var(--info); }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th { text-align: left; padding: 0.5rem 0.75rem; color: var(--text-secondary); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-primary); }
.data-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
.data-table tr:hover td { background: var(--bg-secondary); }
.data-table tr.selected td { background: var(--bg-tertiary); }

/* Status dots */
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.4rem; vertical-align: middle; }
.dot-green { background: var(--success); box-shadow: 0 0 4px var(--success); }
.dot-red { background: var(--danger); }
.dot-yellow { background: var(--warning); }
.dot-gray { background: var(--text-secondary); }
.dot-blue { background: var(--info); }

/* Badges */
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
.badge-idle { background: var(--bg-tertiary); color: var(--text-secondary); }
.badge-pending { background: #78350f; color: #fbbf24; }
.badge-progress { background: #1e3a5f; color: #60a5fa; }
.badge-success { background: #14532d; color: #4ade80; }
.badge-failed { background: #450a0a; color: #f87171; }
.badge-new { background: #450a0a; color: #f87171; }
.badge-acknowledged { background: #78350f; color: #fbbf24; }
.badge-resolved { background: #14532d; color: #4ade80; }
.badge-critical { background: #450a0a; color: #f87171; }
.badge-high { background: #78350f; color: #fbbf24; }
.badge-medium { background: #1e3a5f; color: #60a5fa; }
.badge-low { background: var(--bg-tertiary); color: var(--text-secondary); }

/* Event colors */
.evt-grant { color: var(--success); }
.evt-deny { color: var(--danger); }
.evt-alarm { color: var(--warning); }

/* Filter bar */
.filter-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
.filter-bar input, .filter-bar select { padding: 0.4rem 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 0.8rem; outline: none; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-bar label { font-size: 0.75rem; color: var(--text-secondary); }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; font-size: 0.8rem; color: var(--text-secondary); }
.pagination .page-btns { display: flex; gap: 0.25rem; }

/* Camera grid */
.cam-grid { display: grid; gap: 0.75rem; }
.cam-grid-1 { grid-template-columns: 1fr; }
.cam-grid-2 { grid-template-columns: repeat(2, 1fr); }
.cam-grid-3 { grid-template-columns: repeat(3, 1fr); }
.cam-grid-4 { grid-template-columns: repeat(4, 1fr); }
.cam-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; }
.cam-card:hover { border-color: var(--accent); }
.cam-card .cam-feed { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
.cam-card .cam-feed img { width: 100%; height: 100%; object-fit: cover; }
.cam-card .cam-feed .cam-overlay { position: absolute; top: 0.5rem; right: 0.5rem; display: flex; align-items: center; gap: 0.35rem; background: rgba(0,0,0,0.6); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; }
.cam-card .cam-info { padding: 0.75rem; }
.cam-card .cam-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.25rem; }
.cam-card .cam-meta { font-size: 0.75rem; color: var(--text-secondary); }

/* Live event feed */
.live-feed { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); max-height: 400px; overflow-y: auto; }
.live-feed-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.live-feed-body { font-size: 0.8rem; }
.live-feed-row { display: flex; gap: 1rem; padding: 0.4rem 1rem; border-bottom: 1px solid rgba(46,51,72,0.5); }
.live-feed-row:hover { background: var(--bg-tertiary); }
.live-feed-time { color: var(--text-secondary); width: 70px; flex-shrink: 0; }

/* Connector mini-cards */
.conn-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
.conn-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem 1rem; }
.conn-card-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 0.25rem; }
.conn-card-meta { font-size: 0.75rem; color: var(--text-secondary); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 500; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 440px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
.modal label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
.modal input, .modal select { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 0.9rem; margin-bottom: 0.75rem; }
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }

/* Section titles */
.section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
.section-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem; }

/* Empty state */
.empty-state { text-align: center; padding: 3rem 2rem; color: var(--text-secondary); }
.empty-state h2 { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.5rem; }

/* Settings inputs */
.settings-input { padding: 0.4rem 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 0.85rem; outline: none; width: 100%; }
.settings-input:focus { border-color: var(--accent); }
.settings-device-btn { transition: all 0.15s; }

/* Fleet detail panel */
.fleet-layout { display: flex; height: 100%; }
.fleet-list { flex: 1; overflow-y: auto; }
.fleet-detail { width: 380px; background: var(--bg-secondary); border-left: 1px solid var(--border); overflow-y: auto; display: none; }
.fleet-detail.open { display: block; }
.detail-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-bottom: 1px solid var(--border); }
.detail-header h2 { font-size: 1rem; font-weight: 600; }
.detail-close { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; padding: 0.25rem; }
.detail-close:hover { color: var(--text-primary); }
.detail-section { padding: 1rem; border-bottom: 1px solid var(--border); }
.detail-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.75rem; }
.detail-row { display: flex; justify-content: space-between; padding: 0.3rem 0; font-size: 0.85rem; }
.detail-row .label { color: var(--text-secondary); }
.detail-row .value { font-weight: 500; }
.detail-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.detail-actions input { flex: 1; padding: 0.4rem 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 0.85rem; }

.cb { width: 16px; height: 16px; accent-color: var(--accent); }
.license-result { margin-top: 0.75rem; padding: 0.75rem; background: var(--bg-tertiary); border-radius: var(--radius); font-family: monospace; font-size: 0.8rem; word-break: break-all; display: none; }

/* Threat cards (BadgeGuard) */
.threat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.threat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; border-left: 4px solid var(--border); }
.threat-card.sev-critical { border-left-color: var(--danger); }
.threat-card.sev-high { border-left-color: var(--warning); }
.threat-card.sev-medium { border-left-color: var(--info); }
.threat-card.sev-low { border-left-color: var(--text-secondary); }
.threat-card .threat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
.threat-card .threat-category { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.threat-card .threat-time { font-size: 0.7rem; color: var(--text-secondary); }
.threat-card .threat-summary { font-size: 0.85rem; margin-bottom: 0.5rem; }
.threat-card .threat-source { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
.threat-card .threat-recs { font-size: 0.75rem; color: var(--text-secondary); padding-left: 1rem; }
.threat-card .threat-recs li { margin-bottom: 0.15rem; }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-overlay" id="loginScreen">
  <div class="login-box">
    <h1 id="loginTitle">GSOC Dashboard</h1>
    <p>Sign in to manage your security operations</p>
    <div class="login-error" id="loginError"></div>
    <label for="loginUser">Username</label>
    <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    <label for="loginPass">Password</label>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="login-divider" id="oauthDivider" style="display:none">or sign in with</div>
    <div class="oauth-buttons" id="oauthButtons">
      <button class="btn-oauth" id="btnGoogle" style="display:none">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn-oauth" id="btnMicrosoft" style="display:none">
        <svg viewBox="0 0 24 24"><rect fill="#F25022" x="1" y="1" width="10" height="10"/><rect fill="#7FBA00" x="13" y="1" width="10" height="10"/><rect fill="#00A4EF" x="1" y="13" width="10" height="10"/><rect fill="#FFB900" x="13" y="13" width="10" height="10"/></svg>
        Microsoft
      </button>
      <button class="btn-oauth" id="btnApple" style="display:none">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Apple
      </button>
    </div>
  </div>
</div>

<!-- App Shell -->
<div class="app" id="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="topbarTitle">GSOC Dashboard</h1>
      <span id="orgLabel" style="color:var(--text-secondary);font-size:0.8rem"></span>
    </div>
    <div class="topbar-right">
      <span style="font-size:0.75rem;color:var(--text-secondary)" id="refreshIndicator"></span>
      <button class="btn-sm" id="btnLogout">Logout</button>
    </div>
  </div>

  <!-- Navigation (dynamically populated based on product) -->
  <div class="navbar" id="navbar"></div>

  <!-- Content -->
  <div class="content" id="content"></div>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <h2 id="userModalTitle">Add User</h2>
    <input type="hidden" id="userModalId">
    <label>Email</label>
    <input type="email" id="userEmail" placeholder="user@example.com">
    <label>Display Name</label>
    <input type="text" id="userName" placeholder="John Doe">
    <label>Role</label>
    <select id="userRole">
      <option value="viewer">Viewer</option>
      <option value="editor">Editor</option>
      <option value="admin">Admin</option>
    </select>
    <div class="modal-actions">
      <button class="btn-sm" id="userModalCancel">Cancel</button>
      <button class="btn-sm btn-accent" id="userModalSave">Save</button>
    </div>
  </div>
</div>

<!-- CSV Import Modal -->
<div class="modal-overlay" id="csvModal">
  <div class="modal">
    <h2>Import Users from CSV</h2>
    <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:1rem">Paste CSV content or upload a file. Required column: email. Optional: name, role.</p>
    <textarea id="csvText" style="width:100%;height:150px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:0.8rem;font-family:monospace;padding:0.5rem;resize:vertical" placeholder="email,name,role&#10;john@example.com,John Doe,viewer"></textarea>
    <div style="margin:0.5rem 0"><input type="file" id="csvFile" accept=".csv" style="font-size:0.8rem"></div>
    <div id="csvResult" style="font-size:0.8rem;margin-top:0.5rem;display:none"></div>
    <div class="modal-actions">
      <button class="btn-sm" id="csvCancel">Cancel</button>
      <button class="btn-sm btn-accent" id="csvImport">Import</button>
    </div>
  </div>
</div>

<!-- License Modal -->
<div class="modal-overlay" id="licenseModal">
  <div class="modal">
    <h2>Generate Activation Key</h2>
    <label for="licProducts">Products (comma-separated)</label>
    <input type="text" id="licProducts" placeholder="badgeguard, safeschool, access-gsoc">
    <label for="licTier">Tier</label>
    <select id="licTier">
      <option value="trial">Trial</option>
      <option value="starter" selected>Starter</option>
      <option value="pro">Pro</option>
      <option value="enterprise">Enterprise</option>
    </select>
    <div class="license-result" id="licResult"></div>
    <div class="modal-actions">
      <button class="btn-sm" id="licClose">Cancel</button>
      <button class="btn-sm btn-accent" id="licGenerate">Generate</button>
    </div>
  </div>
</div>

<!-- Upgrade All Modal -->
<div class="modal-overlay" id="upgradeModal">
  <div class="modal">
    <h2>Upgrade All Devices</h2>
    <label for="upgradeVersion">Target Version</label>
    <input type="text" id="upgradeVersion" placeholder="e.g. 1.2.0">
    <div class="modal-actions">
      <button class="btn-sm" id="upgradeClose">Cancel</button>
      <button class="btn-sm btn-accent" id="upgradeConfirm">Upgrade All</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h2>Confirm Delete</h2>
    <p id="deleteMsg" style="font-size:0.9rem;margin-bottom:1rem"></p>
    <input type="hidden" id="deleteId">
    <div class="modal-actions">
      <button class="btn-sm" id="deleteCancel">Cancel</button>
      <button class="btn-sm btn-danger" id="deleteConfirm">Delete</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── Product Config ────────────────────────────────────────────
  const PRODUCTS = {
    'badgeguard': {
      title: 'BadgeGuard Dashboard',

  function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    return fetch(BASE + path, opts).then(r => {
      if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
      if (r.headers.get('content-type')?.includes('text/csv')) return r.text();
      return r.json();
    });
  }

  function timeAgo(dateStr) {
    if (!dateStr) return 'never';
    const diff = Date.now() - new Date(dateStr).getTime();
    const s = Math.floor(diff / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

    if (!username || !password) return;
    try {
      const res = await api('POST', '/dashboard/auth/login', { username, password });
      if (res.error) {
        const $err = document.getElementById('loginError');
        $err.textContent = res.error;
        $err.style.display = 'block';
        return;
      }
      token = res.token;
      orgId = res.orgId;
      sessionStorage.setItem('fleet_token', token);
      sessionStorage.setItem('fleet_org', orgId);
      showApp();
      logActivity('login', 'User logged in', username);
    } catch {
      const $err = document.getElementById('loginError');
      $err.textContent = 'Login failed';
      $err.style.display = 'block';

    try {
      const promises = [
        api('GET', '/api/v1/data/events/stats'),
        api('GET', '/api/v1/data/events/recent?limit=20'),
        api('GET', '/api/v1/data/connectors?limit=50'),
      ];

        promises.push(api('GET', '/api/v1/data/visitors?limit=10&status=checked_in'));

      const results = await Promise.all(promises);

  // ─── EVENTS Section ───────────────────────────────────────────
  async function loadEvents() {
    try {
      const params = new URLSearchParams();
      params.set('limit', eventsPage.limit);
      params.set('offset', eventsPage.offset);
      for (const [k, v] of Object.entries(eventsFilters)) {
        if (v !== '' && v !== undefined) params.set(k, v);
      }
      const res = await api('GET', '/api/v1/data/events?' + params.toString());
      eventsData = res;
    } catch { /* use cached */ }
    renderEvents();
  }

  function renderEvents() {
    const events = eventsData.events || [];
    let html = '<div class="section-title">Events</div>';

    // Filter bar
    html += '<div class="filter-bar">';
    html += '<label>Since</label><input type="date" id="evtSince" value="' + (eventsFilters.since || '') + '">';
    html += '<label>Until</label><input type="date" id="evtUntil" value="' + (eventsFilters.until || '') + '">';
    html += '<label>Type</label><input type="text" id="evtType" placeholder="e.g. access_granted" value="' + esc(eventsFilters.eventType || '') + '" style="width:140px">';
    html += '<label>Severity</label><select id="evtSeverity"><option value="">All</option><option value="critical"' + (eventsFilters.severity === 'critical' ? ' selected' : '') + '>Critical</option><option value="high"' + (eventsFilters.severity === 'high' ? ' selected' : '') + '>High</option><option value="medium"' + (eventsFilters.severity === 'medium' ? ' selected' : '') + '>Medium</option><option value="low"' + (eventsFilters.severity === 'low' ? ' selected' : '') + '>Low</option></select>';
    html += '<button class="btn-sm btn-accent" id="evtApply">Apply</button>';
    html += '<button class="btn-sm" id="evtClear">Clear</button>';
    html += '</div>';

    // Table
    html += '<table class="data-table"><thead><tr><th>Time</th><th>Type</th><th>User</th><th>Door / Location</th><th>Source</th><th>Severity</th><th>Status</th></tr></thead><tbody>';
    if (events.length === 0) {
      html += '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:2rem">No events found</td></tr>';
    } else {
      events.forEach(evt => {
        const evtType = evt.eventType || evt.type || '-';
        const cls = /grant/i.test(evtType) ? 'evt-grant' : /deny|denied/i.test(evtType) ? 'evt-deny' : /alarm/i.test(evtType) ? 'evt-alarm' : '';
        const granted = evt.accessGranted;
        const statusText = granted === true ? 'Granted' : granted === false ? 'Denied' : '-';
        const statusCls = granted === true ? 'evt-grant' : granted === false ? 'evt-deny' : '';
        html += '<tr>';
        html += '<td>' + esc(fmtDateTime(evt._syncTimestamp || evt.timestamp)) + '</td>';
        html += '<td class="' + cls + '">' + esc(evtType) + '</td>';
        html += '<td>' + esc(evt.userName || evt.user || '-') + '</td>';
        html += '<td>' + esc(evt.doorName || evt.door || evt.location || '-') + '</td>';
        html += '<td>' + esc(evt.source || evt.connectorType || '-') + '</td>';
        html += '<td>' + (evt.severity ? '<span class="badge badge-' + evt.severity + '">' + esc(evt.severity) + '</span>' : '-') + '</td>';
        html += '<td class="' + statusCls + '">' + statusText + '</td>';
        html += '</tr>';
      });
    }
    html += '</tbody></table>';

    // Pagination
    html += renderPagination(eventsData.total || 0, eventsPage, 'evt');

    document.getElementById('content').innerHTML = html;

    // Bind filter events
    document.getElementById('evtApply')?.addEventListener('click', () => {
      eventsFilters.since = document.getElementById('evtSince').value || undefined;
      eventsFilters.until = document.getElementById('evtUntil').value || undefined;
      eventsFilters.eventType = document.getElementById('evtType').value || undefined;
      eventsFilters.severity = document.getElementById('evtSeverity').value || undefined;
      eventsPage.offset = 0;
      loadEvents();
    });
    document.getElementById('evtClear')?.addEventListener('click', () => {
      eventsFilters = {};
      eventsPage.offset = 0;
      loadEvents();
    });
    bindPagination('evt', eventsPage, eventsData.total || 0, loadEvents);
  }

  // ─── CAMERAS Section ──────────────────────────────────────────

  // ─── CARDHOLDERS Section ───────────────────────────────────────
  let cardholdersData = [];
  let cardholdersPage = { limit: 50, offset: 0 };
  let cardholdersSearch = '';
  let cardholdersFilter = '';

  async function loadCardholders() {
    try {
      const params = new URLSearchParams();
      params.set('limit', cardholdersPage.limit);
      params.set('offset', cardholdersPage.offset);
      if (cardholdersFilter) params.set('personType', cardholdersFilter);
      const res = await api('GET', '/api/v1/data/cardholders?' + params.toString());
      cardholdersData = res.cardholders || res.cardholder || [];
    } catch { /* use cached */ }
    renderCardholders();
  }

  async function saveCardholder(data, isNew) {
    try {
      if (isNew) {
        await api('POST', '/api/v1/data/cardholders', data);
        logActivity('cardholder.create', data.firstName + ' ' + data.lastName + ' (badge: ' + (data.badgeNumber || 'none') + ')');
      } else {
        await api('PUT', '/api/v1/data/cardholders/' + encodeURIComponent(data.id), data);
        logActivity('cardholder.update', data.firstName + ' ' + data.lastName + ' — ' + (data.id || ''));
      }
      loadCardholders();
    } catch (e) { alert('Save failed: ' + e.message); }
  }

  async function deleteCardholder(id) {
    if (!confirm('Delete this cardholder?')) return;
    try {
      await api('DELETE', '/api/v1/data/cardholders/' + encodeURIComponent(id));
      logActivity('cardholder.delete', 'ID: ' + id);
      loadCardholders();
    } catch (e) { alert('Delete failed: ' + e.message); }
  }

  async function toggleCardholder(ch) {
    try {
      const newState = !ch.isActive;
      await api('PUT', '/api/v1/data/cardholders/' + encodeURIComponent(ch.id), { isActive: newState });
      logActivity(newState ? 'cardholder.activate' : 'cardholder.deactivate', (ch.firstName || '') + ' ' + (ch.lastName || '') + ' — ' + ch.id);
      loadCardholders();
    } catch (e) { alert('Toggle failed: ' + e.message); }
  }

    const isNew = !ch;
    ch = ch || { firstName: '', lastName: '', badgeNumber: '', personType: 'STAFF', accessLevels: [], isActive: true };
    const doorNames = doorsData.map(d => d.name || d.id || '').filter(Boolean);

    let html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center" id="chModal">';

    html += '<label style="display:block;font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.25rem">Badge Number</label>';

      html += '<option value="' + t + '"' + (ch.personType === t ? ' selected' : '') + '>' + t + '</option>';
    });
    html += '</select>';

    html += '<label style="display:block;font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.25rem">Access Levels (select doors)</label>';
    html += '<div id="chAccessLevels" style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);padding:0.5rem;max-height:150px;overflow-y:auto;margin-bottom:0.75rem">';
    const currentLevels = ch.accessLevels || [];

    html += '<label style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;margin-bottom:1.25rem;cursor:pointer"><input type="checkbox" id="chActive"' + (ch.isActive !== false ? ' checked' : '') + ' /> Active</label>';

    html += '<div style="display:flex;gap:0.5rem;justify-content:flex-end">';
    html += '<button class="btn-sm" id="chCancel">Cancel</button>';

    document.getElementById('content').insertAdjacentHTML('beforeend', html);

    document.getElementById('chCancel').addEventListener('click', () => document.getElementById('chModal').remove());

    document.getElementById('chSave').addEventListener('click', () => {
      const firstName = document.getElementById('chFirstName').value.trim();

      const cbEls = document.querySelectorAll('.ch-access-cb');

        accessLevels = (document.getElementById('chAccessText')?.value || '').split(',').map(s => s.trim()).filter(Boolean);

      saveCardholder({
        id: ch.id || undefined,

  // ─── ACTIVITY LOG ──────────────────────────────────────────────
  // Client-side audit trail — also pushes to server as audit_log entities
  let activityLog = [];
  let activityPage = { limit: 50, offset: 0 };
  let activityFilter = '';

  function logActivity(action, details, user) {
    const entry = {
      id: 'audit-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
      action,
      details: typeof details === 'string' ? details : JSON.stringify(details),
      user: user || sessionStorage.getItem('fleet_user') || 'admin',
      timestamp: new Date().toISOString(),
      ip: '-',
    };
    activityLog.unshift(entry);
    if (activityLog.length > 500) activityLog = activityLog.slice(0, 500);

    // Push to server (fire and forget)
    api('POST', '/api/v1/data/entities/audit_log', entry).catch(() => {});
  }

  async function loadActivity() {
    // Try to fetch server-side logs first
    try {
      const params = new URLSearchParams();
      params.set('limit', activityPage.limit);
      params.set('offset', activityPage.offset);
      const res = await api('GET', '/api/v1/data/entities/audit_log?' + params.toString());
      const serverLogs = res.audit_log || res.entities || [];
      // Merge server logs with local (deduplicate by id)
      const ids = new Set(activityLog.map(e => e.id));
      serverLogs.forEach(e => { if (!ids.has(e.id)) activityLog.push(e); });
      activityLog.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
    } catch { /* use local only */ }
    renderActivity();
  }

  function renderActivity() {
    let filtered = activityLog;
    if (activityFilter) {
      const q = activityFilter.toLowerCase();
      filtered = filtered.filter(e =>
        (e.action || '').toLowerCase().includes(q) ||
        (e.details || '').toLowerCase().includes(q) ||
        (e.user || '').toLowerCase().includes(q)
      );
    }

    let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">';
    html += '<div class="section-title" style="margin-bottom:0">Activity Log (' + filtered.length + ')</div>';
    html += '<div style="display:flex;gap:0.5rem;align-items:center">';
    html += '<input id="actSearch" placeholder="Search actions..." value="' + esc(activityFilter) + '" style="padding:0.4rem 0.6rem;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:0.8rem;width:200px" />';
    html += '<button class="btn-sm" id="actExport">Export CSV</button>';
    html += '</div></div>';

    if (filtered.length === 0) {
      html += '<div class="empty-state"><h2>No activity recorded</h2><p>Actions like logins, door commands, and cardholder changes will appear here.</p></div>';
    } else {
      html += '<div class="table-wrap"><table><thead><tr><th style="width:160px">Time</th><th style="width:100px">User</th><th style="width:160px">Action</th><th>Details</th></tr></thead><tbody>';
      const page = filtered.slice(activityPage.offset, activityPage.offset + activityPage.limit);
      page.forEach(entry => {
        const actionColor = /login/i.test(entry.action) ? 'color:var(--info)' :
          /lock/i.test(entry.action) ? 'color:var(--warning)' :
          /delete|deactivate/i.test(entry.action) ? 'color:var(--danger)' :
          /create|add|activate/i.test(entry.action) ? 'color:var(--success)' : '';
        html += '<tr>';
        html += '<td style="font-size:0.8rem;white-space:nowrap">' + esc(fmtDateTime(entry.timestamp)) + '</td>';
        html += '<td style="font-size:0.85rem">' + esc(entry.user || '-') + '</td>';
        html += '<td style="' + actionColor + ';font-weight:500;font-size:0.85rem">' + esc(entry.action || '-') + '</td>';
        html += '<td style="font-size:0.8rem;color:var(--text-secondary)">' + esc(entry.details || '-') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += renderPagination(filtered.length, activityPage, 'act');
    }

    document.getElementById('content').innerHTML = html;

    document.getElementById('actSearch')?.addEventListener('input', e => {
      activityFilter = e.target.value;
      renderActivity();
    });
    document.getElementById('actExport')?.addEventListener('click', () => {
      let csv = 'Time,User,Action,Details\n';
      filtered.forEach(e => {
        csv += '"' + (e.timestamp || '') + '","' + (e.user || '') + '","' + (e.action || '') + '","' + (e.details || '').replace(/"/g, '""') + '"\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'activity-log-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
    });
    bindPagination('act', activityPage, filtered.length, () => renderActivity());
  }

  // ─── Pagination Helper ────────────────────────────────────────
  function renderPagination(total, page, prefix) {
    const totalPages = Math.ceil(total / page.limit) || 1;
    const currentPage = Math.floor(page.offset / page.limit) + 1;
    let html = '<div class="pagination">';
    html += '<span>Showing ' + (page.offset + 1) + '-' + Math.min(page.offset + page.limit, total) + ' of ' + total + '</span>';
    html += '<div class="page-btns">';
    html += '<button class="btn-sm" id="' + prefix + 'Prev"' + (currentPage <= 1 ? ' disabled' : '') + '>Prev</button>';
    html += '<span style="padding:0.35rem 0.5rem">' + currentPage + ' / ' + totalPages + '</span>';
    html += '<button class="btn-sm" id="' + prefix + 'Next"' + (currentPage >= totalPages ? ' disabled' : '') + '>Next</button>';
    html += '</div></div>';
    return html;
  }

  function bindPagination(prefix, page, total, loadFn) {
    document.getElementById(prefix + 'Prev')?.addEventListener('click', () => {
      if (page.offset >= page.limit) {
        page.offset -= page.limit;
        loadFn();
      }
    });
    document.getElementById(prefix + 'Next')?.addEventListener('click', () => {
      if (page.offset + page.limit < total) {
        page.offset += page.limit;
        loadFn();
      }
    });
  }

  async function saveDeviceSettings() {
    if (!selectedSettingsDevice) return;
    const siteId = selectedSettingsDevice.siteId;

    const connectors = [];
    document.querySelectorAll('#connectorsBody tr').forEach(row => {
      const name = row.querySelector('.conn-name')?.value?.trim();
      const type = row.querySelector('.conn-type')?.value;
      const url = row.querySelector('.conn-url')?.value?.trim();
      const key = row.querySelector('.conn-key')?.value?.trim();

      if (name && type) {
        const conn = { name, type, enabled: enabled !== false, pollIntervalMs: 5000 };

        if (key) conn.apiKey = key;
        connectors.push(conn);
      }
    });

    const syncIntervalMs = parseInt(document.getElementById('settingsSyncInterval')?.value) || 30000;
    const siteName = document.getElementById('settingsSiteName')?.value?.trim() || undefined;

        syncIntervalMs,
        siteName,
      });

      // Update device in list

      if (idx >= 0) {
        settingsDevices[idx].configVersion = res.config.version;

  // Fetch events + cardholders + doors in bulk for analytics computation
  async function fetchAnalyticsData(eventLimit) {
    eventLimit = eventLimit || 2000;
    const [evRes, chRes, drRes] = await Promise.all([
      api('GET', '/api/v1/data/events?limit=' + eventLimit),
      api('GET', '/api/v1/data/cardholders?limit=500'),
      api('GET', '/api/v1/data/doors?limit=200'),
    ]);
    return {
      events: evRes.events || [],
      cardholders: chRes.cardholders || chRes.entities || [],
      doors: drRes.doors || drRes.entities || [],
    };
  }

  function parseTs(ts) {
    if (!ts) return null;
    var d = new Date(ts);
    return isNaN(d.getTime()) ? null : d;
  }

  // ─── INSIDER THREAT Section (BadgeGuard) ───────────────────────

  let insiderData = null;

  async function loadInsiderThreat() {
    try {
      var raw = await fetchAnalyticsData(2000);
      insiderData = computeInsiderScores(raw.events, raw.cardholders);
    } catch { /* use cached */ }
    renderInsiderThreat();
  }

  function computeInsiderScores(events, cardholders) {
    var chMap = {};
    cardholders.forEach(function(c) { chMap[c.badgeId || c.id] = c; });

    var scores = {};  // keyed by userName
    events.forEach(function(e) {
      var name = e.userName || e.badgeId || 'Unknown';
      if (!scores[name]) scores[name] = { name: name, denied: 0, afterHours: 0, doorForced: 0, doorHeld: 0, weekend: 0, total: 0 };
      var s = scores[name];
      s.total++;

      var ts = parseTs(e.timestamp);
      // Denied
      if (e.eventType === 'access_denied' || e.accessGranted === false) {
        s.denied++;
      }
      // Door forced/held
      if (e.eventType === 'door_forced') s.doorForced++;
      if (e.eventType === 'door_held') s.doorHeld++;

      // After hours (before 6am or after 10pm)
      if (ts) {
        var h = ts.getHours();
        if (h < 6 || h > 22) s.afterHours++;
        if (ts.getDay() === 0 || ts.getDay() === 6) s.weekend++;
      }
    });

    // Compute risk score
    var result = [];
    for (var name in scores) {
      var s = scores[name];
      var score = Math.min(100,
        s.denied * 4 +
        s.afterHours * 6 +
        s.doorForced * 15 +
        s.doorHeld * 8 +
        s.weekend * 3
      );
      var topSignal = 'None';
      var maxV = 0;
      if (s.denied > maxV) { maxV = s.denied; topSignal = 'Access Denials (' + s.denied + ')'; }
      if (s.afterHours > maxV) { maxV = s.afterHours; topSignal = 'After-Hours (' + s.afterHours + ')'; }
      if (s.doorForced > maxV) { maxV = s.doorForced; topSignal = 'Door Forced (' + s.doorForced + ')'; }
      if (s.doorHeld > maxV) { maxV = s.doorHeld; topSignal = 'Door Held (' + s.doorHeld + ')'; }
      if (s.weekend > maxV) { maxV = s.weekend; topSignal = 'Weekend Access (' + s.weekend + ')'; }

      if (score > 0) {
        result.push({
          name: name, score: score, topSignal: topSignal,
          denied: s.denied, afterHours: s.afterHours, doorForced: s.doorForced,
          doorHeld: s.doorHeld, weekend: s.weekend, total: s.total,
          trend: score >= 60 ? 'Rising' : score >= 30 ? 'Stable' : 'Low',
        });
      }
    }
    result.sort(function(a, b) { return b.score - a.score; });
    return result;
  }

  // ─── WORKFORCE ANALYTICS Section (BadgeGuard) ──────────────────

  let workforceData = null;

  async function loadWorkforce() {
    try {
      var raw = await fetchAnalyticsData(2000);
      workforceData = computeWorkforce(raw.events, raw.cardholders);

    renderWorkforce();

  function computeWorkforce(events, cardholders) {
    var byPerson = {};
    events.forEach(function(e) {
      var name = e.userName || e.badgeId || 'Unknown';
      if (!byPerson[name]) byPerson[name] = { name: name, events: [], firstSeen: null, lastSeen: null, doors: {} };
      var p = byPerson[name];
      p.events.push(e);
      var ts = parseTs(e.timestamp);
      if (ts) {
        if (!p.firstSeen || ts < p.firstSeen) p.firstSeen = ts;
        if (!p.lastSeen || ts > p.lastSeen) p.lastSeen = ts;
      }
      var door = e.doorName || e.doorId || 'Unknown';
      p.doors[door] = (p.doors[door] || 0) + 1;
    });

    var result = [];
    for (var name in byPerson) {
      var p = byPerson[name];
      // Estimate badge hours: spread across days seen
      var days = new Set();
      p.events.forEach(function(e) {
        var ts = parseTs(e.timestamp);
        if (ts) days.add(ts.toISOString().slice(0, 10));
      });
      var badgeHours = Math.round(p.events.length * 0.25 * 10) / 10;
      var daysActive = days.size;
      var avgPerDay = daysActive > 0 ? Math.round(badgeHours / daysActive * 10) / 10 : 0;
      var topDoor = '';
      var maxDoor = 0;
      for (var d in p.doors) { if (p.doors[d] > maxDoor) { maxDoor = p.doors[d]; topDoor = d; } }

      result.push({
        name: name, eventCount: p.events.length, badgeHours: badgeHours,
        daysActive: daysActive, avgPerDay: avgPerDay, topDoor: topDoor,
        firstSeen: p.firstSeen, lastSeen: p.lastSeen,
      });
    }
    result.sort(function(a, b) { return b.eventCount - a.eventCount; });
    return result;
  }

  // ─── TAILGATING DETECTION Section (BadgeGuard) ─────────────────

  let tailgatingData = null;

  async function loadTailgating() {
    try {
      var raw = await fetchAnalyticsData(2000);
      tailgatingData = computeTailgating(raw.events, raw.doors);
    } catch { /* use cached */ }
    renderTailgating();
  }

  function computeTailgating(events, doors) {
    // Sort events by door then time
    var byDoor = {};
    events.forEach(function(e) {
      var door = e.doorName || e.doorId;
      if (!door) return;
      if (!byDoor[door]) byDoor[door] = [];
      byDoor[door].push(e);
    });

    var tailgateEvents = [];
    var doorRisk = {};

    for (var door in byDoor) {
      var devts = byDoor[door].slice();
      devts.sort(function(a, b) {
        var ta = parseTs(a.timestamp);
        var tb = parseTs(b.timestamp);
        return (ta && tb) ? ta - tb : 0;
      });

      var rapidCount = 0;
      for (var i = 1; i < devts.length; i++) {
        var prev = devts[i - 1];
        var curr = devts[i];
        var t1 = parseTs(prev.timestamp);
        var t2 = parseTs(curr.timestamp);
        if (!t1 || !t2) continue;
        var gapSec = (t2 - t1) / 1000;

        // Two different people through same door within 5 seconds
        if (gapSec > 0 && gapSec <= 5 && (prev.userName || prev.badgeId) !== (curr.userName || curr.badgeId)) {
          rapidCount++;
          tailgateEvents.push({
            timestamp: curr.timestamp,
            door: door,
            personA: prev.userName || prev.badgeId || '?',
            personB: curr.userName || curr.badgeId || '?',
            gapSeconds: Math.round(gapSec * 10) / 10,
            severity: gapSec <= 2 ? 'critical' : gapSec <= 3 ? 'high' : 'medium',
          });
        }
      }

      var total = devts.length;
      var riskScore = total > 0 ? Math.min(100, Math.round(rapidCount / total * 500)) : 0;
      doorRisk[door] = { door: door, total: total, rapid: rapidCount, riskScore: riskScore };
    }

    tailgateEvents.sort(function(a, b) { return (b.timestamp || '').localeCompare(a.timestamp || ''); });
    var doorRiskArr = Object.values(doorRisk);
    doorRiskArr.sort(function(a, b) { return b.riskScore - a.riskScore; });

    return { events: tailgateEvents, doorRisk: doorRiskArr };
  }

  function renderTailgating() {
    var data = tailgatingData || { events: [], doorRisk: [] };
    var te = data.events;
    var dr = data.doorRisk;

    html += '<div class="stat-cards">';

    html += statCard('High-Risk Doors', highRisk, highRisk > 0 ? 'yellow' : '');

      html += '<tr>';
      html += '<td>' + esc(d.door) + '</td>';
      html += '<td>' + d.total + '</td>';

      html += '</tr>';
    });
    html += '</tbody></table>';

    document.getElementById('content').innerHTML = html;
  }

  // ─── GHOST EMPLOYEES Section (BadgeGuard) ──────────────────────

  let ghostData = null;

  async function loadGhostEmployees() {
    try {
      var raw = await fetchAnalyticsData(2000);
      ghostData = computeGhostEmployees(raw.events, raw.cardholders);
    } catch { /* use cached */ }
    renderGhostEmployees();
  }

  function computeGhostEmployees(events, cardholders) {
    var now = new Date();

    // Track last access per person
    var lastAccess = {};
    var eventCount = {};
    events.forEach(function(e) {
      var name = e.userName || e.badgeId || null;
      if (!name) return;
      var ts = parseTs(e.timestamp);
      if (ts) {
        if (!lastAccess[name] || ts > lastAccess[name]) lastAccess[name] = ts;
      }
      eventCount[name] = (eventCount[name] || 0) + 1;
    });

    // Find ghosts: people in cardholder list but no recent activity
    var ghosts = [];
    var inactive = [];
    var allNames = new Set();
    cardholders.forEach(function(c) { allNames.add(c.name || c.firstName + ' ' + c.lastName || c.id); });
    // Also add names from events
    for (var n in lastAccess) allNames.add(n);

    allNames.forEach(function(name) {
      var la = lastAccess[name];
      var daysInactive = la ? Math.floor((now - la) / 86400000) : 999;
      var cnt = eventCount[name] || 0;
      var ch = cardholders.find(function(c) { return (c.name || c.firstName + ' ' + c.lastName) === name; });
      var status = ch ? (ch.isActive !== false ? 'ACTIVE' : 'INACTIVE') : 'Unknown';

      if (daysInactive > 30 || cnt === 0) {
        ghosts.push({
          name: name, status: status,
          lastAccess: la ? la.toISOString().slice(0, 10) : 'Never',
          daysInactive: daysInactive > 900 ? 'N/A' : daysInactive,
          eventCount: cnt,
          risk: daysInactive > 90 || cnt === 0 ? 'HIGH' : 'MEDIUM',
          action: daysInactive > 90 ? 'Deactivate' : 'Review',
        });
      }

      if (status === 'ACTIVE' && (daysInactive > 60 || cnt === 0)) {
        inactive.push({
          name: name, status: status,
          lastAccess: la ? la.toISOString().slice(0, 10) : 'Never',
          daysInactive: daysInactive > 900 ? 'N/A' : daysInactive,
          risk: 'HIGH',
          recommendation: 'Verify employment — active badge with no recent access',
        });
      }
    });

    ghosts.sort(function(a, b) { return (b.daysInactive === 'N/A' ? 999 : b.daysInactive) - (a.daysInactive === 'N/A' ? 999 : a.daysInactive); });
    return { ghosts: ghosts, payrollRisk: inactive };
  }

  function renderGhostEmployees() {
    var data = ghostData || { ghosts: [], payrollRisk: [] };
    var ghosts = data.ghosts;
    var payroll = data.payrollRisk;

    var html = '<div class="section-title">Ghost Employee Detection</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Identifies credentials with no recent badge activity — potential payroll fraud or stale accounts</p>';

    html += '<div class="stat-cards">';
    html += statCard('Ghost Employees', ghosts.length, ghosts.length > 0 ? 'red' : 'green');
    html += statCard('Payroll Risk', payroll.length, payroll.length > 0 ? 'yellow' : '');
    html += '</div>';

    // Ghost table
    html += '<div class="section-title" style="margin-top:1.5rem">Inactive Credentials</div>';
    html += '<table class="data-table"><thead><tr><th>Name</th><th>Badge Status</th><th>Last Access</th><th>Days Inactive</th><th>Events</th><th>Risk</th><th>Action</th></tr></thead><tbody>';
    if (ghosts.length === 0) {
      html += '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:2rem">No ghost employees detected — all credentials are active</td></tr>';
    } else {
      ghosts.slice(0, 20).forEach(function(g) {
        var riskColor = g.risk === 'HIGH' ? '#DC2626' : '#F59E0B';
        html += '<tr>';
        html += '<td>' + esc(g.name) + '</td>';
        html += '<td>' + esc(g.status) + '</td>';
        html += '<td>' + esc(g.lastAccess) + '</td>';
        html += '<td>' + g.daysInactive + '</td>';
        html += '<td>' + g.eventCount + '</td>';
        html += '<td><span style="padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600;color:#fff;background:' + riskColor + '">' + g.risk + '</span></td>';
        html += '<td>' + esc(g.action) + '</td>';
        html += '</tr>';
      });
    }
    html += '</tbody></table>';

    // Payroll cross-reference

  function computeBehavioralDrift(events, cardholders) {
    var now = new Date();
    var byPerson = {};
    events.forEach(function(e) {
      var name = e.userName || e.badgeId || 'Unknown';
      if (!byPerson[name]) byPerson[name] = { name: name, events: [], hourHist: new Array(24).fill(0), dayHist: new Array(7).fill(0), doors: {} };
      var p = byPerson[name];
      p.events.push(e);
      var ts = parseTs(e.timestamp);
      if (ts) {
        p.hourHist[ts.getHours()]++;
        p.dayHist[ts.getDay()]++;
      }
      var door = e.doorName || e.doorId || '';
      if (door) p.doors[door] = (p.doors[door] || 0) + 1;
    });

    var driftEmployees = [];
    var pretermination = [];
    var firstInLastOut = [];

    for (var name in byPerson) {
      var p = byPerson[name];
      if (p.events.length < 5) continue;

      // Find typical hour range
      var peakHour = p.hourHist.indexOf(Math.max.apply(null, p.hourHist));
      var totalEvts = p.events.length;

      // Split events into old half and recent half
      var sorted = p.events.slice().sort(function(a, b) { return (a.timestamp || '').localeCompare(b.timestamp || ''); });
      var mid = Math.floor(sorted.length / 2);
      var oldEvts = sorted.slice(0, mid);
      var newEvts = sorted.slice(mid);

      // Compare hourly distribution old vs new
      var oldHours = new Array(24).fill(0);
      var newHours = new Array(24).fill(0);
      oldEvts.forEach(function(e) { var ts = parseTs(e.timestamp); if (ts) oldHours[ts.getHours()]++; });
      newEvts.forEach(function(e) { var ts = parseTs(e.timestamp); if (ts) newHours[ts.getHours()]++; });

      // Compute drift score: sum of absolute differences normalized
      var driftScore = 0;
      for (var h = 0; h < 24; h++) {
        var oldPct = oldEvts.length > 0 ? oldHours[h] / oldEvts.length : 0;
        var newPct = newEvts.length > 0 ? newHours[h] / newEvts.length : 0;
        driftScore += Math.abs(oldPct - newPct);
      }
      driftScore = Math.min(100, Math.round(driftScore * 100));

      // Detect first-in / last-out patterns
      var firstTs = parseTs(sorted[0]?.timestamp);
      var lastTs = parseTs(sorted[sorted.length - 1]?.timestamp);
      if (firstTs && lastTs) {
        var firstHour = firstTs.getHours();
        var lastHour = lastTs.getHours();
        if (firstHour < 6 || lastHour > 21) {
          firstInLastOut.push({ name: name, firstIn: firstHour + ':00', lastOut: lastHour + ':00', events: totalEvts });
        }
      }

      // Pre-termination signals: recent drop in activity
      var recentCount = newEvts.length;
      var oldCount = oldEvts.length;
      var dropPct = oldCount > 0 ? Math.round((1 - recentCount / oldCount) * 100) : 0;
      if (dropPct > 40) {
        pretermination.push({
          name: name, oldCount: oldCount, recentCount: recentCount,
          dropPct: dropPct, signal: dropPct > 70 ? 'Strong' : 'Moderate',
        });
      }

      if (driftScore > 15) {
        var trend = driftScore > 50 ? 'Significant Shift' : driftScore > 30 ? 'Moderate Change' : 'Minor Drift';
        driftEmployees.push({
          name: name, driftScore: driftScore, peakHour: peakHour,
          eventCount: totalEvts, trend: trend,
        });
      }
    }

    driftEmployees.sort(function(a, b) { return b.driftScore - a.driftScore; });
    pretermination.sort(function(a, b) { return b.dropPct - a.dropPct; });

    return { driftEmployees: driftEmployees, pretermination: pretermination, firstInLastOut: firstInLastOut };
  }

  // ─── SOCIAL NETWORK Section ────────────────────────────────────

  let socialData = null;

  async function loadSocialNetwork() {
    try {
      var raw = await fetchAnalyticsData(2000);
      socialData = computeSocialNetwork(raw.events, raw.cardholders, raw.doors);
    } catch { /* use cached */ }
    renderSocialNetwork();
  }

  function computeSocialNetwork(events, cardholders, doors) {
    // Co-access: people who badge through the same door within 2 minutes
    var byDoor = {};
    events.forEach(function(e) {
      var door = e.doorName || e.doorId;
      var name = e.userName || e.badgeId;
      if (!door || !name) return;
      if (!byDoor[door]) byDoor[door] = [];
      byDoor[door].push({ name: name, ts: parseTs(e.timestamp) });
    });

    var pairCounts = {};
    var personContacts = {};

    for (var door in byDoor) {
      var devts = byDoor[door].sort(function(a, b) { return a.ts - b.ts; });
      for (var i = 0; i < devts.length; i++) {
        for (var j = i + 1; j < devts.length; j++) {
          if (!devts[i].ts || !devts[j].ts) continue;
          var gap = (devts[j].ts - devts[i].ts) / 1000;
          if (gap > 120) break; // 2-minute window
          if (devts[i].name === devts[j].name) continue;
          var pair = [devts[i].name, devts[j].name].sort().join('|||');
          pairCounts[pair] = (pairCounts[pair] || 0) + 1;

          // Track contacts per person
          if (!personContacts[devts[i].name]) personContacts[devts[i].name] = {};
          if (!personContacts[devts[j].name]) personContacts[devts[j].name] = {};
          personContacts[devts[i].name][devts[j].name] = (personContacts[devts[i].name][devts[j].name] || 0) + 1;
          personContacts[devts[j].name][devts[i].name] = (personContacts[devts[j].name][devts[i].name] || 0) + 1;
        }
      }
    }

    // Top co-access pairs
    var coAccess = Object.entries(pairCounts)
      .map(function(kv) { var names = kv[0].split('|||'); return { personA: names[0], personB: names[1], count: kv[1] }; })
      .sort(function(a, b) { return b.count - a.count; })
      .slice(0, 20);

    // Influence ranking: most unique contacts
    var influence = Object.entries(personContacts)
      .map(function(kv) { return { name: kv[0], contacts: Object.keys(kv[1]).length, interactions: Object.values(kv[1]).reduce(function(s, v) { return s + v; }, 0) }; })
      .sort(function(a, b) { return b.contacts - a.contacts; })
      .slice(0, 15);

    // Isolated: people with 0 or 1 co-access contacts
    var allNames = new Set();
    events.forEach(function(e) { var n = e.userName || e.badgeId; if (n) allNames.add(n); });
    var isolated = [];
    allNames.forEach(function(name) {
      var ct = personContacts[name] ? Object.keys(personContacts[name]).length : 0;
      if (ct <= 1) isolated.push({ name: name, contacts: ct });
    });

    return { coAccess: coAccess, influence: influence, isolated: isolated, clusterCount: coAccess.length > 0 ? Math.ceil(influence.length / 3) : 0 };
  }

    } catch { /* use cached */ }

  function computeAccessCreep(events, cardholders, doors) {
    // For each person, track unique doors accessed vs total doors available
    var allDoors = new Set();
    events.forEach(function(e) { var d = e.doorName || e.doorId; if (d) allDoors.add(d); });
    var totalDoors = allDoors.size || 1;

    var byPerson = {};
    events.forEach(function(e) {
      if (e.eventType === 'access_denied' || e.accessGranted === false) return;
      var name = e.userName || e.badgeId;
      var door = e.doorName || e.doorId;
      if (!name || !door) return;
      if (!byPerson[name]) byPerson[name] = { name: name, doorsUsed: new Set(), events: 0 };
      byPerson[name].doorsUsed.add(door);
      byPerson[name].events++;
    });

    var results = [];
    for (var name in byPerson) {
      var p = byPerson[name];
      var used = p.doorsUsed.size;
      var usagePct = Math.round(used / totalDoors * 100);
      var unused = totalDoors - used;
      var risk = usagePct < 10 ? 'HIGH' : usagePct < 25 ? 'MEDIUM' : 'LOW';
      results.push({
        name: name, totalGranted: totalDoors, totalUsed: used,
        unusedCount: unused, usagePct: usagePct, risk: risk,
        recommendation: risk === 'HIGH' ? 'Revoke Unused' : risk === 'MEDIUM' ? 'Review Access' : 'Normal',
        events: p.events,
      });
    }
    results.sort(function(a, b) { return a.usagePct - b.usagePct; });

    var flagged = results.filter(function(r) { return r.usagePct < 25; });
    var highRisk = flagged.filter(function(r) { return r.risk === 'HIGH'; }).length;

    return { results: results, flagged: flagged.length, highRisk: highRisk, totalDoors: totalDoors };
  }

  let doorHealthData = null;

  async function loadDoorHealth() {
    try {
      var raw = await fetchAnalyticsData(2000);
      doorHealthData = computeDoorHealth(raw.events, raw.doors);
    } catch { /* use cached */ }
    renderDoorHealth();
  }

  function computeDoorHealth(events, doors) {
    var doorStats = {};
    events.forEach(function(e) {
      var door = e.doorName || e.doorId;
      if (!door) return;
      if (!doorStats[door]) doorStats[door] = { door: door, held: 0, forced: 0, denials: 0, grants: 0, total: 0, recentIssues: [] };
      var s = doorStats[door];
      s.total++;

      var etype = e.eventType || '';
      if (etype === 'door_held') { s.held++; s.recentIssues.push({ type: 'HELD', time: e.timestamp, person: e.userName || e.badgeId || '' }); }
      else if (etype === 'door_forced') { s.forced++; s.recentIssues.push({ type: 'FORCED', time: e.timestamp, person: e.userName || e.badgeId || '' }); }
      else if (etype === 'access_denied' || e.accessGranted === false) s.denials++;
      else if (etype === 'access_granted' || e.accessGranted === true) s.grants++;
    });

    var report = [];
    var correlatedAlerts = [];
    for (var door in doorStats) {
      var s = doorStats[door];
      var deductions = s.forced * 15 + s.held * 5 + s.denials * 3;
      var healthScore = Math.max(0, Math.min(100, 100 - deductions));
      var hasHwIssue = (s.held + s.forced) > 0;
      var hasAnomaly = s.denials > 0;
      var correlated = hasHwIssue && hasAnomaly;

      var risk, rec;
      if (s.forced > 2 && s.denials > 2) { risk = 'CRITICAL'; rec = 'Immediate inspection + access audit'; }
      else if ((s.held + s.forced > 3) && s.denials > 0) { risk = 'HIGH'; rec = 'Schedule hardware inspection'; }
      else if (s.held + s.forced > 5) { risk = 'MEDIUM'; rec = 'Hardware maintenance needed'; }
      else if (s.denials > 5) { risk = 'MEDIUM'; rec = 'Review access policies'; }
      else if (s.held + s.forced > 0 || s.denials > 2) { risk = 'LOW'; rec = 'Monitor'; }
      else { risk = 'GOOD'; rec = 'Normal operation'; }

      if (risk === 'GOOD' && healthScore === 100) continue;

      report.push({
        door: door, healthScore: healthScore, held: s.held, forced: s.forced,
        denials: s.denials, total: s.total, correlated: correlated, risk: risk, rec: rec,
      });

      if (correlated) {
        s.recentIssues.slice(-3).forEach(function(evt) {
          correlatedAlerts.push({ door: door, type: evt.type, time: evt.time, person: evt.person });
        });
      }
    }

    report.sort(function(a, b) { return a.healthScore - b.healthScore; });
    var atRisk = report.filter(function(d) { return d.risk === 'CRITICAL' || d.risk === 'HIGH'; }).length;

    return { report: report, correlatedAlerts: correlatedAlerts, atRisk: atRisk };
  }

  function renderDoorHealth() {
    var data = doorHealthData || { report: [], correlatedAlerts: [], atRisk: 0 };
    var html = '<div class="section-title">Door Health Correlation</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Correlates door hardware issues (held/forced) with access anomalies (denials) to identify physically compromised doors</p>';

    var totalForced = 0, totalHeld = 0;

    html += '<table class="data-table"><thead><tr><th>Door</th><th>Health</th><th>Forced</th><th>Held</th><th>Denials</th><th>Total</th><th>Correlated</th><th>Risk</th><th>Recommendation</th></tr></thead><tbody>';
    if (data.report.length === 0) {

    } else {

        var rColor = d.risk === 'CRITICAL' ? '#DC2626' : d.risk === 'HIGH' ? '#EA580C' : d.risk === 'MEDIUM' ? '#F59E0B' : '#22C55E';
        html += '<tr><td>' + esc(d.door) + '</td>';
        html += '<td><span style="display:inline-block;min-width:40px;text-align:center;padding:2px 8px;border-radius:4px;font-weight:700;color:#fff;background:' + hColor + '">' + d.healthScore + '</span></td>';
        html += '<td>' + d.forced + '</td><td>' + d.held + '</td><td>' + d.denials + '</td><td>' + d.total + '</td>';

      });
    }
    html += '</tbody></table>';

    if (data.correlatedAlerts.length > 0) {
      html += '<div class="section-title" style="margin-top:1.5rem">Correlated Alerts (Hardware + Access Anomaly)</div>';
      html += '<table class="data-table"><thead><tr><th>Door</th><th>Issue Type</th><th>Time</th><th>Person</th></tr></thead><tbody>';

  // ─── ACCESS REQUESTS (Denied Analysis) Section ─────────────────

  let accessReqData = null;

  async function loadAccessRequests() {
    try {
      var raw = await fetchAnalyticsData(2000);
      accessReqData = computeAccessRequests(raw.events, raw.cardholders, raw.doors);
    } catch { /* use cached */ }
    renderAccessRequests();
  }

  function computeAccessRequests(events, cardholders, doors) {
    var deniedByPerson = {};
    var deniedByDoor = {};

    events.forEach(function(e) {
      if (e.eventType !== 'access_denied' && e.accessGranted !== false) return;
      var name = e.userName || e.badgeId || 'Unknown';
      var door = e.doorName || e.doorId || 'Unknown';

      if (!deniedByPerson[name]) deniedByPerson[name] = { name: name, denials: 0, doors: {} };
      deniedByPerson[name].denials++;
      deniedByPerson[name].doors[door] = (deniedByPerson[name].doors[door] || 0) + 1;

      if (!deniedByDoor[door]) deniedByDoor[door] = { door: door, denials: 0, people: new Set() };
      deniedByDoor[door].denials++;
      deniedByDoor[door].people.add(name);
    });

    var deniedEmployees = Object.values(deniedByPerson)
      .map(function(p) {
        var topDoor = '', maxD = 0;
        for (var d in p.doors) { if (p.doors[d] > maxD) { maxD = p.doors[d]; topDoor = d; } }
        return { name: p.name, denials: p.denials, topDoor: topDoor, recommendation: p.denials > 5 ? 'Review Needed' : 'Monitor' };
      })
      .sort(function(a, b) { return b.denials - a.denials; });

    var deniedDoors = Object.values(deniedByDoor)
      .map(function(d) { return { door: d.door, denials: d.denials, uniquePeople: d.people.size, policyReview: d.denials > 10 ? 'Required' : 'Not Required' }; })
      .sort(function(a, b) { return b.denials - a.denials; });

    var totalDenied = events.filter(function(e) { return e.eventType === 'access_denied' || e.accessGranted === false; }).length;

    return { deniedEmployees: deniedEmployees, deniedDoors: deniedDoors, totalDenied: totalDenied, uniqueDenied: deniedEmployees.length };
  }

    var html = '<div class="section-title">Access Request Analysis</div>';

    html += '<div class="stat-cards">';

    html += statCard('Unique People', data.uniqueDenied, '');

    html += '<table class="data-table"><thead><tr><th>Employee</th><th>Denied Attempts</th><th>Most Attempted Door</th><th>Recommendation</th></tr></thead><tbody>';

    html += '<table class="data-table"><thead><tr><th>Door</th><th>Denials</th><th>Unique People</th><th>Policy Review</th></tr></thead><tbody>';

  // ─── MUSTER / ROLL CALL Section ───────────────────────────────

  let musterData = null;

  async function loadMuster() {
    try {
      var raw = await fetchAnalyticsData(2000);
      musterData = computeMuster(raw.events, raw.cardholders, raw.doors);
    } catch { /* use cached */ }
    renderMuster();
  }

  function computeMuster(events, cardholders, doors) {
    var now = new Date();
    // Build last-known-location per person from most recent event
    var locations = {};
    events.forEach(function(e) {
      var name = e.userName || e.badgeId;
      if (!name) return;
      var ts = parseTs(e.timestamp);
      if (!ts) return;
      if (!locations[name] || ts > locations[name].ts) {
        locations[name] = {
          name: name,
          door: e.doorName || e.doorId || 'Unknown',
          ts: ts,
          minutesAgo: Math.round((now - ts) / 60000),
          eventType: e.eventType || '',
          granted: e.accessGranted !== false,
        };
      }
    });

    var roster = Object.values(locations).sort(function(a, b) { return a.minutesAgo - b.minutesAgo; });

    // Building occupancy: people seen in last 12 hours
    var inBuilding = roster.filter(function(r) { return r.minutesAgo < 720 && r.granted; });

    // By zone/door
    var byDoor = {};
    inBuilding.forEach(function(r) {
      if (!byDoor[r.door]) byDoor[r.door] = [];
      byDoor[r.door].push(r.name);
    });
    var zones = Object.entries(byDoor).map(function(kv) {
      return { zone: kv[0], count: kv[1].length, people: kv[1].slice(0, 10) };
    }).sort(function(a, b) { return b.count - a.count; });

    // Unaccounted: cardholder list people not seen recently
    var seenNames = new Set(Object.keys(locations));
    var unaccounted = [];
    cardholders.forEach(function(c) {
      var name = c.name || (c.firstName + ' ' + c.lastName);
      if (!seenNames.has(name) && c.isActive !== false) {
        unaccounted.push({ name: name, status: 'Not Seen' });
      }
    });

    return { roster: roster, inBuilding: inBuilding.length, zones: zones, unaccounted: unaccounted, total: roster.length };
  }

    html += '<div class="stat-cards">';

  async function loadIncidents2() {
    try {
      var raw = await fetchAnalyticsData(2000);

      incidentsList = res.entities || res.incidents || [];

  function generateIncidentsFromEvents(events) {
    var incidents = [];
    var id = 1;
    var denials = events.filter(function(e) { return e.eventType === 'access_denied' || e.accessGranted === false; });
    // Group denials into incidents (clusters of 3+ denials by same person)
    var byPerson = {};
    denials.forEach(function(e) {
      var name = e.userName || e.badgeId || 'Unknown';
      if (!byPerson[name]) byPerson[name] = [];
      byPerson[name].push(e);
    });
    for (var name in byPerson) {
      if (byPerson[name].length >= 3) {
        var evts = byPerson[name];
        incidents.push({
          id: 'INC-' + String(id++).padStart(4, '0'),
          title: 'Multiple Access Denials — ' + name,
          category: 'Access Violation',
          severity: evts.length >= 10 ? 'critical' : evts.length >= 5 ? 'high' : 'medium',
          status: 'open',
          assignedTo: 'Unassigned',
          createdAt: evts[0].timestamp,
          updatedAt: evts[evts.length - 1].timestamp,
          eventCount: evts.length,
          location: evts[0].doorName || evts[0].doorId || '',
          description: name + ' was denied access ' + evts.length + ' times across ' + new Set(evts.map(function(e) { return e.doorName || e.doorId; })).size + ' doors',
        });
      }
    }
    // Door forced events become incidents
    var forced = events.filter(function(e) { return e.eventType === 'door_forced'; });
    forced.forEach(function(e) {
      incidents.push({
        id: 'INC-' + String(id++).padStart(4, '0'),
        title: 'Door Forced — ' + (e.doorName || e.doorId),
        category: 'Physical Security',
        severity: 'critical',
        status: 'open',
        assignedTo: 'Unassigned',
        createdAt: e.timestamp,
        updatedAt: e.timestamp,
        eventCount: 1,
        location: e.doorName || e.doorId || '',
        description: 'Door was forced open at ' + (e.doorName || e.doorId),
      });
    });
    // After-hours access incidents
    var afterHours = events.filter(function(e) {
      if (e.eventType !== 'access_granted' && e.accessGranted !== true) return false;
      var ts = parseTs(e.timestamp);
      return ts && (ts.getHours() < 5 || ts.getHours() > 23);
    });
    if (afterHours.length >= 3) {
      incidents.push({
        id: 'INC-' + String(id++).padStart(4, '0'),
        title: 'After-Hours Access Cluster',
        category: 'Policy Violation',
        severity: 'medium',
        status: 'open',
        assignedTo: 'Unassigned',
        createdAt: afterHours[0].timestamp,
        updatedAt: afterHours[afterHours.length - 1].timestamp,
        eventCount: afterHours.length,
        location: 'Multiple',
        description: afterHours.length + ' access events between midnight and 5am',
      });
    }
    incidents.sort(function(a, b) { var so = { critical: 0, high: 1, medium: 2, low: 3 }; return (so[a.severity] || 9) - (so[b.severity] || 9); });
    return incidents;
  }

  // ─── SHIFT HANDOFF Section (GSOC) ──────────────────────────────

  let shiftReport = null;

  async function loadShiftHandoff() {
    try {
      var raw = await fetchAnalyticsData(2000);
      shiftReport = generateShiftReport(raw.events, raw.cardholders);
    } catch { /* use cached */ }
    renderShiftHandoff();
  }

  function generateShiftReport(events, cardholders) {
    var now = new Date();
    var shiftStart = new Date(now.getTime() - 8 * 3600000); // 8 hours ago

    // Events during this shift
    var shiftEvents = events.filter(function(e) {
      var ts = parseTs(e.timestamp);
      return ts && ts >= shiftStart;
    });

    // Stats
    var totalEvents = shiftEvents.length;
    var denials = shiftEvents.filter(function(e) { return e.eventType === 'access_denied' || e.accessGranted === false; }).length;
    var grants = shiftEvents.filter(function(e) { return e.eventType === 'access_granted' || e.accessGranted === true; }).length;
    var forced = shiftEvents.filter(function(e) { return e.eventType === 'door_forced'; }).length;

    // Notable events (denials, forced, after-hours)
    var notable = shiftEvents.filter(function(e) {
      if (e.eventType === 'access_denied' || e.accessGranted === false) return true;
      if (e.eventType === 'door_forced' || e.eventType === 'door_held') return true;
      var ts = parseTs(e.timestamp);
      if (ts && (ts.getHours() < 6 || ts.getHours() > 22)) return true;
      return false;
    }).slice(0, 20);

    // Active people during shift
    var activePeople = new Set();
    shiftEvents.forEach(function(e) { var n = e.userName || e.badgeId; if (n) activePeople.add(n); });

    // Doors used
    var doorActivity = {};
    shiftEvents.forEach(function(e) {
      var d = e.doorName || e.doorId;
      if (d) doorActivity[d] = (doorActivity[d] || 0) + 1;
    });
    var topDoors = Object.entries(doorActivity).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 10);

    return {
      shiftStart: shiftStart.toISOString(),
      shiftEnd: now.toISOString(),
      durationHours: 8,
      totalEvents: totalEvents,
      grants: grants,
      denials: denials,
      doorForced: forced,
      activePeople: activePeople.size,
      notable: notable,
      topDoors: topDoors,
      generatedAt: now.toISOString(),
    };
  }

  function renderShiftHandoff() {
    var r = shiftReport || { totalEvents: 0, grants: 0, denials: 0, doorForced: 0, activePeople: 0, notable: [], topDoors: [] };
    var html = '<div class="section-title">Shift Handoff Report</div>';

  // ─── AUDIT TRAIL Section (GSOC) ────────────────────────────────

  let auditData = null;

  async function loadAuditTrail() {
    try {
      var raw = await fetchAnalyticsData(2000);
      // Also pull activity log
      var actRes = await api('GET', '/api/v1/data/entities/audit_log?limit=100').catch(function() { return {}; });
      var auditEntries = actRes.entities || [];
      auditData = buildAuditTrail(raw.events, auditEntries);
    } catch { /* use cached */ }
    renderAuditTrail();
  }

  function buildAuditTrail(events, auditEntries) {
    // Combine access events and audit log entries into unified timeline
    var trail = [];

    events.forEach(function(e) {
      trail.push({
        timestamp: e.timestamp,
        action: e.eventType || (e.accessGranted ? 'access_granted' : 'access_denied'),
        user: e.userName || e.badgeId || 'System',
        target: e.doorName || e.doorId || '-',
        targetType: 'door',
        details: e.connectorType ? 'via ' + e.connectorType : '',
        source: e.siteId || 'cloud',
      });
    });

    auditEntries.forEach(function(a) {
      trail.push({
        timestamp: a.timestamp || a._syncTimestamp,
        action: a.action || a.type || 'audit',
        user: a.user || a.username || 'System',
        target: a.target || a.description || '-',
        targetType: a.targetType || 'system',
        details: a.details || '',
        source: 'audit_log',
      });
    });

    trail.sort(function(a, b) { return (b.timestamp || '').localeCompare(a.timestamp || ''); });
    return trail;
  }

  function renderAuditTrail() {
    var trail = auditData || [];
    var html = '<div class="section-title">Audit Trail</div>';
    html += '<p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1rem">Complete chronological record of all access events and system actions</p>';

    html += '<div class="stat-cards">';
    html += statCard('Total Entries', trail.length, '');
    html += statCard('Access Events', trail.filter(function(t) { return t.targetType === 'door'; }).length, '');
    html += statCard('System Actions', trail.filter(function(t) { return t.targetType !== 'door'; }).length, 'blue');
    html += '</div>';

    html += '<table class="data-table"><thead><tr><th>Time</th><th>Action</th><th>User</th><th>Target</th><th>Type</th><th>Details</th><th>Source</th></tr></thead><tbody>';
    if (trail.length === 0) {
      html += '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:2rem">No audit entries</td></tr>';
    } else {
      trail.slice(0, 50).forEach(function(t) {
        var actionColor = t.action === 'access_denied' ? 'var(--danger)' : t.action === 'door_forced' ? 'var(--danger)' : t.action === 'login' ? 'var(--accent)' : 'var(--text-primary)';
        html += '<tr>';
        html += '<td>' + esc(fmtDateTime(t.timestamp)) + '</td>';
        html += '<td style="color:' + actionColor + ';font-weight:500">' + esc(t.action) + '</td>';

        html += '<td style="font-size:0.8rem;color:var(--text-secondary)">' + esc(t.details) + '</td>';
        html += '<td style="font-size:0.75rem">' + esc(t.source) + '</td>';
        html += '</tr>';
      });
    }
    html += '</tbody></table>';

    document.getElementById('content').innerHTML = html;
  }
