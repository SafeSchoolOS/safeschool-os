<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Management Analytics</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
  --teal: #14b8a6; --pink: #ec4899; --orange: #f97316; --indigo: #6366f1; --cyan: #06b6d4;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-badge { font-size: 11px; padding: 4px 10px; background: var(--accent-dim); color: var(--accent); border-radius: 12px; font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); }
.val-accent { color: var(--accent); }
.val-amber { color: var(--amber); }
.val-red { color: var(--red); }
.val-blue { color: var(--blue); }
.val-purple { color: var(--purple); }
.val-teal { color: var(--teal); }
.val-pink { color: var(--pink); }
.val-orange { color: var(--orange); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr; } }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
.card-body { padding: 0; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-gray { background: var(--bg3); color: var(--text3); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-teal { background: rgba(20,184,166,0.15); color: var(--teal); }
.badge-pink { background: rgba(236,72,153,0.15); color: var(--pink); }
.badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
.refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-wrap: wrap; }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; border-right: 1px solid var(--border); color: var(--text3); transition: all 0.15s; min-width: 90px; white-space: nowrap; }
.tab:last-child { border-right: none; }
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active { color: var(--accent); background: var(--accent-dim); }

/* Charts */
.chart-container { padding: 20px; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 180px; padding: 0 10px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.3s; min-height: 2px; }
.bar:hover { opacity: 0.8; }
.bar-label { font-size: 9px; color: var(--text3); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.bar-value { font-size: 9px; color: var(--text2); font-weight: 600; }
.chart-wrap { display: flex; }
.chart-y-axis { display: flex; flex-direction: column; justify-content: space-between; height: 180px; padding-right: 8px; }
.chart-y-label { font-size: 10px; color: var(--text3); text-align: right; }

.util-bar { height: 20px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.util-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.util-label { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 600; color: var(--text); }

.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; }

/* Risk score */
.risk-score { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 24px; border-radius: 6px; font-size: 12px; font-weight: 700; }
.risk-high { background: rgba(239,68,68,0.2); color: var(--red); }
.risk-medium { background: rgba(245,158,11,0.2); color: var(--amber); }
.risk-low { background: rgba(34,197,94,0.2); color: var(--green); }

/* Metric row */
.metric-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); }
.metric-row:last-child { border-bottom: none; }
.metric-name { font-size: 13px; }
.metric-val { font-size: 14px; font-weight: 700; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; cursor: pointer; transition: border-color 0.15s; }
.summary-card:hover { border-color: var(--accent); }
.summary-card .s-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.summary-card .s-metric { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.summary-card .s-trend { font-size: 11px; }
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-flat { color: var(--text3); }

/* Scrollable table wrapper */
.table-scroll { max-height: 500px; overflow-y: auto; }
</style>
</head>

  // ========================================================================
  // RENDER HELPERS
  // ========================================================================

  function renderBarChart(data, labelKey, valueKey, maxVal, color, height) {
    height = height || 180;
    var html = '<div class="chart-wrap">';
    html += '<div class="chart-y-axis" style="height:' + height + 'px">';
    var steps = 4;
    for (var y = steps; y >= 0; y--) {
      var lbl = Math.round(maxVal * y / steps);
      html += '<div class="chart-y-label">' + lbl + '</div>';
    }
    html += '</div>';
    html += '<div class="bar-chart" style="flex:1;height:' + height + 'px">';
    data.forEach(function(d) {
      var val = d[valueKey] || 0;
      var pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
      var barColor = typeof color === 'function' ? color(d) : (color || 'var(--accent)');
      html += '<div class="bar-col">';
      html += '<div class="bar-value">' + val + '</div>';
      html += '<div class="bar" style="height:' + Math.max(pct, 1) + '%;background:' + barColor + '"></div>';
      html += '<div class="bar-label">' + esc(String(d[labelKey])) + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    return html;
  }

  function renderUtilBar(pct, width) {
    width = width || 100;
    var color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--amber)';
    return '<div class="util-bar" style="width:' + width + 'px"><div class="util-fill" style="width:' + pct + '%;background:' + color + '"></div><span class="util-label">' + pct + '%</span></div>';
  }

  function renderRiskScore(score) {
    return '<span class="risk-score ' + riskClass(score) + '">' + score + '</span>';
  }

  function statusBadgeClass(status) {
    if (status === 'Confirmed' || status === 'Escalated' || status === 'Overdue' || status === 'Tow Scheduled' || status === 'Critical') return 'badge-red';
    if (status === 'Investigating' || status === 'Open' || status === 'Warning Sent' || status === 'Warning Issued' || status === 'Monitoring' || status === 'Service Due') return 'badge-amber';
    if (status === 'Cleared' || status === 'Resolved' || status === 'Normal' || status === 'Stable') return 'badge-green';
    if (status === 'Retention Offer') return 'badge-red';
    if (status === 'Schedule Check-in') return 'badge-amber';
    if (status === 'Monitor') return 'badge-green';
    return 'badge-gray';
  }

  function trendArrow(trend) {
    if (trend === 'Increasing' || trend === 'Declining' || trend === 'Sharp Decline') return '<span style="color:var(--red)">&#9660;</span>';
    if (trend === 'Decreasing') return '<span style="color:var(--green)">&#9650;</span>';
    if (trend === 'Stable') return '<span style="color:var(--text3)">&#8212;</span>';
    if (trend === 'Seasonal') return '<span style="color:var(--amber)">&#8776;</span>';
    if (trend === 'Critical') return '<span style="color:var(--red)">&#9888;</span>';
    return '';
  }

      html += '<tr style="background:rgba(239,68,68,0.05)">';
      html += '<td><strong style="color:var(--red)">' + r.unit + '</strong></td>';
      html += '<td><span class="badge badge-red">' + r.count + ' complaints</span></td>';
      html += '<td>' + esc(r.types) + '</td>';
      html += '<td style="color:var(--text2)">' + r.lastWarning + '</td>';
      html += '<td><span class="badge badge-red">Escalated</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    // Complaint types breakdown bar chart
    var typeCounts = {};
    complaints.forEach(function(c) { typeCounts[c.type] = (typeCounts[c.type] || 0) + 1; });
    var typeData = Object.keys(typeCounts).map(function(t) { return { type: t, count: typeCounts[t] }; });
    typeData.sort(function(a, b) { return b.count - a.count; });
    var typeColors = { Noise: 'var(--red)', Pet: 'var(--amber)', Smoking: 'var(--purple)', Parking: 'var(--blue)', Trash: 'var(--teal)' };

    html += '<div class="grid-2">';
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Complaints by Type</h2></div>';
    html += '<div class="chart-container">';
    html += renderBarChart(typeData, 'type', 'count', Math.max.apply(null, typeData.map(function(t){return t.count;})) + 2, function(d) { return typeColors[d.type] || 'var(--accent)'; });
    html += '</div></div>';

    // Complaints by severity
    var sevCounts = { High: 0, Medium: 0, Low: 0 };
    complaints.forEach(function(c) { sevCounts[c.severity]++; });
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>By Severity</h2></div>';
    html += '<div class="card-body">';
    html += '<div class="metric-row"><div class="metric-name"><span class="badge badge-red">High</span></div><div class="metric-val val-red">' + sevCounts.High + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name"><span class="badge badge-amber">Medium</span></div><div class="metric-val val-amber">' + sevCounts.Medium + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name"><span class="badge badge-green">Low</span></div><div class="metric-val val-green">' + sevCounts.Low + '</div></div>';
    html += '</div>';

    // By status
    var statusCounts = {};
    complaints.forEach(function(c) { statusCounts[c.status] = (statusCounts[c.status] || 0) + 1; });
    html += '<div style="padding:0 20px 16px;border-top:1px solid var(--border)">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--text2);padding:12px 0 8px;text-transform:uppercase;letter-spacing:0.04em">By Status</div>';
    Object.keys(statusCounts).forEach(function(st) {
      html += '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px">';
      html += '<span class="badge ' + statusBadgeClass(st) + '">' + st + '</span>';
      html += '<span style="font-weight:600">' + statusCounts[st] + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
    html += '</div>';

    // Full complaint log
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Complaint Log</h2><span class="count">' + complaints.length + ' complaints</span></div>';
    html += '<div class="card-body"><div class="table-scroll"><table>';
    html += '<tr><th>Timestamp</th><th>Unit</th><th>Reporter</th><th>Type</th><th>Severity</th><th>Status</th></tr>';
    complaints.forEach(function(c) {
      var isRepeat = repeatOffenders.some(function(r) { return r.unit === c.unit; });
      var rowStyle = isRepeat ? ' style="background:rgba(239,68,68,0.03)"' : '';
      var sevCls = c.severity === 'High' ? 'badge-red' : c.severity === 'Medium' ? 'badge-amber' : 'badge-green';
      html += '<tr' + rowStyle + '>';
      html += '<td style="color:var(--text2);white-space:nowrap;font-size:12px">' + c.timestamp + '</td>';
      html += '<td><strong>' + c.unit + '</strong>' + (isRepeat ? ' <span style="color:var(--red);font-size:10px">REPEAT</span>' : '') + '</td>';
      html += '<td style="color:var(--text2)">' + c.reporter + '</td>';
      html += '<td><span class="badge ' + (typeColors[c.type] ? 'badge-' + (c.type === 'Noise' ? 'red' : c.type === 'Pet' ? 'amber' : c.type === 'Smoking' ? 'purple' : c.type === 'Parking' ? 'blue' : 'teal') : 'badge-gray') + '">' + c.type + '</span></td>';
      html += '<td><span class="badge ' + sevCls + '">' + c.severity + '</span></td>';
      html += '<td><span class="badge ' + statusBadgeClass(c.status) + '">' + c.status + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div></div>';

    return html;
  }


  // ========================================================================
  // TAB 5: OCCUPANCY PATTERNS
  // ========================================================================

    html += '<div class="stat-card"><div class="label">Lowest Occupancy</div><div class="value val-amber">' + (lowestHour.hour < 10 ? '0' : '') + lowestHour.hour + ':00</div><div class="sub">' + lowestHour.pct + '% of residents home</div></div>';

      html += '<td><strong>Floor ' + f.floor + '</strong></td>';
      html += '<td style="color:var(--text2)">' + f.type + '</td>';

      html += '<td>' + renderUtilBar(f.weekendPct, 80) + '</td>';
      html += '<td style="color:' + diffColor + '">' + (diff > 0 ? '+' : '') + diff + '%</td>';
      html += '</tr>';
    });
    html += '</table></div></div></div>';

    // Tenant category patterns
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Average Time in Building by Tenant Category</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Category</th><th>Count</th><th>Avg Hrs/Day</th><th>Weekday Home</th><th>Weekend Home</th></tr>';
    tenantCategories.forEach(function(t) {
      html += '<tr>';
      html += '<td><strong>' + t.category + '</strong></td>';
      html += '<td style="color:var(--text2)">' + t.count + '</td>';
      html += '<td><span style="color:var(--accent);font-weight:600">' + t.avgHrsHome + 'h</span></td>';
      html += '<td>' + t.weekday + '</td>';
      html += '<td>' + t.weekend + '</td>';
      html += '</tr>';

    // Weekend vs Weekday summary
    html += '<div style="padding:16px 20px;border-top:1px solid var(--border)">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em">Weekend vs Weekday</div>';
    html += '<div style="display:flex;gap:20px">';
    html += '<div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">WEEKDAY AVG</div><div style="font-size:22px;font-weight:700;color:var(--amber)">42%</div><div style="font-size:11px;color:var(--text3)">residents home 9am-5pm</div></div>';
    html += '<div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">WEEKEND AVG</div><div style="font-size:22px;font-weight:700;color:var(--green)">74%</div><div style="font-size:11px;color:var(--text3)">residents home 9am-5pm</div></div>';
    html += '</div></div>';

    html += '</div>';
    html += '</div>';

    return html;

  // ========================================================================
  // TAB 6: AMENITY USAGE
  // ========================================================================

  function renderAmenityTab() {
    var html = '';
    var totalSessions = amenities.reduce(function(s, a) { return s + a.sessions; }, 0);
    var avgUtil = Math.round(amenities.reduce(function(s, a) { return s + a.utilization; }, 0) / amenities.length);
    var topAmenity = amenities[0];
    var totalBooked = amenities.reduce(function(s, a) { return s + a.booked; }, 0);
    var totalUsed = amenities.reduce(function(s, a) { return s + a.used; }, 0);
    var bookingUtil = totalBooked > 0 ? Math.round(totalUsed / totalBooked * 100) : 0;

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Total Sessions</div><div class="value val-accent">' + totalSessions.toLocaleString() + '</div><div class="sub">This month</div></div>';
    html += '<div class="stat-card"><div class="label">Avg Utilization</div><div class="value val-green">' + avgUtil + '%</div><div class="sub">Across all amenities</div></div>';
    html += '<div class="stat-card"><div class="label">Most Popular</div><div class="value val-blue" style="font-size:18px">' + topAmenity.name + '</div><div class="sub">' + topAmenity.sessions + ' sessions</div></div>';
    html += '<div class="stat-card"><div class="label">Booking Utilization</div><div class="value val-purple">' + bookingUtil + '%</div><div class="sub">Booked vs actually used</div></div>';
    html += '</div>';

    // Usage by amenity bar chart
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Usage by Amenity</h2></div>';
    html += '<div class="chart-container">';
    html += renderBarChart(amenities, 'name', 'sessions', 400, function(d) { return d.color; });
    html += '</div></div>';

    // Usage by time of day
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Total Amenity Usage by Hour</h2></div>';
    html += '<div class="chart-container">';
    html += renderBarChart(amenityByHour, 'hour', 'usage', 55, function(d) {
      return d.usage > 35 ? 'var(--green)' : d.usage > 20 ? 'var(--accent)' : 'var(--text3)';
    });
    html += '</div></div>';

    html += '<div class="grid-2">';

    // Amenity details
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Amenity Details</h2><span class="count">' + amenities.length + ' amenities</span></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Amenity</th><th>Sessions</th><th>Peak Hours</th><th>Utilization</th></tr>';
    amenities.forEach(function(a) {
      var uColor = a.utilization >= 70 ? 'var(--green)' : a.utilization >= 50 ? 'var(--accent)' : 'var(--amber)';
      html += '<tr>';
      html += '<td><div style="display:flex;align-items:center;gap:8px"><div style="width:4px;height:24px;border-radius:2px;background:' + a.color + '"></div><strong>' + esc(a.name) + '</strong></div></td>';
      html += '<td>' + a.sessions + '</td>';
      html += '<td style="color:var(--text2)">' + a.peakHour + '</td>';
      html += '<td><div class="util-bar" style="width:100px"><div class="util-fill" style="width:' + a.utilization + '%;background:' + uColor + '"></div><span class="util-label">' + a.utilization + '%</span></div></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    // Booking utilization (booked vs used)
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Booking vs Actual Usage</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Amenity</th><th>Booked</th><th>Used</th><th>No-Show Rate</th></tr>';
    amenities.filter(function(a) { return a.booked > 0; }).forEach(function(a) {
      var noShow = Math.round((1 - a.used / a.booked) * 100);
      var nsColor = noShow >= 25 ? 'var(--red)' : noShow >= 15 ? 'var(--amber)' : 'var(--green)';
      html += '<tr>';
      html += '<td><strong>' + esc(a.name) + '</strong></td>';
      html += '<td style="color:var(--text2)">' + a.booked + '</td>';
      html += '<td>' + a.used + '</td>';
      html += '<td style="color:' + nsColor + ';font-weight:600">' + noShow + '%</td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    html += '</div>';
    return html;
  }

  // TAB 8: PARKING ANALYTICS
  // ========================================================================

  function renderParkingTab() {
    var html = '';

    html += '<div class="stats-row">';

    html += '<div class="card">';
    html += '<div class="card-head"><h2>Parking Occupancy by Hour (%)</h2></div>';
    html += '<div class="chart-container">';
    var phData = parkingByHour.map(function(p) { return { hour: (p.hour < 10 ? '0' : '') + p.hour, pct: p.pct }; });
    html += renderBarChart(phData, 'hour', 'pct', 100, function(d) {
      return d.pct >= 80 ? 'var(--red)' : d.pct >= 60 ? 'var(--amber)' : 'var(--green)';

      html += '<td><div class="util-bar" style="width:100px"><div class="util-fill" style="width:' + pct + '%;background:' + color + '"></div><span class="util-label">' + pct + '%</span></div></td>';
      html += '</tr>';
    });

    html += '<table><tr><th>Level</th><th>Chargers</th><th>In Use</th><th>Usage</th></tr>';

      var evPct = Math.round(l.evInUse / l.ev * 100);

      html += '<td><strong>' + l.level + '</strong></td>';
      html += '<td style="color:var(--text2)">' + l.ev + '</td>';
      html += '<td style="color:var(--teal)">' + l.evInUse + '</td>';

    html += '<tr><th>Spot</th><th>License Plate</th><th>Consecutive Nights</th><th>Status</th></tr>';

      html += '<td><strong>' + v.spot + '</strong></td>';
      html += '<td style="color:var(--text2);font-family:monospace">' + v.plate + '</td>';
      html += '<td style="color:' + nightColor + ';font-weight:600">' + v.nights + '</td>';
      html += '<td><span class="badge ' + statusBadgeClass(v.status) + '">' + v.status + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    html += '</div>';
    return html;
  }


  // ========================================================================
  // TAB 9: MAINTENANCE PREDICTIVE
  // ========================================================================

  function renderMaintenanceTab() {
    var html = '';
    var criticalDoors = doorHealth.filter(function(d) { return d.health < 70; }).length;
    var overdueElevators = elevators.filter(function(e) { return e.prediction === 'Overdue'; }).length;
    var totalRequests = maintenanceCategories.reduce(function(s, c) { return s + c.requests; }, 0);
    var highAlerts = predictiveAlerts.filter(function(a) { return a.severity === 'High'; }).length;

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Critical Door Health</div><div class="value val-red">' + criticalDoors + '</div><div class="sub">Doors below 70% health</div></div>';
    html += '<div class="stat-card"><div class="label">Elevator Alerts</div><div class="value val-amber">' + (overdueElevators + elevators.filter(function(e){return e.prediction==='Service Due';}).length) + '</div><div class="sub">' + overdueElevators + ' overdue for service</div></div>';
    html += '<div class="stat-card"><div class="label">Total Requests (Month)</div><div class="value val-accent">' + totalRequests + '</div><div class="sub">Across ' + maintenanceCategories.length + ' categories</div></div>';
    html += '<div class="stat-card"><div class="label">Predictive Alerts</div><div class="value val-orange">' + predictiveAlerts.length + '</div><div class="sub">' + highAlerts + ' high severity</div></div>';
    html += '</div>';

    // Door health scores
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Door Health Scores</h2><span class="count">' + doorHealth.length + ' doors monitored</span></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Door</th><th>Health Score</th><th>Forced Events (30d)</th><th>Held Open (30d)</th><th>Trend</th></tr>';
    doorHealth.sort(function(a, b) { return a.health - b.health; });
    doorHealth.forEach(function(d) {
      var hColor = d.health >= 85 ? 'var(--green)' : d.health >= 70 ? 'var(--amber)' : 'var(--red)';
      html += '<tr' + (d.health < 70 ? ' style="background:rgba(239,68,68,0.04)"' : '') + '>';
      html += '<td><strong>' + esc(d.name) + '</strong></td>';
      html += '<td><div class="util-bar" style="width:100px"><div class="util-fill" style="width:' + d.health + '%;background:' + hColor + '"></div><span class="util-label">' + d.health + '</span></div></td>';
      html += '<td style="color:' + (d.forcedEvents >= 10 ? 'var(--red)' : 'var(--text)') + '">' + d.forcedEvents + '</td>';
      html += '<td style="color:' + (d.heldEvents >= 15 ? 'var(--red)' : 'var(--text)') + '">' + d.heldEvents + '</td>';
      html += '<td>' + trendArrow(d.trend) + ' <span class="badge ' + statusBadgeClass(d.trend) + '">' + d.trend + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    html += '<div class="grid-2">';

    // Elevator status
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Elevator Downtime Predictions</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Elevator</th><th>Floors</th><th>Uptime</th><th>Last Service</th><th>Next Service</th><th>Status</th></tr>';
    elevators.forEach(function(e) {
      var uptimeColor = e.uptime >= 99 ? 'var(--green)' : e.uptime >= 97 ? 'var(--amber)' : 'var(--red)';
      html += '<tr' + (e.prediction === 'Overdue' ? ' style="background:rgba(239,68,68,0.04)"' : '') + '>';
      html += '<td><strong>' + esc(e.id) + '</strong></td>';
      html += '<td style="color:var(--text2)">' + e.floors + '</td>';
      html += '<td style="color:' + uptimeColor + ';font-weight:600">' + e.uptime + '%</td>';
      html += '<td style="color:var(--text2);font-size:12px">' + e.lastService + '</td>';
      html += '<td style="font-size:12px">' + e.nextService + '</td>';
      html += '<td><span class="badge ' + statusBadgeClass(e.prediction) + '">' + e.prediction + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    // Maintenance categories
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Top Maintenance Request Categories</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Category</th><th>Requests (30d)</th><th>Avg Response</th><th>Trend</th></tr>';
    maintenanceCategories.forEach(function(c) {
      html += '<tr>';
      html += '<td><strong>' + c.category + '</strong></td>';
      html += '<td>' + c.requests + '</td>';
      html += '<td style="color:var(--text2)">' + c.avgResponse + '</td>';
      html += '<td>' + trendArrow(c.trend) + ' <span style="font-size:12px;color:var(--text2)">' + c.trend + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    html += '</div>';

    // Predictive alerts
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Predictive Maintenance Alerts</h2><span class="count" style="background:rgba(249,115,22,0.15);color:var(--orange)">' + predictiveAlerts.length + ' alerts</span></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Equipment</th><th>Age</th><th>Usage Cycles</th><th>Prediction</th><th>Severity</th></tr>';
    predictiveAlerts.forEach(function(a) {
      var sevCls = a.severity === 'High' ? 'badge-red' : 'badge-amber';
      html += '<tr' + (a.severity === 'High' ? ' style="background:rgba(239,68,68,0.04)"' : '') + '>';
      html += '<td><strong>' + esc(a.equipment) + '</strong></td>';
      html += '<td style="color:var(--text2)">' + a.age + '</td>';
      html += '<td style="color:var(--text2);font-family:monospace;font-size:12px">' + a.cycles + '</td>';
      html += '<td>' + esc(a.prediction) + '</td>';
      html += '<td><span class="badge ' + sevCls + '">' + a.severity + '</span></td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    return html;
  }


  // ========================================================================
  // TAB 10: LEASE & REVENUE
  // ========================================================================

  function renderRevenueTab() {
    var html = '';
    var totalRentPossible = avgRentByType.reduce(function(s, t) { return s + t.avgRent * t.units; }, 0);
    var totalRentActual = avgRentByType.reduce(function(s, t) { return s + t.avgRent * t.occupied; }, 0);
    var totalAmenityRev = amenityRevenueBreakdown.reduce(function(s, a) { return s + a.revenue; }, 0);

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Rent Collection Rate</div><div class="value val-green">' + rentCollectionRate + '%</div><div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:' + rentCollectionRate + '%;background:var(--green)"></div></div></div>';
    html += '<div class="stat-card"><div class="label">Vacancy Loss</div><div class="value val-red">' + fmtMoney(vacancyLoss) + '</div><div class="sub">Monthly revenue impact</div></div>';
    html += '<div class="stat-card"><div class="label">Amenity Revenue</div><div class="value val-accent">' + fmtMoney(totalAmenityRev) + '</div><div class="sub">Bookable amenities</div></div>';
    html += '<div class="stat-card"><div class="label">Avg Revenue / Unit</div><div class="value val-purple">' + fmtMoney(overviewStats.revenuePerUnit) + '</div><div class="sub">Across occupied units</div></div>';
    html += '</div>';

    // Occupancy rate trend (12 months)
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Occupancy Rate Trend (12 Months)</h2></div>';
    html += '<div class="chart-container">';
    var ocData = occupancyMonths.map(function(m, i) { return { month: m, rate: occupancyRates[i] }; });
    html += renderBarChart(ocData, 'month', 'rate', 100, function(d) {
      return d.rate >= 95 ? 'var(--green)' : d.rate >= 90 ? 'var(--accent)' : 'var(--amber)';
    });
    html += '</div></div>';

    // Monthly revenue trend
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Monthly Revenue Trend (12 Months)</h2></div>';
    html += '<div class="chart-container">';
    var maxRev = 950000;
    html += '<div class="chart-wrap">';
    html += '<div class="chart-y-axis" style="height:180px">';
    for (var y = 4; y >= 0; y--) {
      html += '<div class="chart-y-label">$' + Math.round(maxRev * y / 4 / 1000) + 'k</div>';
    }
    html += '</div>';
    html += '<div class="bar-chart" style="flex:1;height:180px">';
    monthlyRevenue.forEach(function(m) {
      var total = m.rent + m.amenity + m.parking;
      var pct = (total / maxRev) * 100;
      html += '<div class="bar-col">';
      html += '<div class="bar-value" style="font-size:8px">$' + Math.round(total / 1000) + 'k</div>';
      html += '<div class="bar" style="height:' + Math.max(pct, 1) + '%;background:linear-gradient(to top, var(--accent) 0%, var(--green) 60%, var(--purple) 100%)" title="Rent: ' + fmtMoney(m.rent) + '&#10;Amenity: ' + fmtMoney(m.amenity) + '&#10;Parking: ' + fmtMoney(m.parking) + '"></div>';
      html += '<div class="bar-label">' + m.month + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    html += '</div></div>';

    html += '<div class="grid-2">';

    // Average rent by unit type
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Average Rent by Unit Type</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Type</th><th>Avg Rent</th><th>Occupied</th><th>Total</th><th>Monthly Revenue</th></tr>';
    avgRentByType.forEach(function(t) {
      var rev = t.avgRent * t.occupied;
      html += '<tr>';
      html += '<td><strong>' + t.type + '</strong></td>';
      html += '<td style="color:var(--accent);font-weight:600">' + fmtMoney(t.avgRent) + '</td>';
      html += '<td style="color:var(--green)">' + t.occupied + '</td>';
      html += '<td style="color:var(--text2)">' + t.units + '</td>';
      html += '<td style="font-weight:600">' + fmtMoney(rev) + '</td>';
      html += '</tr>';
    });
    html += '<tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td></td><td style="color:var(--green)">' + avgRentByType.reduce(function(s,t){return s+t.occupied;},0) + '</td><td style="color:var(--text2)">' + avgRentByType.reduce(function(s,t){return s+t.units;},0) + '</td><td style="font-weight:700;color:var(--green)">' + fmtMoney(totalRentActual) + '</td></tr>';
    html += '</table></div></div>';

    // Lease expiration timeline
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Lease Expiration Timeline (Next 6 Months)</h2></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Month</th><th>Expiring</th><th>Renewed</th><th>At Risk</th><th>Renewal Rate</th></tr>';
    leaseExpirations.forEach(function(l) {
      var renewRate = l.count > 0 ? Math.round(l.renewed / l.count * 100) : 0;
      var rColor = renewRate >= 70 ? 'var(--green)' : renewRate >= 50 ? 'var(--amber)' : 'var(--red)';
      html += '<tr>';
      html += '<td><strong>' + l.month + '</strong></td>';
      html += '<td>' + l.count + '</td>';
      html += '<td style="color:var(--green)">' + l.renewed + '</td>';
      html += '<td style="color:var(--red)">' + l.risk + '</td>';
      html += '<td><div class="util-bar" style="width:100px"><div class="util-fill" style="width:' + renewRate + '%;background:' + rColor + '"></div><span class="util-label">' + renewRate + '%</span></div></td>';
      html += '</tr>';
    });
    var totalExp = leaseExpirations.reduce(function(s,l){return s+l.count;},0);
    var totalRenewed = leaseExpirations.reduce(function(s,l){return s+l.renewed;},0);
    var totalAtRisk = leaseExpirations.reduce(function(s,l){return s+l.risk;},0);
    html += '<tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td><strong>' + totalExp + '</strong></td><td style="color:var(--green);font-weight:600">' + totalRenewed + '</td><td style="color:var(--red);font-weight:600">' + totalAtRisk + '</td><td><div class="util-bar" style="width:100px"><div class="util-fill" style="width:' + Math.round(totalRenewed/totalExp*100) + '%;background:var(--amber)"></div><span class="util-label">' + Math.round(totalRenewed/totalExp*100) + '%</span></div></td></tr>';
    html += '</table></div></div>';

    html += '</div>';

    // Revenue per amenity
    html += '<div class="grid-2">';
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Revenue per Amenity</h2></div>';
    html += '<div class="chart-container">';
    var amenRevColors = ['var(--accent)', 'var(--blue)', 'var(--purple)', 'var(--teal)', 'var(--pink)', 'var(--amber)'];
    var amenRevData = amenityRevenueBreakdown.map(function(a, i) { return { name: a.amenity, revenue: a.revenue, color: amenRevColors[i] }; });
    html += renderBarChart(amenRevData, 'name', 'revenue', 4000, function(d) { return d.color; });
    html += '</div>';
    html += '<div style="padding:0 20px 16px"><table>';
    html += '<tr><th>Amenity</th><th>Monthly Revenue</th><th>Share</th></tr>';
    amenityRevenueBreakdown.forEach(function(a) {
      html += '<tr><td><strong>' + a.amenity + '</strong></td><td style="color:var(--green)">' + fmtMoney(a.revenue) + '</td><td style="color:var(--text2)">' + Math.round(a.revenue / totalAmenityRev * 100) + '%</td></tr>';
    });
    html += '<tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td style="color:var(--green);font-weight:700">' + fmtMoney(totalAmenityRev) + '</td><td>100%</td></tr>';
    html += '</table></div></div>';

    // Revenue breakdown summary
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Revenue Breakdown (Current Month)</h2></div>';
    html += '<div class="card-body">';
    var currentRev = monthlyRevenue[monthlyRevenue.length - 1];
    var parkingRev = currentRev.parking;
    var netRev = currentRev.rent + currentRev.amenity + currentRev.parking;
    html += '<div class="metric-row"><div class="metric-name">Gross Rent</div><div class="metric-val val-green">' + fmtMoney(currentRev.rent) + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name">Vacancy Loss</div><div class="metric-val val-red">-' + fmtMoney(vacancyLoss) + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name">Amenity Revenue</div><div class="metric-val val-accent">' + fmtMoney(currentRev.amenity) + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name">Parking Revenue</div><div class="metric-val val-blue">' + fmtMoney(parkingRev) + '</div></div>';
    html += '<div class="metric-row"><div class="metric-name">Late Fees Collected</div><div class="metric-val val-amber">' + fmtMoney(3800) + '</div></div>';
    html += '<div class="metric-row" style="border-top:2px solid var(--border)"><div class="metric-name"><strong>Net Revenue</strong></div><div class="metric-val val-green"><strong>' + fmtMoney(netRev - vacancyLoss + 3800) + '</strong></div></div>';
    html += '</div></div>';

    html += '</div>';
    return html;
  }


  // ========================================================================
  // INIT
  // ========================================================================

  render();
})();
</script>
</body>
</html>
