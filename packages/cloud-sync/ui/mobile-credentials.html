<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Credential Management</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #8b5cf6; --accent-hover: #7c3aed; --accent-dim: rgba(139,92,246,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6; --gray: #6b7280;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; padding: 1.5rem; overflow-y: auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.title { font-size: 1.25rem; font-weight: 700; }
.subtitle { color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
.stat-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.blue { color: var(--blue); }
.stat-value.purple { color: var(--purple); }
.stat-value.gray { color: var(--gray); }
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
.tab { padding: 0.6rem 1.25rem; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.search { padding: 0.4rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; min-width: 220px; outline: none; }
.search:focus { border-color: var(--accent); }
select.filter { padding: 0.4rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; outline: none; appearance: none; padding-right: 24px; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5'%3e%3cpath d='M0 0l4 5 4-5z' fill='%235a5c72'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; }
.btn { padding: 0.4rem 0.9rem; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; border-radius: 4px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-green { background: transparent; border: 1px solid var(--green); color: var(--green); }
.btn-green:hover { background: rgba(34,197,94,0.1); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.6rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); border-bottom: 1px solid var(--border); }
td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
tr { cursor: pointer; }
tr:hover { background: var(--bg2); }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
.badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-pending { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-suspended { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-revoked { background: rgba(107,114,128,0.15); color: var(--gray); }
.badge-ble { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-nfc { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-qr { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-ios { background: rgba(107,114,128,0.15); color: #a1a1aa; }
.badge-android { background: rgba(34,197,94,0.15); color: var(--green); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
.form-row { margin-bottom: 0.75rem; }
.form-label { display: block; font-size: 0.8rem; color: var(--text3); margin-bottom: 0.25rem; }
.form-input { width: 100%; padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; outline: none; }
.form-input:focus { border-color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.zone-chips { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.375rem; }
.zone-chip { padding: 0.2rem 0.5rem; background: var(--bg3); border-radius: 4px; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); }
.zone-chip.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.detail-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
.detail-item { }
.detail-item-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
.detail-item-value { font-size: 0.85rem; }
.event-list { max-height: 200px; overflow-y: auto; }
.event-row { display: flex; gap: 0.75rem; padding: 0.35rem 0; border-bottom: 1px solid rgba(42,42,69,0.5); font-size: 0.8rem; }
.event-time { color: var(--text3); width: 80px; flex-shrink: 0; }
.event-desc { color: var(--text2); }
.qr-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-top: 1.5rem; }
.qr-placeholder { width: 160px; height: 160px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #333; margin: 0.75rem 0; }
.qr-grid { display: grid; grid-template-columns: auto 1fr; gap: 1.5rem; align-items: start; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; loadData(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  // ─── State ───────────────────────────────────────────────────
  var currentTab = 'all';
  var searchText = '';
  var credTypeFilter = '';
  var showModal = false;
  var selectedCred = null;
  var credentials = [];
  var zones = [];

  // ─── Zones ─────────────────────────────────────────────────
  var ZONES = [
    { id: 'z1', name: 'Main Lobby', doorCount: 4 },
    { id: 'z2', name: 'Parking Garage', doorCount: 6 },
    { id: 'z3', name: 'Fitness Center', doorCount: 2 },
    { id: 'z4', name: 'Pool & Spa', doorCount: 2 },
    { id: 'z5', name: 'Rooftop Lounge', doorCount: 2 },
    { id: 'z6', name: 'Co-Working Space', doorCount: 2 },
    { id: 'z7', name: 'Package Room', doorCount: 2 },
    { id: 'z8', name: 'Bike Storage', doorCount: 2 },
    { id: 'z9', name: 'Residential Floors', doorCount: 25 },
    { id: 'z10', name: 'Leasing Office', doorCount: 2 },
    { id: 'z11', name: 'Maintenance', doorCount: 3 },
    { id: 'z12', name: 'Loading Dock', doorCount: 2 },
  ];
  zones = ZONES;

  // ─── Demo Data ───────────────────────────────────────────────
  var FIRST = ['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Thomas','Sarah','Chris','Karen','Daniel','Nancy','Matt','Emily','Andrew','Lisa','Kevin','Amanda','Brian','Donna','Steven','Michelle','Jason','Carol','Ryan','Rebecca','Eric','Laura','Nick','Amy','Josh','Angela','Alex','Sophia','Marcus','Olivia','Derek','Mia'];
  var LAST = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Thompson','White','Harris','Clark','Lewis','Walker','Young','Allen','King','Wright','Scott','Torres','Hill','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter'];

  var PHONE_MODELS = [
    { model: 'iPhone 15 Pro Max', os: 'iOS', osVer: '17.4.1' },
    { model: 'iPhone 15 Pro', os: 'iOS', osVer: '17.3.2' },
    { model: 'iPhone 15', os: 'iOS', osVer: '17.4.1' },
    { model: 'iPhone 14 Pro', os: 'iOS', osVer: '17.4' },
    { model: 'iPhone 14', os: 'iOS', osVer: '17.3.1' },
    { model: 'iPhone 13', os: 'iOS', osVer: '17.2.1' },
    { model: 'iPhone SE (3rd gen)', os: 'iOS', osVer: '17.4.1' },
    { model: 'Samsung Galaxy S24 Ultra', os: 'Android', osVer: '14' },
    { model: 'Samsung Galaxy S24+', os: 'Android', osVer: '14' },
    { model: 'Samsung Galaxy S24', os: 'Android', osVer: '14' },
    { model: 'Samsung Galaxy S23', os: 'Android', osVer: '14' },
    { model: 'Samsung Galaxy A54', os: 'Android', osVer: '14' },
    { model: 'Samsung Galaxy Z Flip5', os: 'Android', osVer: '14' },
    { model: 'Google Pixel 8 Pro', os: 'Android', osVer: '14' },
    { model: 'Google Pixel 8', os: 'Android', osVer: '14' },
    { model: 'Google Pixel 7a', os: 'Android', osVer: '14' },
    { model: 'OnePlus 12', os: 'Android', osVer: '14' },
    { model: 'Nothing Phone (2)', os: 'Android', osVer: '14' },
  ];

  var CRED_TYPES = ['BLE', 'BLE', 'BLE', 'BLE', 'NFC', 'NFC', 'QR'];
  var DEPARTMENTS = ['Residential', 'Residential', 'Residential', 'Management', 'Maintenance', 'Security', 'Leasing', 'IT', 'Engineering', 'Marketing', 'Operations', 'Front Desk'];
  var APP_VERSIONS = ['3.8.2', '3.8.1', '3.7.4', '3.7.3', '3.6.9', '3.6.5'];

  var EVENT_DESCS = [
    'Granted access - Main Lobby',
    'Granted access - Parking Garage',
    'Granted access - Fitness Center',
    'Granted access - Residential Floor 3',
    'Granted access - Residential Floor 7',
    'Granted access - Co-Working Space',
    'Denied access - Maintenance (no zone)',
    'Granted access - Package Room',
    'Granted access - Bike Storage',
    'Denied access - expired credential',
    'BLE handshake initiated',
    'BLE handshake completed',
    'NFC tap detected',
    'QR code scanned',
    'Granted access - Rooftop Lounge',
  ];

  function genCredentials() {
    var creds = [];
    // Target: 145 total, 132 active, 8 pending, 5 suspended, rest revoked (0)
    var statusDist = [];
    for (var s = 0; s < 132; s++) statusDist.push('ACTIVE');
    for (s = 0; s < 8; s++) statusDist.push('PENDING');
    for (s = 0; s < 5; s++) statusDist.push('SUSPENDED');

    for (var i = 0; i < 145; i++) {
      var fn = FIRST[i % FIRST.length];
      var ln = LAST[Math.floor(i / FIRST.length) % LAST.length];
      var phone = PHONE_MODELS[i % PHONE_MODELS.length];
      var credType = CRED_TYPES[i % CRED_TYPES.length];
      var status = statusDist[i] || 'ACTIVE';
      var dept = DEPARTMENTS[i % DEPARTMENTS.length];
      var unitNum = phone.os === 'iOS' ? 'Unit ' + String(100 + Math.floor(i / 2)) : 'Dept ' + dept;

      var zoneIds = ['z1', 'z9'];
      if (i % 3 === 0) zoneIds.push('z3');
      if (i % 5 === 0) zoneIds.push('z4', 'z5');
      if (i % 7 === 0) zoneIds.push('z6');
      if (i % 11 === 0) zoneIds.push('z2');

      var daysAgo = Math.floor(Math.random() * 365);
      var registered = new Date(Date.now() - daysAgo * 86400000);
      var expires = new Date(registered.getTime() + 365 * 86400000);
      var lastUsedHrs = status === 'ACTIVE' ? Math.floor(Math.random() * 168) : Math.floor(Math.random() * 720) + 168;
      var lastUsed = new Date(Date.now() - lastUsedHrs * 3600000);

      var events = [];
      for (var e = 0; e < 10; e++) {
        events.push({
          time: new Date(Date.now() - (e * Math.floor(Math.random() * 12) + 1) * 3600000).toISOString(),
          desc: EVENT_DESCS[Math.floor(Math.random() * EVENT_DESCS.length)],
        });
      }

      creds.push({
        id: 'mcred-' + String(i + 1).padStart(4, '0'),
        cardholderName: fn + ' ' + ln,
        email: fn.toLowerCase() + '.' + ln.toLowerCase() + '@example.com',
        phone: '+1-555-' + String(1000 + i).slice(-4) + '-' + String(1000 + Math.floor(Math.random() * 9000)).slice(-4),
        unit: unitNum,
        department: dept,
        phoneModel: phone.model,
        os: phone.os,
        osVersion: phone.osVer,
        appVersion: APP_VERSIONS[i % APP_VERSIONS.length],
        credentialType: credType,
        status: status,
        accessZones: zoneIds,
        registeredAt: registered.toISOString(),
        expiresAt: expires.toISOString(),
        lastUsed: lastUsed.toISOString(),
        bleRangeTest: status === 'ACTIVE' ? (Math.random() > 0.1 ? 'PASS' : 'MARGINAL') : 'UNTESTED',
        lastFirmwareUpdate: new Date(Date.now() - Math.floor(Math.random() * 90) * 86400000).toISOString(),
        events: events,
      });
    }
    return creds;
  }

  credentials = genCredentials();

  async function loadData() {
    // In production, would load from API
    render();
  }

  // ─── Filtering ───────────────────────────────────────────────
  function filtered() {
    return credentials.filter(function(c) {
      if (currentTab === 'active' && c.status !== 'ACTIVE') return false;
      if (currentTab === 'pending' && c.status !== 'PENDING') return false;
      if (currentTab === 'suspended' && c.status !== 'SUSPENDED') return false;
      if (currentTab === 'revoked' && c.status !== 'REVOKED') return false;
      if (credTypeFilter && c.credentialType !== credTypeFilter) return false;
      if (searchText) {
        var s = searchText.toLowerCase();
        if (c.cardholderName.toLowerCase().indexOf(s) < 0 && c.phoneModel.toLowerCase().indexOf(s) < 0 && c.unit.toLowerCase().indexOf(s) < 0 && c.department.toLowerCase().indexOf(s) < 0 && c.email.toLowerCase().indexOf(s) < 0) return false;
      }
      return true;
    });
  }

  function countByStatus(st) { return credentials.filter(function(c) { return c.status === st; }).length; }

  // ─── Render ──────────────────────────────────────────────────
  function render() {
    var data = filtered();
    var active = countByStatus('ACTIVE');
    var pending = countByStatus('PENDING');
    var suspended = countByStatus('SUSPENDED');
    var revoked = countByStatus('REVOKED');

    var html = '';
    html += '<div class="header"><div><div class="title">Mobile Credential Management</div>';
    html += '<div class="subtitle">Manage phone-based BLE, NFC, and QR access credentials. MobileCredentialAdapter interface.</div></div>';
    html += '<button class="btn btn-accent" id="btnNewCred">+ New Mobile Credential</button></div>';

    // Stats
    html += '<div class="stats">';
    html += '<div class="stat"><div class="stat-label">Total Mobile Credentials</div><div class="stat-value">' + credentials.length + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Active</div><div class="stat-value green">' + active + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Pending Activation</div><div class="stat-value amber">' + pending + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Suspended</div><div class="stat-value red">' + suspended + '</div></div>';
    html += '</div>';

    // Tabs
    html += '<div class="tabs">';
    var tabList = [
      { key: 'all', label: 'All', count: credentials.length },
      { key: 'active', label: 'Active', count: active },
      { key: 'pending', label: 'Pending', count: pending },
      { key: 'suspended', label: 'Suspended', count: suspended },
      { key: 'revoked', label: 'Revoked', count: revoked },
    ];
    tabList.forEach(function(t) {
      html += '<button class="tab' + (currentTab === t.key ? ' active' : '') + '" data-tab="' + t.key + '">' + t.label + ' (' + t.count + ')</button>';
    });
    html += '</div>';

    // Toolbar
    html += '<div class="toolbar">';
    html += '<input class="search" id="searchInput" placeholder="Search name, phone, department..." value="' + esc(searchText) + '">';
    html += '<select class="filter" id="credTypeFilter"><option value="">All Types</option>';
    ['BLE', 'NFC', 'QR'].forEach(function(t) {
      html += '<option value="' + t + '"' + (credTypeFilter === t ? ' selected' : '') + '>' + t + '</option>';
    });
    html += '</select>';
    html += '<span style="color:var(--text3);font-size:0.8rem;margin-left:auto">' + data.length + ' results</span>';
    html += '</div>';

    // Detail panel (when a row is selected)
    if (selectedCred) {
      html += renderDetailPanel(selectedCred);
    }

    // Table
    html += '<table><thead><tr>';
    html += '<th>Cardholder</th><th>Unit / Dept</th><th>Phone</th><th>OS</th><th>Type</th><th>Status</th><th>Last Used</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    if (data.length === 0) {
      html += '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem">No mobile credentials match your filters</td></tr>';
    } else {
      data.slice(0, 100).forEach(function(c) {
        var statusBadge = c.status === 'ACTIVE' ? 'badge-active' : c.status === 'PENDING' ? 'badge-pending' : c.status === 'SUSPENDED' ? 'badge-suspended' : 'badge-revoked';
        var typeBadge = c.credentialType === 'BLE' ? 'badge-ble' : c.credentialType === 'NFC' ? 'badge-nfc' : 'badge-qr';
        var osBadge = c.os === 'iOS' ? 'badge-ios' : 'badge-android';
        var isSelected = selectedCred && selectedCred.id === c.id;

        html += '<tr class="cred-row' + (isSelected ? ' selected' : '') + '" data-id="' + c.id + '" style="' + (isSelected ? 'background:var(--bg3)' : '') + '">';
        html += '<td><div style="font-weight:600">' + esc(c.cardholderName) + '</div><div style="font-size:0.75rem;color:var(--text3)">' + esc(c.email) + '</div></td>';
        html += '<td>' + esc(c.unit) + '</td>';
        html += '<td style="font-size:0.8rem">' + esc(c.phoneModel) + '</td>';
        html += '<td><span class="badge ' + osBadge + '">' + c.os + '</span></td>';
        html += '<td><span class="badge ' + typeBadge + '">' + c.credentialType + '</span></td>';
        html += '<td><span class="badge ' + statusBadge + '">' + c.status + '</span></td>';
        html += '<td style="font-size:0.8rem;color:var(--text2)">' + timeAgo(c.lastUsed) + '</td>';
        html += '<td>';
        if (c.status === 'PENDING') {
          html += '<button class="btn btn-sm btn-green cred-action" data-id="' + c.id + '" data-action="activate">Activate</button> ';
        } else if (c.status === 'ACTIVE') {
          html += '<button class="btn btn-sm btn-outline cred-action" data-id="' + c.id + '" data-action="suspend">Suspend</button> ';
        } else if (c.status === 'SUSPENDED') {
          html += '<button class="btn btn-sm btn-green cred-action" data-id="' + c.id + '" data-action="activate">Activate</button> ';
        }
        if (c.status !== 'REVOKED') {
          html += '<button class="btn btn-sm btn-danger cred-action" data-id="' + c.id + '" data-action="revoke">Revoke</button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }
    html += '</tbody></table>';

    // QR Provisioning Section
    html += '<div class="qr-section">';
    html += '<div style="font-weight:700;font-size:1rem;margin-bottom:0.5rem">QR Self-Service Enrollment</div>';
    html += '<div style="color:var(--text2);font-size:0.85rem;margin-bottom:1rem">Generate a QR code for self-service mobile credential enrollment. Tenants scan the code, download the app, and provision their credential automatically.</div>';
    html += '<div class="qr-grid">';
    html += '<div>';
    html += '<div class="qr-placeholder" id="qrPlaceholder">';
    html += '<svg width="120" height="120" viewBox="0 0 120 120">';
    html += '<rect x="5" y="5" width="30" height="30" fill="#333" rx="2"/>';
    html += '<rect x="10" y="10" width="20" height="20" fill="#fff" rx="1"/>';
    html += '<rect x="14" y="14" width="12" height="12" fill="#333" rx="1"/>';
    html += '<rect x="85" y="5" width="30" height="30" fill="#333" rx="2"/>';
    html += '<rect x="90" y="10" width="20" height="20" fill="#fff" rx="1"/>';
    html += '<rect x="94" y="14" width="12" height="12" fill="#333" rx="1"/>';
    html += '<rect x="5" y="85" width="30" height="30" fill="#333" rx="2"/>';
    html += '<rect x="10" y="90" width="20" height="20" fill="#fff" rx="1"/>';
    html += '<rect x="14" y="94" width="12" height="12" fill="#333" rx="1"/>';
    for (var qi = 0; qi < 15; qi++) {
      var qx = 40 + (qi % 5) * 12;
      var qy = 40 + Math.floor(qi / 5) * 12;
      html += '<rect x="' + qx + '" y="' + qy + '" width="8" height="8" fill="' + (Math.random() > 0.4 ? '#333' : '#fff') + '" rx="1"/>';
    }
    html += '</svg>';
    html += '</div>';
    html += '<button class="btn btn-accent" id="btnGenQR" style="margin-top:0.5rem;width:160px">Generate QR Code</button>';
    html += '</div>';
    html += '<div>';
    html += '<div style="margin-bottom:0.75rem"><div class="stat-label">Enrollment URL</div>';
    html += '<code style="font-size:0.8rem;color:var(--accent);word-break:break-all">https://enroll.example.com/mobile/setup?org=demo&token=eyJ...</code></div>';
    html += '<div style="margin-bottom:0.75rem"><div class="stat-label">How it works</div>';
    html += '<div style="font-size:0.85rem;color:var(--text2);line-height:1.5">';
    html += '1. Display or print the QR code at the front desk or leasing office<br>';
    html += '2. Tenant scans with their phone camera<br>';
    html += '3. Redirected to download the access app (iOS App Store / Google Play)<br>';
    html += '4. App reads the enrollment token and provisions the BLE/NFC credential<br>';
    html += '5. Credential appears as "Pending" until admin approves or auto-activates</div>';
    html += '</div>';
    html += '<div><div class="stat-label">QR Code Options</div>';
    html += '<div style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap">';
    html += '<button class="btn btn-sm btn-outline">Copy URL</button>';
    html += '<button class="btn btn-sm btn-outline">Download PNG</button>';
    html += '<button class="btn btn-sm btn-outline">Print</button>';
    html += '<button class="btn btn-sm btn-outline">Email to Staff</button>';
    html += '</div></div>';
    html += '</div>';
    html += '</div>';
    html += '</div>';

    document.getElementById('app').innerHTML = html;

    // ─── Modal ─────────────────────────────────────────────────
    if (showModal) renderModal();

    // ─── Bind Events ───────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() { currentTab = this.dataset.tab; render(); });
    });
    var si = document.getElementById('searchInput');
    if (si) si.addEventListener('input', function() { searchText = this.value; render(); });
    var ctf = document.getElementById('credTypeFilter');
    if (ctf) ctf.addEventListener('change', function() { credTypeFilter = this.value; render(); });
    var btnNew = document.getElementById('btnNewCred');
    if (btnNew) btnNew.addEventListener('click', function() { showModal = true; render(); });

    document.querySelectorAll('.cred-action').forEach(function(btn) {
      btn.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var id = this.dataset.id;
        var action = this.dataset.action;
        var cred = credentials.find(function(c) { return c.id === id; });
        if (!cred) return;
        if (action === 'suspend') cred.status = 'SUSPENDED';
        else if (action === 'activate') cred.status = 'ACTIVE';
        else if (action === 'revoke') cred.status = 'REVOKED';
        render();
      });
    });

    document.querySelectorAll('.cred-row').forEach(function(row) {
      row.addEventListener('click', function() {
        var id = this.dataset.id;
        if (selectedCred && selectedCred.id === id) {
          selectedCred = null;
        } else {
          selectedCred = credentials.find(function(c) { return c.id === id; });
        }
        render();
      });
    });

    var closeDetail = document.getElementById('btnCloseDetail');
    if (closeDetail) closeDetail.addEventListener('click', function() { selectedCred = null; render(); });
  }

  function renderDetailPanel(c) {
    var html = '<div class="detail-panel">';
    html += '<div class="detail-header">';
    html += '<div><div style="font-weight:700;font-size:1.1rem">' + esc(c.cardholderName) + '</div>';
    html += '<div style="color:var(--text2);font-size:0.85rem">' + esc(c.email) + ' &middot; ' + esc(c.phone) + '</div></div>';
    html += '<button class="btn btn-sm btn-outline" id="btnCloseDetail">Close</button>';
    html += '</div>';

    html += '<div class="detail-grid">';
    html += '<div class="detail-item"><div class="detail-item-label">Device Model</div><div class="detail-item-value">' + esc(c.phoneModel) + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">OS Version</div><div class="detail-item-value">' + esc(c.os) + ' ' + esc(c.osVersion) + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">App Version</div><div class="detail-item-value">v' + esc(c.appVersion) + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">Credential Type</div><div class="detail-item-value">' + esc(c.credentialType) + (c.credentialType === 'BLE' ? ' Wallet (' + (c.os === 'iOS' ? 'Apple' : 'Google') + ')' : '') + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">BLE Range Test</div><div class="detail-item-value">';
    if (c.bleRangeTest === 'PASS') html += '<span style="color:var(--green)">PASS</span>';
    else if (c.bleRangeTest === 'MARGINAL') html += '<span style="color:var(--amber)">MARGINAL</span>';
    else html += '<span style="color:var(--text3)">UNTESTED</span>';
    html += '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">Registration Date</div><div class="detail-item-value">' + new Date(c.registeredAt).toLocaleDateString() + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">Expires</div><div class="detail-item-value">' + new Date(c.expiresAt).toLocaleDateString() + '</div></div>';
    html += '<div class="detail-item"><div class="detail-item-label">Last Firmware Update</div><div class="detail-item-value">' + timeAgo(c.lastFirmwareUpdate) + '</div></div>';
    html += '</div>';

    // Access zones
    var zoneNames = (c.accessZones || []).map(function(zid) { var z = zones.find(function(zz) { return zz.id === zid; }); return z ? z.name : zid; });
    html += '<div style="margin-bottom:1rem"><div class="detail-item-label">Access Zones</div>';
    html += '<div class="zone-chips" style="margin-top:0.35rem">';
    zoneNames.forEach(function(zn) {
      html += '<span class="zone-chip selected">' + esc(zn) + '</span>';
    });
    html += '</div></div>';

    // Recent events
    html += '<div><div class="detail-item-label" style="margin-bottom:0.5rem">Last 10 Access Events</div>';
    html += '<div class="event-list">';
    (c.events || []).forEach(function(ev) {
      var isGrant = ev.desc.indexOf('Granted') >= 0;
      var isDeny = ev.desc.indexOf('Denied') >= 0;
      html += '<div class="event-row">';
      html += '<div class="event-time">' + timeAgo(ev.time) + '</div>';
      html += '<div class="event-desc" style="color:' + (isDeny ? 'var(--red)' : isGrant ? 'var(--green)' : 'var(--text2)') + '">' + esc(ev.desc) + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    html += '</div>';
    return html;
  }

  function renderModal() {
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    var modal = document.createElement('div');
    modal.className = 'modal';
    var html = '<h3>Provision New Mobile Credential</h3>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">Cardholder Name</label><input class="form-input" id="mName" placeholder="Jane Smith"></div>';
    html += '<div class="form-row"><label class="form-label">Email</label><input class="form-input" id="mEmail" placeholder="jane@example.com" type="email"></div>';
    html += '</div>';

    html += '<div class="form-row"><label class="form-label">Phone Number</label><input class="form-input" id="mPhone" placeholder="+1-555-123-4567" type="tel"></div>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">Credential Type</label><select class="form-input" id="mCredType">';
    html += '<option value="BLE">BLE Wallet (Apple/Google)</option>';
    html += '<option value="NFC">NFC</option>';
    html += '<option value="QR">QR Code</option>';
    html += '</select></div>';
    html += '<div class="form-row"><label class="form-label">Expiration Date</label><input class="form-input" id="mExpires" type="date" value="' + new Date(Date.now() + 365 * 86400000).toISOString().split('T')[0] + '"></div>';
    html += '</div>';

    html += '<div class="form-row"><label class="form-label">Access Zones</label>';
    html += '<div class="zone-chips" id="mZones">';
    zones.forEach(function(z) {
      html += '<span class="zone-chip" data-zone="' + z.id + '">' + esc(z.name) + '</span>';
    });
    html += '</div></div>';

    html += '<div style="background:var(--bg);border-radius:6px;padding:0.75rem;margin-top:0.5rem;margin-bottom:0.75rem">';
    html += '<div style="font-size:0.8rem;color:var(--text2)">An activation link will be sent via SMS and email. The recipient will download the access app and complete credential provisioning on their device.</div>';
    html += '</div>';

    html += '<div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">';
    html += '<button class="btn btn-outline" id="mCancel" style="border:1px solid var(--border)">Cancel</button>';
    html += '<button class="btn btn-accent" id="mSave">Send Activation</button>';
    html += '</div>';

    modal.innerHTML = html;
    overlay.appendChild(modal);
    document.getElementById('app').appendChild(overlay);

    // Zone chip toggles
    var selectedZones = new Set(['z1', 'z9']);
    document.querySelectorAll('#mZones .zone-chip').forEach(function(chip) {
      if (selectedZones.has(chip.dataset.zone)) chip.classList.add('selected');
      chip.addEventListener('click', function() {
        if (selectedZones.has(this.dataset.zone)) { selectedZones.delete(this.dataset.zone); this.classList.remove('selected'); }
        else { selectedZones.add(this.dataset.zone); this.classList.add('selected'); }
      });
    });

    overlay.addEventListener('click', function(e) { if (e.target === overlay) { showModal = false; render(); } });
    document.getElementById('mCancel').addEventListener('click', function() { showModal = false; render(); });
    document.getElementById('mSave').addEventListener('click', function() {
      var name = document.getElementById('mName').value || 'New Tenant';
      var parts = name.split(' ');
      var fn = parts[0] || 'New';
      var ln = parts.slice(1).join(' ') || 'Tenant';
      var email = document.getElementById('mEmail').value || fn.toLowerCase() + '.' + ln.toLowerCase() + '@example.com';
      var phone = document.getElementById('mPhone').value || '+1-555-000-0000';
      var credType = document.getElementById('mCredType').value;
      var randomPhone = PHONE_MODELS[Math.floor(Math.random() * PHONE_MODELS.length)];

      var newCred = {
        id: 'mcred-' + Date.now(),
        cardholderName: name,
        email: email,
        phone: phone,
        unit: 'New',
        department: 'Residential',
        phoneModel: randomPhone.model,
        os: randomPhone.os,
        osVersion: randomPhone.osVer,
        appVersion: APP_VERSIONS[0],
        credentialType: credType,
        status: 'PENDING',
        accessZones: Array.from(selectedZones),
        registeredAt: new Date().toISOString(),
        expiresAt: new Date(document.getElementById('mExpires').value || Date.now() + 365 * 86400000).toISOString(),
        lastUsed: null,
        bleRangeTest: 'UNTESTED',
        lastFirmwareUpdate: null,
        events: [],
      };
      credentials.unshift(newCred);
      showModal = false;
      currentTab = 'pending';
      render();
    });
  }

  function timeAgo(ts) {
    if (!ts) return '-';
    var diff = Date.now() - new Date(ts).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    if (days < 30) return days + 'd ago';
    var months = Math.floor(days / 30);
    return months + 'mo ago';
  }

  loadData();
})();
</script>
</body>
</html>
