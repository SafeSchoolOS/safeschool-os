<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door-Camera Pairing</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); }
.val-accent { color: var(--accent); }
.val-amber { color: var(--amber); }
.val-red { color: var(--red); }
.val-blue { color: var(--blue); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-gray { background: var(--bg3); color: var(--text3); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
select.pair-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 28px 5px 8px; font-size: 12px; outline: none; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5'%3e%3cpath d='M0 0l4 5 4-5z' fill='%235a5c72'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; min-width: 180px; cursor: pointer; }
select.pair-select:focus { border-color: var(--accent); }
.btn { padding: 5px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.cam-info { display: flex; align-items: center; gap: 6px; }
.cam-dot { width: 8px; height: 8px; border-radius: 50%; }
.cam-dot.online { background: var(--green); }
.cam-dot.offline { background: var(--red); }
.search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 12px; font-size: 13px; outline: none; width: 240px; }
.search-box:focus { border-color: var(--accent); }
.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 3px; }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading doors and cameras...</div></div>
<div class="toast" id="toast"></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; loadData(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  // Persistence
  function getPairings() {
    try { return JSON.parse(localStorage.getItem('door-camera-pairings') || '{}'); } catch(e) { return {}; }
  }
  function savePairing(doorId, cameraId) {
    var p = getPairings();
    if (cameraId) p[doorId] = cameraId;
    else delete p[doorId];
    localStorage.setItem('door-camera-pairings', JSON.stringify(p));
  }

  var doors = [], cameras = [], searchFilter = '';

  function loadData() {
    var loaded = 0;
    function done() { loaded++; if (loaded >= 2) render(); }

    api('GET', '/api/v1/data/doors?limit=200').then(function(data) {
      var arr = null;
      if (data && Array.isArray(data)) arr = data;
      else if (data && Array.isArray(data.doors)) arr = data.doors;
      else if (data && Array.isArray(data.items)) arr = data.items;
      else if (data && Array.isArray(data.entities)) arr = data.entities;

      if (arr && arr.length > 0) { doors = arr; }
      else {
        doors = [
          { id: 'D-001', name: 'Main Entrance', location: 'Building A - Floor 1', status: 'secured' },
          { id: 'D-002', name: 'East Wing Entry', location: 'Building A - Floor 1', status: 'secured' },
          { id: 'D-003', name: 'Server Room', location: 'Building A - Basement', status: 'locked' },
          { id: 'D-004', name: 'ICU Entry', location: 'Building C - Floor 3', status: 'secured' },
          { id: 'D-005', name: 'Emergency Exit A', location: 'Building A - Floor 1', status: 'alarmed' },
          { id: 'D-006', name: 'Loading Dock', location: 'Building A - Rear', status: 'secured' },
          { id: 'D-007', name: 'Pharmacy', location: 'Building C - Floor 1', status: 'locked' },
          { id: 'D-008', name: 'Parking Garage L1', location: 'Garage - Level 1', status: 'secured' },
          { id: 'D-009', name: 'Admin Office', location: 'Building B - Floor 2', status: 'unlocked' },
          { id: 'D-010', name: 'Cafeteria', location: 'Building B - Floor 1', status: 'unlocked' },
          { id: 'D-011', name: 'Rooftop Access', location: 'Building A - Roof', status: 'locked' },
          { id: 'D-012', name: 'West Stairwell', location: 'Building A', status: 'secured' },
        ];
      }
      done();
    }).catch(function() { doors = []; done(); });

    api('GET', '/api/v1/data/cameras?limit=200').then(function(data) {
      var arr = null;
      if (data && Array.isArray(data)) arr = data;
      else if (data && Array.isArray(data.cameras)) arr = data.cameras;
      else if (data && Array.isArray(data.items)) arr = data.items;
      else if (data && Array.isArray(data.entities)) arr = data.entities;

      if (arr && arr.length > 0) { cameras = arr; }
      else {
        cameras = [
          { id: 'C-001', name: 'CAM-Lobby-01', location: 'Building A - Lobby', status: 'online' },
          { id: 'C-002', name: 'CAM-EastWing-01', location: 'Building A - Floor 1', status: 'online' },
          { id: 'C-003', name: 'CAM-ServerRoom-01', location: 'Building A - Basement', status: 'online' },
          { id: 'C-004', name: 'CAM-ICU-01', location: 'Building C - Floor 3', status: 'online' },
          { id: 'C-005', name: 'CAM-ICU-02', location: 'Building C - Floor 3', status: 'online' },
          { id: 'C-006', name: 'CAM-EmergExit-01', location: 'Building A - Floor 1', status: 'offline' },
          { id: 'C-007', name: 'CAM-LoadingDock-01', location: 'Building A - Rear', status: 'online' },
          { id: 'C-008', name: 'CAM-Pharmacy-01', location: 'Building C - Floor 1', status: 'online' },
          { id: 'C-009', name: 'CAM-Garage-L1', location: 'Garage - Level 1', status: 'online' },
          { id: 'C-010', name: 'CAM-Garage-L2', location: 'Garage - Level 2', status: 'offline' },
          { id: 'C-011', name: 'CAM-Admin-01', location: 'Building B - Floor 2', status: 'online' },
          { id: 'C-012', name: 'CAM-Cafeteria-01', location: 'Building B - Floor 1', status: 'online' },
          { id: 'C-013', name: 'CAM-Roof-01', location: 'Building A - Roof', status: 'online' },
          { id: 'C-014', name: 'CAM-WestStair-01', location: 'Building A', status: 'online' },
          { id: 'C-015', name: 'CAM-Perimeter-N', location: 'North Perimeter', status: 'online' },
          { id: 'C-016', name: 'CAM-Perimeter-S', location: 'South Perimeter', status: 'online' },
        ];
      }
      done();
    }).catch(function() { cameras = []; done(); });
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  function render() {
    var pairings = getPairings();
    var paired = 0, unpaired = 0;
    var filteredDoors = (doors || []).filter(function(d) {
      if (!d) return false;
      if (!searchFilter) return true;
      var q = searchFilter.toLowerCase();
      return (d.name || '').toLowerCase().indexOf(q) >= 0 || (d.location || '').toLowerCase().indexOf(q) >= 0 || (d.id || '').toLowerCase().indexOf(q) >= 0;
    });

    (doors || []).forEach(function(d) {
      if (!d) return;
      if (pairings[d.id]) paired++; else unpaired++;
    });

    var pairingPct = doors.length ? Math.round((paired / doors.length) * 100) : 0;
    var onlineCams = (cameras || []).filter(function(c) { return c && c.status === 'online'; }).length;

    var html = '';

    // Header
    html += '<div class="header">';
    html += '<h1><span>&#128247;</span> Door-Camera Pairing</h1>';
    html += '<div style="display:flex;gap:8px;align-items:center">';
    html += '<input class="search-box" id="searchInput" placeholder="Search doors..." value="' + esc(searchFilter) + '">';
    html += '</div></div>';

    // Stats
    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Total Doors</div><div class="value val-accent">' + doors.length + '</div><div class="sub">' + filteredDoors.length + ' shown</div></div>';
    html += '<div class="stat-card"><div class="label">Paired</div><div class="value val-green">' + paired + '</div><div class="progress-bar"><div class="progress-fill" style="width:' + pairingPct + '%;background:var(--green)"></div></div></div>';
    html += '<div class="stat-card"><div class="label">Unpaired</div><div class="value val-amber">' + unpaired + '</div><div class="sub">Doors without camera coverage</div></div>';
    html += '<div class="stat-card"><div class="label">Cameras Available</div><div class="value val-blue">' + cameras.length + '</div><div class="sub">' + onlineCams + ' online, ' + (cameras.length - onlineCams) + ' offline</div></div>';
    html += '</div>';

    // Table
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Door-Camera Assignments</h2><span class="count">' + filteredDoors.length + ' doors</span></div>';
    html += '<div style="overflow-x:auto"><table>';
    html += '<tr><th>Door</th><th>Location</th><th>Status</th><th>Paired Camera</th><th>Camera Status</th><th>Action</th></tr>';

    filteredDoors.forEach(function(door) {
      if (!door) return;
      var pairedCamId = pairings[door.id] || '';
      var pairedCam = pairedCamId ? (cameras || []).find(function(c) { return c && c.id === pairedCamId; }) : null;

      var doorStatusCls = door.status === 'secured' || door.status === 'locked' ? 'badge-green' : door.status === 'alarmed' ? 'badge-red' : 'badge-amber';

      html += '<tr>';
      html += '<td><strong>' + esc(door.name || door.id) + '</strong><div style="font-size:11px;color:var(--text3)">' + esc(door.id) + '</div></td>';
      html += '<td style="color:var(--text2)">' + esc(door.location || '--') + '</td>';
      html += '<td><span class="badge ' + doorStatusCls + '">' + esc(door.status || '--') + '</span></td>';

      // Camera dropdown
      html += '<td>';
      html += '<select class="pair-select" data-door="' + esc(door.id) + '">';
      html += '<option value="">-- No camera --</option>';
      (cameras || []).forEach(function(cam) {
        if (!cam) return;
        var sel = pairedCamId === cam.id ? ' selected' : '';
        var statusIcon = cam.status === 'online' ? ' [ON]' : ' [OFF]';
        html += '<option value="' + esc(cam.id) + '"' + sel + '>' + esc(cam.name || cam.id) + statusIcon + '</option>';
      });
      html += '</select>';
      html += '</td>';

      // Camera status
      html += '<td>';
      if (pairedCam) {
        var camOn = pairedCam.status === 'online';
        html += '<div class="cam-info"><span class="cam-dot ' + (camOn ? 'online' : 'offline') + '"></span>';
        html += '<span>' + esc(pairedCam.name) + '</span></div>';
        html += '<div style="font-size:11px;color:var(--text3)">' + esc(pairedCam.location || '') + '</div>';
      } else {
        html += '<span style="color:var(--text3);font-size:12px">No camera paired</span>';
      }
      html += '</td>';

      // Action
      html += '<td>';
      if (pairedCamId) {
        html += '<button class="btn btn-danger btn-sm unpair-btn" data-door="' + esc(door.id) + '">Unpair</button>';
      } else {
        html += '<button class="btn btn-accent btn-sm pair-btn" data-door="' + esc(door.id) + '">Pair</button>';
      }
      html += '</td>';
      html += '</tr>';
    });

    html += '</table></div></div>';

    document.getElementById('app').innerHTML = html;
    bindEvents();
  }

  function bindEvents() {
    // Search
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        searchFilter = this.value;
        render();
        // Re-focus after render
        var si = document.getElementById('searchInput');
        if (si) { si.focus(); si.selectionStart = si.selectionEnd = si.value.length; }
      });
    }

    // Pair buttons
    document.querySelectorAll('.pair-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var doorId = this.dataset.door;
        var sel = document.querySelector('select[data-door="' + doorId + '"]');
        if (sel && sel.value) {
          savePairing(doorId, sel.value);
          showToast('Camera paired successfully');
          render();
        } else {
          showToast('Select a camera first');
        }
      });
    });

    // Unpair buttons
    document.querySelectorAll('.unpair-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        savePairing(this.dataset.door, null);
        showToast('Camera unpaired');
        render();
      });
    });

    // Dropdown change auto-pairs
    document.querySelectorAll('.pair-select').forEach(function(sel) {
      sel.addEventListener('change', function() {
        savePairing(this.dataset.door, this.value || null);
        if (this.value) showToast('Camera paired');
        render();
      });
    });
  }

  loadData();
})();
</script>
</body>
</html>
