<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilio AI Voice Door Release</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-badge { font-size: 11px; padding: 4px 10px; background: var(--accent-dim); color: var(--accent); border-radius: 12px; font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); }
.val-accent { color: var(--accent); }
.val-amber { color: var(--amber); }
.val-red { color: var(--red); }
.val-blue { color: var(--blue); }
.val-purple { color: var(--purple); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
.card-body { padding: 0; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-gray { background: var(--bg3); color: var(--text3); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
.refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* IVR Flow diagram */
.flow-container { padding: 24px; display: flex; align-items: center; gap: 0; overflow-x: auto; }
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 120px; text-align: center; }
.flow-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--border); }
.flow-icon.active { border-color: var(--accent); box-shadow: 0 0 16px rgba(8,145,178,0.3); }
.flow-label { font-size: 11px; font-weight: 600; max-width: 100px; }
.flow-sub { font-size: 10px; color: var(--text3); max-width: 110px; }
.flow-arrow { font-size: 20px; color: var(--text3); margin: 0 4px; flex-shrink: 0; margin-bottom: 30px; }

/* Config panel */
.config-panel { padding: 20px; }
.config-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.config-row:last-child { border-bottom: none; }
.config-label { font-size: 13px; }
.config-label small { display: block; font-size: 11px; color: var(--text3); margin-top: 2px; }
.config-value { font-size: 13px; color: var(--accent); font-weight: 600; font-family: monospace; }
.config-value select, .config-value input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; font-size: 12px; }
.config-value select:focus, .config-value input:focus { outline: none; border-color: var(--accent); }

.call-pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.pulse-green { background: var(--green); }
.pulse-amber { background: var(--amber); }
.pulse-red { background: var(--red); }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading IVR system data...</div></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; render(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  function fmtTime(ts) {
    if (!ts) return '--';
    try { var d = new Date(ts); return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch(e) { return '--'; }
  }
  function fmtDateTime(ts) {
    if (!ts) return '--';
    try { var d = new Date(ts); return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } catch(e) { return '--'; }
  }
  function fmtDuration(secs) {
    if (!secs) return '--';
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // Demo active calls
  var activeCalls = [
    { callId: 'CA-' + randInt(100000,999999), from: '(212) 555-0147', unit: '812', status: 'Verifying Identity', duration: 23, step: 3 },
    { callId: 'CA-' + randInt(100000,999999), from: '(646) 555-0392', unit: '405', status: 'AI Greeting', duration: 5, step: 1 },
  ];

  // Demo call history
  var callHistory = [];
  var historyStatuses = ['Door Released','Door Released','Door Released','Door Released','Door Released','Verification Failed','Verification Failed','Door Released','Hung Up','Door Released','No Match','Door Released'];
  var units = ['301','405','812','1207','603','1504','210','915','1102','718','406','1301','203','1008','522'];

  for (var i = 0; i < 30; i++) {
    var status = randItem(historyStatuses);
    var dur = status === 'Hung Up' ? randInt(5, 15) : status === 'Verification Failed' ? randInt(30, 60) : randInt(35, 90);
    callHistory.push({
      callId: 'CA-' + randInt(100000, 999999),
      from: '(' + randInt(200,999) + ') 555-' + String(randInt(1000,9999)),
      unit: randItem(units),
      status: status,
      duration: dur,
      timestamp: new Date(Date.now() - i * randInt(1800000, 7200000)).toISOString(),
      recording: status !== 'Hung Up',
      verifyMethod: randItem(['Last 4 Phone','Last 4 Phone','Last 4 Phone','Unit + Name','Access Code'])
    });
  }

  var config = {
    twilioNumber: '+1 (855) 222-DOOR',
    aiVoice: 'Polly.Joanna (Neural)',
    verifyMethod: 'Unit + Last 4 Phone',
    autoReleaseZones: 'Main Lobby, Parking Garage',
    maxRetries: 3,
    callTimeout: 120
  };

  function getStats() {
    var today = new Date(); today.setHours(0,0,0,0);
    var todayCalls = callHistory.filter(function(c) { return new Date(c.timestamp) >= today; });
    var released = todayCalls.filter(function(c) { return c.status === 'Door Released'; }).length;
    var failed = todayCalls.filter(function(c) { return c.status === 'Verification Failed' || c.status === 'No Match'; }).length;
    var avgDur = todayCalls.length ? Math.round(todayCalls.reduce(function(sum, c) { return sum + c.duration; }, 0) / todayCalls.length) : 0;
    return { callsToday: todayCalls.length, released: released, failed: failed, avgDuration: avgDur };
  }

  function render() {
    var st = getStats();
    var html = '';

    // Header
    html += '<div class="header">';
    html += '<h1><span>&#128222;</span> Twilio AI Voice Door Release</h1>';
    html += '<div style="display:flex;gap:8px;align-items:center">';
    html += '<span class="header-badge">IVR System</span>';
    html += '<button class="refresh-btn" id="refreshBtn">&#8635; Refresh</button>';
    html += '</div></div>';

    // Stats
    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Calls Today</div><div class="value val-accent">' + st.callsToday + '</div><div class="sub">' + activeCalls.length + ' active right now</div></div>';
    html += '<div class="stat-card"><div class="label">Doors Released</div><div class="value val-green">' + st.released + '</div><div class="sub">Successful voice entries</div></div>';
    html += '<div class="stat-card"><div class="label">Failed Verification</div><div class="value val-red">' + st.failed + '</div><div class="sub">Identity not confirmed</div></div>';
    html += '<div class="stat-card"><div class="label">Avg Call Duration</div><div class="value val-purple">' + st.avgDuration + '<span style="font-size:14px;color:var(--text2)">s</span></div><div class="sub">Target &lt; 45 seconds</div></div>';
    html += '</div>';

    // IVR Flow Diagram
    html += '<div class="card">';
    html += '<div class="card-head"><h2>IVR Call Flow</h2><span class="count">6 steps</span></div>';
    html += '<div class="flow-container">';

    var steps = [
      { icon: '&#128222;', label: 'Incoming Call', sub: 'Twilio receives call to property line', color: 'var(--blue)' },
      { icon: '&#129302;', label: 'AI Greeting', sub: 'Neural voice welcomes caller', color: 'var(--accent)' },
      { icon: '&#127968;', label: 'Ask Unit Number', sub: 'Caller enters unit via DTMF or voice', color: 'var(--purple)' },
      { icon: '&#128274;', label: 'Verify Identity', sub: 'Last 4 phone digits or access code', color: 'var(--amber)' },
      { icon: '&#128275;', label: 'Release Door', sub: 'API call to PAC system', color: 'var(--green)' },
      { icon: '&#9989;', label: 'Confirm', sub: 'Audible confirmation + audit log', color: 'var(--green)' }
    ];

    steps.forEach(function(step, idx) {
      if (idx > 0) html += '<div class="flow-arrow">&#8594;</div>';
      var isActive = activeCalls.some(function(c) { return c.step === (idx + 1); });
      html += '<div class="flow-step">';
      html += '<div class="flow-icon' + (isActive ? ' active' : '') + '" style="background:' + step.color + '22;color:' + step.color + '">' + step.icon + '</div>';
      html += '<div class="flow-label">' + step.label + '</div>';
      html += '<div class="flow-sub">' + step.sub + '</div>';
      html += '</div>';
    });

    html += '</div></div>';

    // Grid: Active calls + Configuration
    html += '<div class="grid-2">';

    // Active Calls
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>Active Calls</h2><span class="count">' + activeCalls.length + ' live</span></div>';
    html += '<div class="card-body"><table>';
    html += '<tr><th>Call ID</th><th>From</th><th>Unit</th><th>Status</th><th>Duration</th></tr>';
    if (activeCalls.length === 0) {
      html += '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">No active calls</td></tr>';
    }
    activeCalls.forEach(function(c) {
      var sCls = c.status === 'AI Greeting' ? 'badge-accent' : c.status === 'Verifying Identity' ? 'badge-amber' : c.status === 'Releasing Door' ? 'badge-green' : 'badge-blue';
      var pulseCls = c.status === 'AI Greeting' ? 'pulse-green' : 'pulse-amber';
      html += '<tr>';
      html += '<td style="font-family:monospace;font-size:11px">' + esc(c.callId) + '</td>';
      html += '<td><span class="call-pulse ' + pulseCls + '"></span>' + esc(c.from) + '</td>';
      html += '<td><strong>' + esc(c.unit) + '</strong></td>';
      html += '<td><span class="badge ' + sCls + '">' + esc(c.status) + '</span></td>';
      html += '<td style="font-family:monospace">' + fmtDuration(c.duration) + '</td>';
      html += '</tr>';
    });
    html += '</table></div></div>';

    // Configuration
    html += '<div class="card" style="align-self:start">';
    html += '<div class="card-head"><h2>IVR Configuration</h2></div>';
    html += '<div class="config-panel">';

    html += '<div class="config-row">';
    html += '<div class="config-label">Twilio Phone Number<small>Incoming line for door release</small></div>';
    html += '<div class="config-value">' + esc(config.twilioNumber) + '</div>';
    html += '</div>';

    html += '<div class="config-row">';
    html += '<div class="config-label">AI Voice<small>Text-to-speech engine</small></div>';
    html += '<div class="config-value"><select id="voiceSelect">';
    ['Polly.Joanna (Neural)','Polly.Matthew (Neural)','Polly.Salli (Neural)','Google WaveNet-A','Google WaveNet-D','ElevenLabs Rachel'].forEach(function(v) {
      html += '<option' + (config.aiVoice === v ? ' selected' : '') + '>' + v + '</option>';
    });
    html += '</select></div>';
    html += '</div>';

    html += '<div class="config-row">';
    html += '<div class="config-label">Verification Method<small>How caller identity is confirmed</small></div>';
    html += '<div class="config-value"><select id="verifySelect">';
    ['Unit + Last 4 Phone','Unit + Name','Access Code Only','Unit + Birthday'].forEach(function(v) {
      html += '<option' + (config.verifyMethod === v ? ' selected' : '') + '>' + v + '</option>';
    });
    html += '</select></div>';
    html += '</div>';

    html += '<div class="config-row">';
    html += '<div class="config-label">Auto-Release Zones<small>Doors that allow IVR release</small></div>';
    html += '<div class="config-value" style="font-size:12px">' + esc(config.autoReleaseZones) + '</div>';
    html += '</div>';

    html += '<div class="config-row">';
    html += '<div class="config-label">Max Verification Retries<small>Before call is terminated</small></div>';
    html += '<div class="config-value">' + config.maxRetries + '</div>';
    html += '</div>';

    html += '<div class="config-row">';
    html += '<div class="config-label">Call Timeout<small>Maximum call duration (seconds)</small></div>';
    html += '<div class="config-value">' + config.callTimeout + 's</div>';
    html += '</div>';

    html += '</div></div>';

    html += '</div>'; // end grid-2

    // Call History
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Call History</h2><span class="count">' + callHistory.length + ' calls</span></div>';
    html += '<div class="card-body"><div style="overflow-x:auto;max-height:500px;overflow-y:auto"><table>';
    html += '<tr><th>Time</th><th>Call ID</th><th>From</th><th>Unit</th><th>Verify Method</th><th>Result</th><th>Duration</th><th>Recording</th></tr>';

    callHistory.forEach(function(c) {
      var sCls = c.status === 'Door Released' ? 'badge-green' : c.status === 'Verification Failed' ? 'badge-red' : c.status === 'Hung Up' ? 'badge-gray' : c.status === 'No Match' ? 'badge-amber' : 'badge-blue';
      html += '<tr>';
      html += '<td style="font-size:12px;color:var(--text2);white-space:nowrap">' + fmtDateTime(c.timestamp) + '</td>';
      html += '<td style="font-family:monospace;font-size:11px;color:var(--text2)">' + esc(c.callId) + '</td>';
      html += '<td>' + esc(c.from) + '</td>';
      html += '<td><strong>' + esc(c.unit) + '</strong></td>';
      html += '<td style="font-size:12px;color:var(--text2)">' + esc(c.verifyMethod) + '</td>';
      html += '<td><span class="badge ' + sCls + '">' + esc(c.status) + '</span></td>';
      html += '<td style="font-family:monospace">' + fmtDuration(c.duration) + '</td>';
      html += '<td>';
      if (c.recording) {
        html += '<span style="color:var(--accent);font-size:12px;cursor:pointer">&#9654; Play</span>';
      } else {
        html += '<span style="color:var(--text3);font-size:11px">N/A</span>';
      }
      html += '</td>';
      html += '</tr>';
    });

    html += '</table></div></div></div>';

    document.getElementById('app').innerHTML = html;

    // Bind
    document.getElementById('refreshBtn').addEventListener('click', function() { render(); });
    var vs = document.getElementById('voiceSelect');
    if (vs) vs.addEventListener('change', function() { config.aiVoice = vs.value; });
    var vr = document.getElementById('verifySelect');
    if (vr) vr.addEventListener('change', function() { config.verifyMethod = vr.value; });
  }

  render();
})();
</script>
</body>
</html>
