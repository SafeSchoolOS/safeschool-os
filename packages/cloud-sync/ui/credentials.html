<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credential Management</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #8b5cf6; --accent-hover: #7c3aed; --accent-dim: rgba(139,92,246,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; padding: 1.5rem; overflow-y: auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.title { font-size: 1.25rem; font-weight: 700; }
.subtitle { color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
.stat-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.blue { color: var(--blue); }
.stat-value.purple { color: var(--purple); }
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
.tab { padding: 0.6rem 1.25rem; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.search { padding: 0.4rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; min-width: 220px; outline: none; }
.search:focus { border-color: var(--accent); }
select.filter { padding: 0.4rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; outline: none; appearance: none; padding-right: 24px; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5'%3e%3cpath d='M0 0l4 5 4-5z' fill='%235a5c72'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; }
.btn { padding: 0.4rem 0.9rem; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; border-radius: 4px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.6rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); border-bottom: 1px solid var(--border); }
td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
tr:hover { background: var(--bg2); }
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
.badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-suspended { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-expired { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-revoked { background: rgba(107,114,128,0.15); color: #6b7280; }
.badge-card { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-mobile { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-fob { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-temp { background: rgba(107,114,128,0.15); color: #9ca3af; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
.form-row { margin-bottom: 0.75rem; }
.form-label { display: block; font-size: 0.8rem; color: var(--text3); margin-bottom: 0.25rem; }
.form-input { width: 100%; padding: 0.4rem 0.6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; outline: none; }
.form-input:focus { border-color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.zone-chips { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.375rem; }
.zone-chip { padding: 0.2rem 0.5rem; background: var(--bg3); border-radius: 4px; font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); }
.zone-chip.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; loadData(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  // ─── State ───────────────────────────────────────────────────
  var currentTab = 'all';
  var searchText = '';
  var typeFilter = '';
  var statusFilter = '';
  var showModal = false;
  var editCredential = null;
  var credentials = [];
  var zones = [];

  // ─── Demo Data ───────────────────────────────────────────────
  var ZONES = [
    { id: 'z1', name: 'Main Lobby', doorCount: 4 },
    { id: 'z2', name: 'Parking Garage', doorCount: 6 },
    { id: 'z3', name: 'Fitness Center', doorCount: 2 },
    { id: 'z4', name: 'Pool & Spa', doorCount: 2 },
    { id: 'z5', name: 'Rooftop Lounge', doorCount: 2 },
    { id: 'z6', name: 'Co-Working Space', doorCount: 2 },
    { id: 'z7', name: 'Package Room', doorCount: 2 },
    { id: 'z8', name: 'Bike Storage', doorCount: 2 },
    { id: 'z9', name: 'Residential Floors', doorCount: 25 },
    { id: 'z10', name: 'Leasing Office', doorCount: 2 },
    { id: 'z11', name: 'Maintenance', doorCount: 3 },
    { id: 'z12', name: 'Loading Dock', doorCount: 2 },
  ];
  zones = ZONES;

  var FIRST = ['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Thomas','Sarah','Chris','Karen','Daniel','Nancy','Matt','Emily','Andrew','Lisa','Kevin','Amanda','Brian','Donna','Steven','Michelle','Jason','Carol','Ryan','Rebecca','Eric','Laura','Nick','Amy','Josh','Angela','Alex','Sophia','Marcus','Olivia','Derek','Mia'];
  var LAST = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Thompson','White','Harris','Clark','Lewis','Walker','Young','Allen','King','Wright','Scott','Torres','Hill','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter'];

  function genCredentials() {
    var creds = [];
    var types = ['PHYSICAL_CARD','PHYSICAL_CARD','PHYSICAL_CARD','MOBILE','MOBILE','FOB','TEMPORARY_CARD'];
    var statuses = ['ACTIVE','ACTIVE','ACTIVE','ACTIVE','ACTIVE','ACTIVE','ACTIVE','SUSPENDED','EXPIRED','REVOKED'];
    var formats = ['HID iCLASS','HID Prox','MIFARE Classic','MIFARE DESFire','Seos','BLE'];

    for (var i = 0; i < 300; i++) {
      var fn = FIRST[i % FIRST.length];
      var ln = LAST[Math.floor(i / FIRST.length) % LAST.length];
      var type = types[i % types.length];
      var status = statuses[i % statuses.length];
      var unitNum = String(Math.floor(i / 2) + 100);
      var zoneIds = ['z1','z9'];
      if (i % 3 === 0) zoneIds.push('z3');
      if (i % 5 === 0) zoneIds.push('z4','z5');
      if (i % 7 === 0) zoneIds.push('z6');
      var daysAgo = Math.floor(Math.random() * 365);
      var issued = new Date(Date.now() - daysAgo * 86400000);
      var expires = type === 'TEMPORARY_CARD' ? new Date(Date.now() + Math.floor(Math.random() * 7) * 86400000) : new Date(issued.getTime() + 365 * 86400000);
      if (status === 'EXPIRED') expires = new Date(Date.now() - Math.floor(Math.random() * 30) * 86400000);

      creds.push({
        id: 'cred-' + String(i + 1).padStart(4, '0'),
        cardholderName: fn + ' ' + ln,
        cardholderId: 'ch-' + String(i + 1).padStart(5, '0'),
        unit: unitNum,
        credentialType: type,
        cardNumber: String(10000 + Math.floor(Math.random() * 90000)),
        facilityCode: 'FC-' + String(100 + (i % 10)),
        cardFormat: formats[i % formats.length],
        status: status,
        accessZones: zoneIds,
        issuedAt: issued.toISOString(),
        expiresAt: expires.toISOString(),
        lastUsed: new Date(Date.now() - Math.floor(Math.random() * 7 * 86400000)).toISOString(),
        personType: i < 25 ? 'STAFF' : 'STAFF',
      });
    }
    // Add some tenants
    for (var j = 0; j < 120; j++) {
      creds[j].personType = 'STAFF';
    }
    for (var k = 120; k < creds.length; k++) {
      creds[k].personType = 'STAFF';
    }
    return creds;
  }

  credentials = genCredentials();

  async function loadData() {
    try {
      var res = await api('GET', '/api/v1/data/cardholders?limit=500');
      if (res && (res.cardholders || res.entities)) {
        var holders = res.cardholders || res.entities || [];
        if (holders.length > 0) {
          credentials = holders.map(function(ch, i) {
            var d = ch.data || ch;
            return {
              id: d.id || ch.id || ('cred-' + i),
              cardholderName: d.name || (d.firstName + ' ' + d.lastName),
              cardholderId: d.id || ch.id,
              unit: d.unit || '-',
              credentialType: d.credentialType || 'PHYSICAL_CARD',
              cardNumber: d.badgeNumber || String(10000 + Math.floor(Math.random() * 90000)),
              facilityCode: d.facilityCode || 'FC-100',
              cardFormat: d.cardFormat || 'HID iCLASS',
              status: d.status || 'ACTIVE',
              accessZones: d.zones || ['z1','z9'],
              issuedAt: d.createdAt || new Date(Date.now() - 180 * 86400000).toISOString(),
              expiresAt: d.expiresAt || new Date(Date.now() + 180 * 86400000).toISOString(),
              lastUsed: new Date(Date.now() - Math.floor(Math.random() * 7 * 86400000)).toISOString(),
              personType: d.personType || (d.role || 'STAFF'),
            };
          });
        }
      }
    } catch(e) {}
    render();
  }

  // ─── Filtering ───────────────────────────────────────────────
  function filtered() {
    return credentials.filter(function(c) {
      if (currentTab === 'active' && c.status !== 'ACTIVE') return false;
      if (currentTab === 'suspended' && c.status !== 'SUSPENDED') return false;
      if (currentTab === 'expired' && c.status !== 'EXPIRED') return false;
      if (currentTab === 'revoked' && c.status !== 'REVOKED') return false;
      if (typeFilter && c.credentialType !== typeFilter) return false;
      if (statusFilter && c.status !== statusFilter) return false;
      if (searchText) {
        var s = searchText.toLowerCase();
        if (c.cardholderName.toLowerCase().indexOf(s) < 0 && c.cardNumber.indexOf(s) < 0 && c.unit.indexOf(s) < 0 && c.cardholderId.toLowerCase().indexOf(s) < 0) return false;
      }
      return true;
    });
  }

  // ─── Render ──────────────────────────────────────────────────
  function render() {
    var data = filtered();
    var active = credentials.filter(function(c) { return c.status === 'ACTIVE'; }).length;
    var suspended = credentials.filter(function(c) { return c.status === 'SUSPENDED'; }).length;
    var expired = credentials.filter(function(c) { return c.status === 'EXPIRED'; }).length;
    var revoked = credentials.filter(function(c) { return c.status === 'REVOKED'; }).length;
    var mobile = credentials.filter(function(c) { return c.credentialType === 'MOBILE'; }).length;
    var temp = credentials.filter(function(c) { return c.credentialType === 'TEMPORARY_CARD'; }).length;

    var html = '';
    html += '<div class="header"><div><div class="title">Credential Management</div>';
    html += '<div class="subtitle">Manage badges, mobile credentials, fobs, and temporary cards. CredentialManagementAdapter interface.</div></div>';
    html += '<button class="btn btn-accent" id="btnNewCred">+ New Credential</button></div>';

    // Stats
    html += '<div class="stats">';
    html += '<div class="stat"><div class="stat-label">Total Credentials</div><div class="stat-value">' + credentials.length + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Active</div><div class="stat-value green">' + active + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Suspended</div><div class="stat-value amber">' + suspended + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Expired</div><div class="stat-value red">' + expired + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Mobile</div><div class="stat-value purple">' + mobile + '</div></div>';
    html += '<div class="stat"><div class="stat-label">Temporary</div><div class="stat-value">' + temp + '</div></div>';
    html += '</div>';

    // Tabs
    html += '<div class="tabs">';
    ['all','active','suspended','expired','revoked'].forEach(function(t) {
      var label = t.charAt(0).toUpperCase() + t.slice(1);
      var count = t === 'all' ? credentials.length : credentials.filter(function(c) { return c.status === t.toUpperCase(); }).length;
      html += '<button class="tab' + (currentTab === t ? ' active' : '') + '" data-tab="' + t + '">' + label + ' (' + count + ')</button>';
    });
    html += '</div>';

    // Toolbar
    html += '<div class="toolbar">';
    html += '<input class="search" id="searchInput" placeholder="Search name, badge #, unit..." value="' + esc(searchText) + '">';
    html += '<select class="filter" id="typeFilter"><option value="">All Types</option>';
    ['PHYSICAL_CARD','MOBILE','FOB','TEMPORARY_CARD'].forEach(function(t) {
      html += '<option value="' + t + '"' + (typeFilter === t ? ' selected' : '') + '>' + t.replace(/_/g, ' ') + '</option>';
    });
    html += '</select>';
    html += '<span style="color:var(--text3);font-size:0.8rem;margin-left:auto">' + data.length + ' results</span>';
    html += '</div>';

    // Table
    html += '<table><thead><tr>';
    html += '<th>Cardholder</th><th>Unit</th><th>Type</th><th>Card #</th><th>Format</th><th>Status</th><th>Zones</th><th>Last Used</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    if (data.length === 0) {
      html += '<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:2rem">No credentials match your filters</td></tr>';
    } else {
      data.slice(0, 100).forEach(function(c) {
        var typeBadge = c.credentialType === 'PHYSICAL_CARD' ? 'badge-card' : c.credentialType === 'MOBILE' ? 'badge-mobile' : c.credentialType === 'FOB' ? 'badge-fob' : 'badge-temp';
        var statusBadge = c.status === 'ACTIVE' ? 'badge-active' : c.status === 'SUSPENDED' ? 'badge-suspended' : c.status === 'EXPIRED' ? 'badge-expired' : 'badge-revoked';
        var typeLabel = c.credentialType === 'PHYSICAL_CARD' ? 'Card' : c.credentialType === 'MOBILE' ? 'Mobile' : c.credentialType === 'TEMPORARY_CARD' ? 'Temp' : 'Fob';
        var zoneNames = (c.accessZones || []).map(function(zid) { var z = zones.find(function(zz) { return zz.id === zid; }); return z ? z.name : zid; }).slice(0, 3);
        var zoneStr = zoneNames.join(', ');
        if ((c.accessZones || []).length > 3) zoneStr += ' +' + ((c.accessZones || []).length - 3);
        var lastUsed = c.lastUsed ? timeAgo(c.lastUsed) : '-';

        html += '<tr>';
        html += '<td><div style="font-weight:600">' + esc(c.cardholderName) + '</div><div style="font-size:0.75rem;color:var(--text3)">' + esc(c.cardholderId) + '</div></td>';
        html += '<td>' + esc(c.unit) + '</td>';
        html += '<td><span class="badge ' + typeBadge + '">' + typeLabel + '</span></td>';
        html += '<td><code style="font-size:0.8rem">' + esc(c.cardNumber) + '</code></td>';
        html += '<td style="font-size:0.8rem;color:var(--text2)">' + esc(c.cardFormat) + '</td>';
        html += '<td><span class="badge ' + statusBadge + '">' + c.status + '</span></td>';
        html += '<td style="font-size:0.8rem;color:var(--text2)">' + esc(zoneStr) + '</td>';
        html += '<td style="font-size:0.8rem;color:var(--text2)">' + lastUsed + '</td>';
        html += '<td>';
        if (c.status === 'ACTIVE') {
          html += '<button class="btn btn-sm btn-outline cred-action" data-id="' + c.id + '" data-action="suspend">Suspend</button> ';
        } else if (c.status === 'SUSPENDED') {
          html += '<button class="btn btn-sm btn-outline cred-action" data-id="' + c.id + '" data-action="activate">Activate</button> ';
        }
        if (c.status !== 'REVOKED') {
          html += '<button class="btn btn-sm btn-danger cred-action" data-id="' + c.id + '" data-action="revoke">Revoke</button>';
        }
        html += '</td>';
        html += '</tr>';
      });
    }
    html += '</tbody></table>';

    // Zone summary
    html += '<div style="margin-top:1.5rem"><div style="font-weight:600;margin-bottom:0.75rem">Access Zones</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.5rem">';
    zones.forEach(function(z) {
      var count = credentials.filter(function(c) { return c.status === 'ACTIVE' && (c.accessZones || []).indexOf(z.id) >= 0; }).length;
      html += '<div class="card" style="padding:0.75rem;border-left:2px solid var(--accent)">';
      html += '<div style="font-weight:600;font-size:0.85rem">' + esc(z.name) + '</div>';
      html += '<div style="font-size:0.75rem;color:var(--text3)">' + z.doorCount + ' doors &middot; ' + count + ' active credentials</div>';
      html += '</div>';
    });
    html += '</div></div>';

    document.getElementById('app').innerHTML = html;

    // ─── Modal ─────────────────────────────────────────────────
    if (showModal) renderModal();

    // ─── Bind Events ───────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() { currentTab = this.dataset.tab; render(); });
    });
    document.getElementById('searchInput').addEventListener('input', function() { searchText = this.value; render(); });
    document.getElementById('typeFilter').addEventListener('change', function() { typeFilter = this.value; render(); });
    document.getElementById('btnNewCred').addEventListener('click', function() { editCredential = null; showModal = true; render(); });
    document.querySelectorAll('.cred-action').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.dataset.id;
        var action = this.dataset.action;
        var cred = credentials.find(function(c) { return c.id === id; });
        if (!cred) return;
        if (action === 'suspend') cred.status = 'SUSPENDED';
        else if (action === 'activate') cred.status = 'ACTIVE';
        else if (action === 'revoke') cred.status = 'REVOKED';
        render();
      });
    });
  }

  function renderModal() {
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    var modal = document.createElement('div');
    modal.className = 'modal';
    var html = '<h3>' + (editCredential ? 'Edit Credential' : 'Provision New Credential') + '</h3>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">First Name</label><input class="form-input" id="mFirstName" placeholder="Jane"></div>';
    html += '<div class="form-row"><label class="form-label">Last Name</label><input class="form-input" id="mLastName" placeholder="Smith"></div>';
    html += '</div>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">Unit</label><input class="form-input" id="mUnit" placeholder="1205"></div>';
    html += '<div class="form-row"><label class="form-label">Person Type</label><select class="form-input" id="mPersonType"><option>STAFF</option><option>STUDENT</option><option>WORKER</option><option>VISITOR</option></select></div>';
    html += '</div>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">Credential Type</label><select class="form-input" id="mCredType"><option value="PHYSICAL_CARD">Physical Card</option><option value="MOBILE">Mobile</option><option value="FOB">Fob</option><option value="TEMPORARY_CARD">Temporary Card</option></select></div>';
    html += '<div class="form-row"><label class="form-label">Card Format</label><select class="form-input" id="mFormat"><option>HID iCLASS</option><option>HID Prox</option><option>MIFARE Classic</option><option>MIFARE DESFire</option><option>Seos</option><option>BLE</option></select></div>';
    html += '</div>';

    html += '<div class="form-grid">';
    html += '<div class="form-row"><label class="form-label">Card Number</label><input class="form-input" id="mCardNum" placeholder="Auto-generated"></div>';
    html += '<div class="form-row"><label class="form-label">Facility Code</label><input class="form-input" id="mFacility" value="FC-100"></div>';
    html += '</div>';

    html += '<div class="form-row"><label class="form-label">PIN Code (optional)</label><input class="form-input" id="mPin" placeholder="4-6 digits" type="password"></div>';

    html += '<div class="form-row"><label class="form-label">Expiration</label><input class="form-input" id="mExpires" type="date" value="' + new Date(Date.now() + 365 * 86400000).toISOString().split('T')[0] + '"></div>';

    html += '<div class="form-row"><label class="form-label">Access Zones</label>';
    html += '<div class="zone-chips" id="mZones">';
    zones.forEach(function(z) {
      html += '<span class="zone-chip" data-zone="' + z.id + '">' + esc(z.name) + '</span>';
    });
    html += '</div></div>';

    html += '<div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">';
    html += '<button class="btn btn-outline" id="mCancel">Cancel</button>';
    html += '<button class="btn btn-accent" id="mSave">Provision Credential</button>';
    html += '</div>';

    modal.innerHTML = html;
    overlay.appendChild(modal);
    document.getElementById('app').appendChild(overlay);

    // Zone chip toggles
    var selectedZones = new Set(['z1', 'z9']);
    document.querySelectorAll('.zone-chip').forEach(function(chip) {
      if (selectedZones.has(chip.dataset.zone)) chip.classList.add('selected');
      chip.addEventListener('click', function() {
        if (selectedZones.has(this.dataset.zone)) { selectedZones.delete(this.dataset.zone); this.classList.remove('selected'); }
        else { selectedZones.add(this.dataset.zone); this.classList.add('selected'); }
      });
    });

    overlay.addEventListener('click', function(e) { if (e.target === overlay) { showModal = false; render(); } });
    document.getElementById('mCancel').addEventListener('click', function() { showModal = false; render(); });
    document.getElementById('mSave').addEventListener('click', function() {
      var fn = document.getElementById('mFirstName').value || 'New';
      var ln = document.getElementById('mLastName').value || 'Credential';
      var newCred = {
        id: 'cred-' + Date.now(),
        cardholderName: fn + ' ' + ln,
        cardholderId: 'ch-' + Date.now(),
        unit: document.getElementById('mUnit').value || '-',
        credentialType: document.getElementById('mCredType').value,
        cardNumber: document.getElementById('mCardNum').value || String(10000 + Math.floor(Math.random() * 90000)),
        facilityCode: document.getElementById('mFacility').value || 'FC-100',
        cardFormat: document.getElementById('mFormat').value,
        status: 'ACTIVE',
        accessZones: Array.from(selectedZones),
        issuedAt: new Date().toISOString(),
        expiresAt: new Date(document.getElementById('mExpires').value || Date.now() + 365 * 86400000).toISOString(),
        lastUsed: null,
        personType: document.getElementById('mPersonType').value,
      };
      credentials.unshift(newCred);
      showModal = false;
      render();
    });
  }

  function timeAgo(ts) {
    var diff = Date.now() - new Date(ts).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  loadData();
})();
</script>
</body>
</html>
