<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amenity Reservations</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); } .val-accent { color: var(--accent); } .val-amber { color: var(--amber); } .val-red { color: var(--red); } .val-blue { color: var(--blue); } .val-purple { color: var(--purple); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
.card-body { padding: 0; }
.card-body-pad { padding: 20px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-gray { background: var(--bg3); color: var(--text3); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.btn { background: var(--accent); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
.btn-danger { background: var(--red); }
.btn-danger:hover { opacity: 0.9; background: var(--red); }
.amenity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 20px; }
.amenity-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.15s; }
.amenity-card:hover { border-color: var(--accent); }
.amenity-icon { font-size: 28px; margin-bottom: 10px; }
.amenity-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.amenity-status { font-size: 11px; margin-bottom: 10px; }
.amenity-occupancy { margin-top: 8px; }
.occ-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.occ-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.calendar-strip { display: flex; gap: 6px; padding: 16px 20px; overflow-x: auto; border-bottom: 1px solid var(--border); }
.cal-day { min-width: 52px; text-align: center; padding: 8px 6px; border-radius: 8px; cursor: pointer; font-size: 12px; background: var(--bg); border: 1px solid var(--border); }
.cal-day:hover { border-color: var(--accent); }
.cal-day.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.cal-day .day-name { font-size: 10px; color: var(--text3); text-transform: uppercase; }
.cal-day .day-num { font-size: 16px; font-weight: 700; margin-top: 2px; }
.cal-day .day-slots { font-size: 9px; color: var(--text3); margin-top: 2px; }
.time-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; padding: 16px 20px; }
.time-slot { padding: 8px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg); }
.time-slot.available { border-color: var(--green); color: var(--green); }
.time-slot.available:hover { background: rgba(34,197,94,0.1); }
.time-slot.booked { border-color: var(--red); color: var(--red); opacity: 0.6; cursor: not-allowed; }
.time-slot.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; }
.form-row > * { flex: 1; }
.form-group label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-group select, .form-group input, .form-group textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: var(--accent); }
.timeline { padding: 20px; }
.timeline-item { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.timeline-item:last-child { border-bottom: none; }
.timeline-time { min-width: 60px; font-size: 12px; font-weight: 600; color: var(--accent); }
.timeline-content { flex: 1; }
.timeline-title { font-size: 13px; font-weight: 500; }
.timeline-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 500; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 480px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <h2>New Reservation</h2>
    <div class="form-group" style="margin-bottom:12px">
      <label>Amenity</label>
      <select id="modalAmenity">
        <option value="pool">Pool &amp; Spa</option>
        <option value="rooftop">Rooftop Lounge</option>
        <option value="cowork">Co-Working Space</option>
        <option value="party">Party Room</option>
        <option value="guest-suite">Guest Suite</option>
        <option value="ev">EV Charging</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="modalDate"></div>
      <div class="form-group"><label>Time Slot</label>
        <select id="modalTime">
          <option>8:00 AM - 9:00 AM</option><option>9:00 AM - 10:00 AM</option><option>10:00 AM - 11:00 AM</option>
          <option>11:00 AM - 12:00 PM</option><option>12:00 PM - 1:00 PM</option><option>1:00 PM - 2:00 PM</option>
          <option>2:00 PM - 3:00 PM</option><option>3:00 PM - 4:00 PM</option><option>4:00 PM - 5:00 PM</option>
          <option>5:00 PM - 6:00 PM</option><option>6:00 PM - 7:00 PM</option><option>7:00 PM - 8:00 PM</option>
          <option>8:00 PM - 9:00 PM</option><option>9:00 PM - 10:00 PM</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tenant Name</label><input id="modalTenant" placeholder="John Smith"></div>
      <div class="form-group"><label>Unit</label><input id="modalUnit" placeholder="4B"></div>
    </div>
    <div class="form-group"><label>Notes (optional)</label><input id="modalNotes" placeholder="Special requests..."></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="submitBooking()">Confirm Reservation</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var amenities = [
    { id: 'fitness', name: 'Fitness Center', icon: '\u{1F3CB}', bookable: false, capacity: 30, current: 12, status: 'open' },
    { id: 'pool', name: 'Pool & Spa', icon: '\u{1F3CA}', bookable: true, capacity: 25, current: 8, status: 'open' },
    { id: 'rooftop', name: 'Rooftop Lounge', icon: '\u{1F307}', bookable: true, capacity: 40, current: 15, status: 'open' },
    { id: 'cowork', name: 'Co-Working Space', icon: '\u{1F4BB}', bookable: true, capacity: 20, current: 7, status: 'open' },
    { id: 'party', name: 'Party Room', icon: '\u{1F389}', bookable: true, capacity: 50, current: 0, status: 'available' },
    { id: 'guest-suite', name: 'Guest Suite', icon: '\u{1F6CF}', bookable: true, capacity: 2, current: 1, status: 'occupied' },
    { id: 'dog-run', name: 'Dog Run', icon: '\u{1F415}', bookable: false, capacity: 15, current: 4, status: 'open' },
    { id: 'ev', name: 'EV Charging', icon: '\u{1F50C}', bookable: true, capacity: 8, current: 5, status: 'open' }
  ];

  var tenants = ['Maria Santos 4B','James Chen 12A','Sarah O\'Brien 7C','David Kim 3D','Emily Johnson 8B','Michael Brown 15A','Lisa Wang 6C','Robert Taylor 11B','Anna Garcia 2A','Tom Wilson 9D','Jennifer Lee 5C','Carlos Rivera 14B','Michelle Park 10A','Kevin Adams 1D','Rachel Green 16C'];
  var statuses = ['Confirmed','Pending','Confirmed','Confirmed','Confirmed','Cancelled','Confirmed','Pending','Confirmed','Confirmed'];

  function rng(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }

  var now = new Date();
  var bookings = [];
  for (var i = 0; i < 30; i++) {
    var bookableAmenities = amenities.filter(function(a){return a.bookable;});
    var am = bookableAmenities[i % bookableAmenities.length];
    var d = new Date(now);
    d.setDate(d.getDate() + rng(-3, 14));
    var hr = rng(8, 21);
    bookings.push({
      id: 'RES-' + (1000 + i),
      tenant: tenants[i % tenants.length],
      amenity: am.name,
      amenityId: am.id,
      date: d.toISOString().split('T')[0],
      time: (hr > 12 ? (hr-12) : hr) + ':00 ' + (hr >= 12 ? 'PM' : 'AM') + ' - ' + ((hr+1) > 12 ? (hr+1-12) : (hr+1)) + ':00 ' + ((hr+1) >= 12 ? 'PM' : 'AM'),
      status: statuses[i % statuses.length],
      unit: tenants[i % tenants.length].split(' ').pop(),
      notes: i % 5 === 0 ? 'Birthday celebration' : i % 7 === 0 ? 'Guest visit' : ''
    });
  }
  bookings.sort(function(a,b){ return a.date > b.date ? 1 : -1; });

  var currentTab = 'overview';

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function statusBadge(s) {
    if (s === 'Confirmed') return '<span class="badge badge-green">Confirmed</span>';
    if (s === 'Pending') return '<span class="badge badge-amber">Pending</span>';
    if (s === 'Cancelled') return '<span class="badge badge-red">Cancelled</span>';
    return '<span class="badge badge-gray">' + esc(s) + '</span>';
  }

  function occColor(pct) {
    if (pct > 80) return 'var(--red)';
    if (pct > 50) return 'var(--amber)';
    return 'var(--green)';
  }

  function render() {
    var todayStr = now.toISOString().split('T')[0];
    var todayBookings = bookings.filter(function(b){ return b.date === todayStr && b.status !== 'Cancelled'; });
    var confirmed = bookings.filter(function(b){ return b.status === 'Confirmed'; }).length;
    var pending = bookings.filter(function(b){ return b.status === 'Pending'; }).length;
    var totalOccupancy = amenities.reduce(function(s,a){ return s + a.current; }, 0);

    var html = '<div class="header"><h1><span>Amenity</span> Reservations</h1><div class="header-actions"><button class="btn" onclick="openModal()">+ New Reservation</button></div></div>';

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Today\'s Bookings</div><div class="value val-accent">' + todayBookings.length + '</div><div class="sub">' + confirmed + ' confirmed total</div></div>';
    html += '<div class="stat-card"><div class="label">Pending Requests</div><div class="value val-amber">' + pending + '</div><div class="sub">Awaiting approval</div></div>';
    html += '<div class="stat-card"><div class="label">Current Occupancy</div><div class="value val-green">' + totalOccupancy + '</div><div class="sub">Across all amenities</div></div>';
    html += '<div class="stat-card"><div class="label">Available Slots Today</div><div class="value val-blue">' + (42 - todayBookings.length) + '</div><div class="sub">Across bookable amenities</div></div>';
    html += '</div>';

    // Tabs
    html += '<div class="tab-bar">';
    html += '<button class="tab-btn' + (currentTab==='overview'?' active':'') + '" onclick="switchTab(\'overview\')">Amenities</button>';
    html += '<button class="tab-btn' + (currentTab==='bookings'?' active':'') + '" onclick="switchTab(\'bookings\')">All Bookings</button>';
    html += '<button class="tab-btn' + (currentTab==='calendar'?' active':'') + '" onclick="switchTab(\'calendar\')">Calendar</button>';
    html += '<button class="tab-btn' + (currentTab==='timeline'?' active':'') + '" onclick="switchTab(\'timeline\')">Today\'s Timeline</button>';
    html += '</div>';

    if (currentTab === 'overview') {
      html += renderAmenities();
    } else if (currentTab === 'bookings') {
      html += renderBookings();
    } else if (currentTab === 'calendar') {
      html += renderCalendar();
    } else if (currentTab === 'timeline') {
      html += renderTimeline();
    }

    document.getElementById('app').innerHTML = html;
  }

  function renderAmenities() {
    var html = '<div class="card"><div class="card-head"><h2>Amenity Status</h2><span class="count">' + amenities.length + ' amenities</span></div>';
    html += '<div class="amenity-grid">';
    amenities.forEach(function(a) {
      var pct = Math.round((a.current / a.capacity) * 100);
      html += '<div class="amenity-card">';
      html += '<div class="amenity-icon">' + a.icon + '</div>';
      html += '<div class="amenity-name">' + esc(a.name) + '</div>';
      html += '<div class="amenity-status">';
      if (a.bookable) {
        html += '<span class="badge badge-accent">Bookable</span>';
      } else {
        html += '<span class="badge badge-gray">Open Access</span>';
      }
      html += '</div>';
      html += '<div class="amenity-occupancy">';
      html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3)"><span>Occupancy</span><span>' + a.current + ' / ' + a.capacity + '</span></div>';
      html += '<div class="occ-bar"><div class="occ-fill" style="width:' + pct + '%;background:' + occColor(pct) + '"></div></div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    return html;
  }

  function renderBookings() {
    var html = '<div class="card"><div class="card-head"><h2>All Reservations</h2><span class="count">' + bookings.length + ' bookings</span></div>';
    html += '<div class="card-body"><table><thead><tr><th>ID</th><th>Tenant</th><th>Unit</th><th>Amenity</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    bookings.forEach(function(b) {
      html += '<tr><td style="color:var(--text3)">' + esc(b.id) + '</td>';
      html += '<td>' + esc(b.tenant.replace(/\s\S+$/, '')) + '</td>';
      html += '<td>' + esc(b.unit) + '</td>';
      html += '<td>' + esc(b.amenity) + '</td>';
      html += '<td>' + esc(b.date) + '</td>';
      html += '<td style="font-size:12px">' + esc(b.time) + '</td>';
      html += '<td>' + statusBadge(b.status) + '</td>';
      html += '<td>';
      if (b.status === 'Pending') html += '<button class="btn btn-sm" style="margin-right:4px">Approve</button>';
      if (b.status !== 'Cancelled') html += '<button class="btn btn-sm btn-danger">Cancel</button>';
      html += '</td></tr>';
    });
    html += '</tbody></table></div></div>';
    return html;
  }

  function renderCalendar() {
    var html = '<div class="card"><div class="card-head"><h2>Weekly Calendar</h2></div>';
    html += '<div class="calendar-strip">';
    for (var d = -1; d < 13; d++) {
      var dt = new Date(now);
      dt.setDate(dt.getDate() + d);
      var ds = dt.toISOString().split('T')[0];
      var dayBookings = bookings.filter(function(b){ return b.date === ds && b.status !== 'Cancelled'; }).length;
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var isToday = d === 0;
      html += '<div class="cal-day' + (isToday ? ' active' : '') + '">';
      html += '<div class="day-name">' + days[dt.getDay()] + '</div>';
      html += '<div class="day-num">' + dt.getDate() + '</div>';
      html += '<div class="day-slots">' + dayBookings + ' booked</div>';
      html += '</div>';
    }
    html += '</div>';

    // Time slots for today
    html += '<div style="padding:16px 20px;font-size:13px;font-weight:600;color:var(--text2)">Today\'s Time Slots &mdash; Rooftop Lounge</div>';
    html += '<div class="time-slots">';
    var bookedHours = [9, 11, 14, 15, 19];
    for (var h = 8; h <= 21; h++) {
      var booked = bookedHours.indexOf(h) >= 0;
      var label = (h > 12 ? (h-12) : h) + ':00 ' + (h >= 12 ? 'PM' : 'AM');
      html += '<div class="time-slot ' + (booked ? 'booked' : 'available') + '">' + label + (booked ? ' (Booked)' : '') + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  function renderTimeline() {
    var todayStr = now.toISOString().split('T')[0];
    var todayBookings = bookings.filter(function(b){ return b.date === todayStr && b.status !== 'Cancelled'; });
    todayBookings.sort(function(a,b){ return a.time > b.time ? 1 : -1; });

    var html = '<div class="card"><div class="card-head"><h2>Today\'s Schedule</h2><span class="count">' + todayBookings.length + ' reservations</span></div>';
    if (todayBookings.length === 0) {
      html += '<div style="padding:40px;text-align:center;color:var(--text3)">No bookings for today</div>';
    } else {
      html += '<div class="timeline">';
      todayBookings.forEach(function(b) {
        html += '<div class="timeline-item">';
        html += '<div class="timeline-time">' + esc(b.time.split(' - ')[0]) + '</div>';
        html += '<div class="timeline-content">';
        html += '<div class="timeline-title">' + esc(b.amenity) + ' &mdash; ' + esc(b.tenant.replace(/\s\S+$/, '')) + ' (Unit ' + esc(b.unit) + ')</div>';
        html += '<div class="timeline-meta">' + esc(b.time) + (b.notes ? ' &bull; ' + esc(b.notes) : '') + '</div>';
        html += '</div>';
        html += '<div>' + statusBadge(b.status) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    // Upcoming this week
    var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + 7);
    var weekStr = weekEnd.toISOString().split('T')[0];
    var upcoming = bookings.filter(function(b){ return b.date > todayStr && b.date <= weekStr && b.status !== 'Cancelled'; });
    html += '<div class="card"><div class="card-head"><h2>Upcoming This Week</h2><span class="count">' + upcoming.length + ' reservations</span></div>';
    html += '<div class="timeline">';
    upcoming.slice(0, 10).forEach(function(b) {
      html += '<div class="timeline-item">';
      html += '<div class="timeline-time" style="min-width:80px">' + esc(b.date.slice(5)) + '</div>';
      html += '<div class="timeline-content"><div class="timeline-title">' + esc(b.amenity) + ' &mdash; ' + esc(b.tenant.replace(/\s\S+$/, '')) + '</div>';
      html += '<div class="timeline-meta">' + esc(b.time) + '</div></div>';
      html += '<div>' + statusBadge(b.status) + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    return html;
  }

  window.switchTab = function(tab) { currentTab = tab; render(); };
  window.openModal = function() { document.getElementById('bookingModal').classList.add('open'); };
  window.closeModal = function() { document.getElementById('bookingModal').classList.remove('open'); };
  window.submitBooking = function() {
    var am = document.getElementById('modalAmenity').value;
    var amObj = amenities.find(function(a){ return a.id === am; });
    bookings.unshift({
      id: 'RES-' + (2000 + bookings.length),
      tenant: document.getElementById('modalTenant').value || 'New Tenant',
      amenity: amObj ? amObj.name : am,
      amenityId: am,
      date: document.getElementById('modalDate').value || now.toISOString().split('T')[0],
      time: document.getElementById('modalTime').value,
      status: 'Pending',
      unit: document.getElementById('modalUnit').value || '1A',
      notes: document.getElementById('modalNotes').value
    });
    window.closeModal();
    render();
  };

  // Simulate occupancy changes
  setInterval(function() {
    amenities.forEach(function(a) {
      var delta = Math.random() > 0.5 ? 1 : -1;
      a.current = Math.max(0, Math.min(a.capacity, a.current + delta));
    });
    if (currentTab === 'overview') render();
  }, 5000);

  render();
})();
</script>
</body>
</html>
