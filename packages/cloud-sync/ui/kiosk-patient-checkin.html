<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Patient Check-In &amp; Wayfinding</title>
<style>
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1d2e;
  --bg-tertiary: #242840;
  --border: #2e3348;
  --text-primary: #e4e6f0;
  --text-secondary: #8b8fa3;
  --accent: #0891b2;
  --accent-hover: #06b6d4;
  --accent-dim: rgba(8,145,178,0.15);
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  transform: scale(0.97);
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

/* Clock */
.clock {
  position: fixed;
  top: 1rem;
  right: 1.5rem;
  font-size: 1.1rem;
  color: var(--text-secondary);
  z-index: 100;
  letter-spacing: 0.04em;
}

/* Footer help */
.help-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  padding: 0.75rem;
  font-size: 0.95rem;
  color: var(--text-secondary);
  background: rgba(15,15,35,0.9);
  border-top: 1px solid var(--border);
  z-index: 100;
}

/* Idle screen */
.idle {
  align-items: center;
  justify-content: center;
  gap: 2rem;
  padding: 2rem;
  text-align: center;
}
.idle-icon {
  font-size: 5rem;
  opacity: 0.8;
}
.idle h1 {
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  line-height: 1.2;
}
.idle h1 span { color: var(--accent); }
.idle-subtitle {
  font-size: 1.2rem;
  color: var(--text-secondary);
}
.idle-actions {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
}
.idle-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  padding: 1.5rem 2.5rem;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-size: 1.2rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 220px;
  min-height: 120px;
  position: relative;
  overflow: hidden;
}
.idle-btn:active {
  transform: scale(0.96);
  background: var(--accent-dim);
  border-color: var(--accent);
}
.idle-btn .icon { font-size: 2.5rem; }

/* Back button */
.back-btn {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 1rem;
  cursor: pointer;
  min-height: 48px;
  transition: all 0.2s;
}
.back-btn:active { background: var(--accent-dim); }

/* Header bar */
.header-bar {
  display: flex;
  align-items: center;
  padding: 1rem 1.5rem;
  gap: 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-bar h2 {
  font-size: 1.4rem;
  font-weight: 700;
}

/* Directory */
.search-box {
  margin: 1rem 1.5rem 0.5rem;
  flex-shrink: 0;
}
.search-box input {
  width: 100%;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 1.2rem;
  outline: none;
  min-height: 56px;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-secondary); }

.dept-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.5rem 1.5rem 5rem;
}
.dept-item {
  display: flex;
  align-items: center;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 64px;
  gap: 1rem;
}
.dept-item:active {
  background: var(--accent-dim);
  border-color: var(--accent);
}
.dept-icon { font-size: 1.8rem; flex-shrink: 0; }
.dept-info { flex: 1; }
.dept-name { font-size: 1.15rem; font-weight: 600; }
.dept-loc { font-size: 0.95rem; color: var(--text-secondary); margin-top: 0.15rem; }
.dept-arrow { font-size: 1.5rem; color: var(--text-secondary); }

/* Directions screen */
.directions {
  padding: 2rem 1.5rem 5rem;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 1.5rem;
}
.dir-dept-name {
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
}
.dir-location {
  font-size: 1.3rem;
  color: var(--text-secondary);
}
.dir-steps {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 500px;
  margin-top: 1rem;
}
.dir-step {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  text-align: left;
  font-size: 1.1rem;
}
.dir-step-num {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.dir-arrow-icon {
  font-size: 4rem;
  color: var(--accent);
  margin: 0.5rem 0;
}

/* Check-in */
.checkin-form {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  padding: 2rem 1.5rem 5rem;
}
.checkin-form h2 {
  font-size: 1.6rem;
  font-weight: 700;
  text-align: center;
}
.form-group {
  width: 100%;
  max-width: 450px;
}
.form-group label {
  display: block;
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
}
.form-group input {
  width: 100%;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 1.3rem;
  outline: none;
  min-height: 56px;
}
.form-group input:focus { border-color: var(--accent); }

.submit-btn {
  padding: 1rem 3rem;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 56px;
  min-width: 200px;
  transition: all 0.2s;
}
.submit-btn:active { transform: scale(0.96); background: var(--accent-hover); }

.tab-bar {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.tab-btn {
  flex: 1;
  padding: 0.75rem;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Confirmation */
.confirm-screen {
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 1.5rem;
  padding: 2rem 1.5rem 5rem;
}
.confirm-check {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  color: #fff;
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}
.confirm-name {
  font-size: 1.8rem;
  font-weight: 700;
}
.confirm-detail {
  font-size: 1.2rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.confirm-area {
  padding: 1rem 2rem;
  background: var(--accent-dim);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
}

/* Touch ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transform: scale(0);
  animation: rippleAnim 0.5s ease-out;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* Orientation */
@media (orientation: portrait) {
  .idle-actions { flex-direction: column; align-items: center; }
  .idle-btn { min-width: 280px; }
}
</style>
</head>
<body>

<div class="clock" id="clock"></div>
<div class="help-footer">Need Help? Call Security x2911</div>

<!-- Idle Screen -->
<div class="screen idle active" id="screen-idle">
  <div class="idle-icon">🏥</div>
  <h1 id="hospitalName">General <span>Hospital</span></h1>
  <div class="idle-subtitle">Welcome. How can we help you today?</div>
  <div class="idle-actions">
    <button class="idle-btn" onclick="showScreen('directory')">
      <span class="icon">🗺️</span>
      <span>Find a Department</span>
    </button>
    <button class="idle-btn" onclick="showScreen('checkin')">
      <span class="icon">📋</span>
      <span>Check In for Appointment</span>
    </button>
  </div>
</div>

<!-- Directory Screen -->
<div class="screen" id="screen-directory">
  <div class="header-bar">
    <button class="back-btn" onclick="showScreen('idle')">← Back</button>
    <h2>Department Directory</h2>
  </div>
  <div class="search-box">
    <input type="text" id="deptSearch" placeholder="Search departments..." oninput="filterDepts()">
  </div>
  <div class="dept-list" id="deptList"></div>
</div>

<!-- Directions Screen -->
<div class="screen directions" id="screen-directions">
  <button class="back-btn" onclick="showScreen('directory')" style="align-self:flex-start;margin-bottom:0.5rem">← Back to Directory</button>
  <div class="dir-dept-name" id="dirDeptName"></div>
  <div class="dir-location" id="dirLocation"></div>
  <div class="dir-arrow-icon" id="dirArrow"></div>
  <div class="dir-steps" id="dirSteps"></div>
</div>

<!-- Check-in Screen -->
<div class="screen" id="screen-checkin">
  <div class="header-bar">
    <button class="back-btn" onclick="showScreen('idle')">← Back</button>
    <h2>Appointment Check-In</h2>
  </div>
  <div class="checkin-form">
    <div class="tab-bar" style="width:100%;max-width:450px">
      <button class="tab-btn active" onclick="setCheckinTab('code',this)">Appointment Code</button>
      <button class="tab-btn" onclick="setCheckinTab('name',this)">Last Name + DOB</button>
    </div>
    <div id="checkinCode" class="form-group">
      <label>Enter Your Appointment Code</label>
      <input type="text" id="inputCode" placeholder="e.g. APT-48291" autocomplete="off">
    </div>
    <div id="checkinName" class="form-group" style="display:none">
      <label>Last Name</label>
      <input type="text" id="inputLastName" placeholder="Last name" autocomplete="off" style="margin-bottom:0.75rem">
      <label>Date of Birth</label>
      <input type="text" id="inputDOB" placeholder="MM/DD/YYYY" autocomplete="off">
    </div>
    <button class="submit-btn" onclick="doCheckin()">Check In</button>
  </div>
</div>

<!-- Confirmation Screen -->
<div class="screen confirm-screen" id="screen-confirm">
  <div class="confirm-check">✓</div>
  <div class="confirm-name" id="confirmName"></div>
  <div class="confirm-detail" id="confirmDetail"></div>
  <div class="confirm-area" id="confirmArea"></div>
  <div style="color:var(--text-secondary);font-size:1rem;margin-top:1rem">Returning to home in <span id="confirmCountdown">10</span>s</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const accentColor = params.get('accent');
const product = params.get('product') || 'Healthcare';
if (accentColor) {
  document.documentElement.style.setProperty('--accent', accentColor);
  document.documentElement.style.setProperty('--accent-hover', accentColor);
  document.documentElement.style.setProperty('--accent-dim', accentColor + '22');
}

const departments = [
  { name: 'Emergency Department', icon: '🚨', floor: 1, wing: 'East', room: 'Main Entrance', directions: ['Enter through main doors', 'Turn right at reception', 'Follow red line on floor', 'Emergency entrance is straight ahead'] },
  { name: 'Radiology & Imaging', icon: '📡', floor: 1, wing: 'North', room: '142', directions: ['Enter through main doors', 'Go straight past reception', 'Turn left at the elevators', 'Radiology is on your left, Room 142'] },
  { name: 'Laboratory Services', icon: '🔬', floor: 1, wing: 'North', room: '118', directions: ['Enter through main doors', 'Go straight past reception', 'Turn left at the elevators', 'Lab is second door on right, Room 118'] },
  { name: 'Pharmacy', icon: '💊', floor: 1, wing: 'West', room: '105', directions: ['Enter through main doors', 'Turn left at reception', 'Follow hallway to end', 'Pharmacy window is on your right'] },
  { name: 'Cardiology', icon: '❤️', floor: 2, wing: 'South', room: '210', directions: ['Take elevator to Floor 2', 'Turn right out of elevator', 'Follow signs for South Wing', 'Cardiology is Room 210'] },
  { name: 'Orthopedics', icon: '🦴', floor: 2, wing: 'North', room: '235', directions: ['Take elevator to Floor 2', 'Turn left out of elevator', 'Follow signs for North Wing', 'Orthopedics is Room 235'] },
  { name: 'Pediatrics', icon: '👶', floor: 2, wing: 'West', room: '250', directions: ['Take elevator to Floor 2', 'Turn left out of elevator', 'Continue past North Wing to West Wing', 'Pediatrics entrance has colorful doors'] },
  { name: 'Maternity & Labor', icon: '🤱', floor: 3, wing: 'West', room: '301', directions: ['Take elevator to Floor 3', 'Turn left out of elevator', 'Follow signs for Maternity', 'Check in at nurses station, Room 301'] },
  { name: 'Intensive Care Unit', icon: '🏥', floor: 3, wing: 'East', room: '350', directions: ['Take elevator to Floor 3', 'Turn right out of elevator', 'Follow East Wing corridor', 'ICU entrance requires buzzer, Room 350'] },
  { name: 'Surgery Center', icon: '⚕️', floor: 3, wing: 'South', room: '320', directions: ['Take elevator to Floor 3', 'Turn right out of elevator', 'Follow signs for Surgery', 'Check in at pre-op desk, Room 320'] },
  { name: 'Oncology', icon: '🎗️', floor: 4, wing: 'North', room: '410', directions: ['Take elevator to Floor 4', 'Turn left out of elevator', 'North Wing first hallway', 'Oncology reception at Room 410'] },
  { name: 'Neurology', icon: '🧠', floor: 4, wing: 'South', room: '445', directions: ['Take elevator to Floor 4', 'Turn right out of elevator', 'Follow South Wing corridor', 'Neurology is Room 445'] },
  { name: 'Physical Therapy', icon: '🏃', floor: 1, wing: 'South', room: '160', directions: ['Enter through main doors', 'Turn right at reception', 'Pass the Emergency department', 'Physical Therapy is at end of hall, Room 160'] },
  { name: 'Gastroenterology', icon: '🩺', floor: 2, wing: 'East', room: '228', directions: ['Take elevator to Floor 2', 'Turn right out of elevator', 'Follow East Wing corridor', 'GI Clinic is Room 228'] },
  { name: 'Outpatient Clinic', icon: '🏢', floor: 1, wing: 'West', room: '130', directions: ['Enter through main doors', 'Turn left at reception', 'First hallway on right', 'Outpatient check-in at Room 130'] }
];

const sampleAppointments = [
  { code: 'APT-48291', name: 'Sarah Mitchell', doctor: 'Dr. Wilson', time: '2:30 PM', area: 'Waiting Area B', dept: 'Cardiology' },
  { code: 'APT-73520', name: 'Robert Chen', doctor: 'Dr. Patel', time: '3:00 PM', area: 'Waiting Area A', dept: 'Orthopedics' },
  { code: 'APT-91044', name: 'Maria Garcia', doctor: 'Dr. Thompson', time: '10:15 AM', area: 'Waiting Area C', dept: 'Pediatrics' }
];

function renderDepts(filter = '') {
  const list = document.getElementById('deptList');
  const f = filter.toLowerCase();
  const filtered = departments.filter(d => d.name.toLowerCase().includes(f));
  list.innerHTML = filtered.map((d, i) => `
    <div class="dept-item" onclick="showDirections(${departments.indexOf(d)})">
      <span class="dept-icon">${d.icon}</span>
      <div class="dept-info">
        <div class="dept-name">${d.name}</div>
        <div class="dept-loc">Floor ${d.floor}, ${d.wing} Wing, Room ${d.room}</div>
      </div>
      <span class="dept-arrow">→</span>
    </div>
  `).join('');
}

function filterDepts() {
  renderDepts(document.getElementById('deptSearch').value);
  resetInactivity();
}

function showDirections(idx) {
  const d = departments[idx];
  document.getElementById('dirDeptName').textContent = d.name;
  document.getElementById('dirLocation').textContent = `Floor ${d.floor} · ${d.wing} Wing · Room ${d.room}`;
  const arrows = ['→', '↑', '←', '↗️'];
  document.getElementById('dirArrow').textContent = d.floor > 1 ? '↑' : arrows[idx % arrows.length];
  document.getElementById('dirSteps').innerHTML = d.directions.map((s, i) => `
    <div class="dir-step">
      <div class="dir-step-num">${i + 1}</div>
      <div>${s}</div>
    </div>
  `).join('');
  showScreen('directions');
}

function setCheckinTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('checkinCode').style.display = tab === 'code' ? 'block' : 'none';
  document.getElementById('checkinName').style.display = tab === 'name' ? 'block' : 'none';
  resetInactivity();
}

function doCheckin() {
  const code = document.getElementById('inputCode').value.trim();
  const lastName = document.getElementById('inputLastName').value.trim();
  // Simulate lookup
  const appt = code ? sampleAppointments.find(a => a.code.toLowerCase() === code.toLowerCase()) :
    (lastName ? sampleAppointments.find(a => a.name.toLowerCase().includes(lastName.toLowerCase())) : null);

  if (appt) {
    document.getElementById('confirmName').textContent = `Welcome, ${appt.name}`;
    document.getElementById('confirmDetail').innerHTML = `Your appointment with <strong>${appt.doctor}</strong><br>is at <strong>${appt.time}</strong> — ${appt.dept}`;
    document.getElementById('confirmArea').textContent = `Please take a seat in ${appt.area}`;
  } else {
    document.getElementById('confirmName').textContent = 'Welcome';
    const now = new Date();
    const h = now.getHours();
    const timeStr = h < 12 ? 'this morning' : h < 17 ? 'this afternoon' : 'this evening';
    document.getElementById('confirmDetail').innerHTML = `You have been checked in for your appointment ${timeStr}.<br>A staff member will be with you shortly.`;
    document.getElementById('confirmArea').textContent = 'Please take a seat in Waiting Area A';
  }
  showScreen('confirm');
  let c = 10;
  document.getElementById('confirmCountdown').textContent = c;
  const iv = setInterval(() => {
    c--;
    document.getElementById('confirmCountdown').textContent = c;
    if (c <= 0) { clearInterval(iv); showScreen('idle'); }
  }, 1000);
}

let currentScreen = 'idle';
let inactivityTimer = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  currentScreen = id;
  if (id === 'directory') { renderDepts(); document.getElementById('deptSearch').value = ''; }
  if (id === 'idle') {
    document.getElementById('inputCode').value = '';
    document.getElementById('inputLastName').value = '';
    document.getElementById('inputDOB').value = '';
  }
  resetInactivity();
}

function resetInactivity() {
  clearTimeout(inactivityTimer);
  if (currentScreen !== 'idle' && currentScreen !== 'confirm') {
    inactivityTimer = setTimeout(() => showScreen('idle'), 60000);
  }
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Touch ripple
document.addEventListener('pointerdown', e => {
  const t = e.target.closest('.idle-btn,.dept-item,.back-btn,.submit-btn,.tab-btn');
  if (!t) return;
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = t.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = sz + 'px';
  r.style.left = (e.clientX - rect.left - sz / 2) + 'px';
  r.style.top = (e.clientY - rect.top - sz / 2) + 'px';
  t.appendChild(r);
  setTimeout(() => r.remove(), 500);
  resetInactivity();
});

document.addEventListener('pointerdown', resetInactivity);
</script>
</body>
</html>
