<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hot Desk Booking</title>
<style>
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1d2e;
  --bg-tertiary: #242840;
  --border: #2e3348;
  --text-primary: #e4e6f0;
  --text-secondary: #8b8fa3;
  --accent: #8b5cf6;
  --accent-hover: #a78bfa;
  --accent-dim: rgba(139,92,246,0.15);
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.15);
  --danger: #ef4444;
  --danger-dim: rgba(239,68,68,0.15);
  --reserved: #3b82f6;
  --reserved-dim: rgba(59,130,246,0.15);
  --radius: 12px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  transform: scale(0.97);
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

.corner-clock {
  position: fixed;
  top: 1rem;
  right: 1.5rem;
  font-size: 1rem;
  color: var(--text-secondary);
  z-index: 100;
  letter-spacing: 0.04em;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.top-bar h1 {
  font-size: 1.3rem;
  font-weight: 700;
}
.top-bar h1 span { color: var(--accent); }
.occupancy-badge {
  background: var(--bg-tertiary);
  padding: 0.5rem 1rem;
  border-radius: 2rem;
  font-size: 0.95rem;
  color: var(--text-secondary);
}
.occupancy-badge strong { color: var(--text-primary); }

/* Legend */
.legend {
  display: flex;
  gap: 1.25rem;
  padding: 0.75rem 1.5rem;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

/* Floor map */
.floor-map {
  flex: 1;
  padding: 1rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.desk-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 0.6rem;
  max-width: 900px;
  margin: 0 auto;
}
.desk-cell {
  aspect-ratio: 1.2;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  min-height: 64px;
}
.desk-cell .desk-id {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
}
.desk-cell .desk-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.desk-cell.available { border-color: rgba(34,197,94,0.3); }
.desk-cell.available .desk-dot { background: var(--success); }
.desk-cell.available:active { background: var(--success-dim); border-color: var(--success); }
.desk-cell.occupied { border-color: rgba(239,68,68,0.2); opacity: 0.6; cursor: default; }
.desk-cell.occupied .desk-dot { background: var(--danger); }
.desk-cell.reserved { border-color: rgba(59,130,246,0.3); }
.desk-cell.reserved .desk-dot { background: var(--reserved); }
.desk-cell.selected { border-color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent); }

/* Amenity markers */
.amenity-row {
  display: flex;
  gap: 0.75rem;
  margin: 1rem auto 0;
  max-width: 900px;
  flex-wrap: wrap;
  justify-content: center;
}
.amenity-tag {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.8rem;
  background: var(--bg-tertiary);
  border-radius: 2rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.amenity-tag svg { width: 14px; height: 14px; fill: var(--text-secondary); }

/* Desk detail panel */
.desk-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 1.5rem;
  transform: translateY(100%);
  transition: transform 0.35s ease;
  z-index: 150;
  max-height: 60vh;
  overflow-y: auto;
}
.desk-panel.open { transform: translateY(0); }
.desk-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.desk-panel-header h2 { font-size: 1.4rem; font-weight: 700; }
.close-panel {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  border: none;
  color: var(--text-primary);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.desk-features {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.feature-chip {
  padding: 0.4rem 0.8rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 2rem;
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.duration-options {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1rem;
}
.duration-btn {
  flex: 1;
  padding: 0.9rem;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  min-height: 48px;
}
.duration-btn:active, .duration-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
.book-btn {
  width: 100%;
  padding: 1.1rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 56px;
  opacity: 0.4;
  pointer-events: none;
  transition: all 0.2s;
}
.book-btn.ready { opacity: 1; pointer-events: auto; }
.book-btn:active { transform: scale(0.97); }

/* Confirmation overlay */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,15,35,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
  padding: 2rem;
  text-align: center;
}
.confirm-overlay.show { opacity: 1; pointer-events: auto; }
.confirm-icon {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--success-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.confirm-icon svg { width: 56px; height: 56px; fill: var(--success); }
@keyframes pop-in { 0% { transform: scale(0); } 100% { transform: scale(1); } }
.confirm-details {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem 2rem;
  width: 100%;
  max-width: 420px;
}
.confirm-row {
  display: flex;
  justify-content: space-between;
  padding: 0.6rem 0;
  font-size: 1.05rem;
}
.confirm-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.confirm-row .label { color: var(--text-secondary); }
.confirm-row .value { font-weight: 600; }
.done-btn {
  padding: 1.1rem 3rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1.2rem;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 56px;
}
.done-btn:active { transform: scale(0.97); }

/* Ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transform: scale(0);
  animation: ripple-anim 0.6s linear;
  pointer-events: none;
}
@keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

.help-footer {
  position: fixed;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.95rem;
  color: var(--text-secondary);
  z-index: 100;
  opacity: 0.6;
}

@media (orientation: portrait) {
  .desk-grid { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 500px) {
  .desk-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
  .desk-cell { min-height: 52px; }
}
</style>
</head>
<body>

<div class="corner-clock" id="clock"></div>

<!-- Floor Map Screen -->
<div class="screen active" id="screenMap">
  <div class="top-bar">
    <h1>Floor 3 — <span>Hot Desk</span></h1>
    <div class="occupancy-badge"><strong id="occupiedCount">23</strong> / 40 occupied</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Occupied</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--reserved)"></div> Reserved</div>
  </div>
  <div class="floor-map">
    <div class="desk-grid" id="deskGrid"></div>
    <div class="amenity-row">
      <div class="amenity-tag"><svg viewBox="0 0 24 24"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 5h-2V5h2v3z"/><path d="M2 21h20v-2H2z"/></svg> Kitchen — 15m</div>
      <div class="amenity-tag"><svg viewBox="0 0 24 24"><path d="M19 8h-1V3H6v5H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zM8 5h8v3H8V5zm8 14H8v-4h8v4zm4-4h-2v-2H6v2H4v-4c0-.55.45-1 1-1h14c.55 0 1 .45 1 1v4z"/></svg> Printer — 8m</div>
      <div class="amenity-tag"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg> Restroom — 20m</div>
    </div>
  </div>
</div>

<!-- Desk Detail Panel (slides up from bottom) -->
<div class="desk-panel" id="deskPanel">
  <div class="desk-panel-header">
    <h2 id="panelDeskId">Desk 4B</h2>
    <button class="close-panel" onclick="closePanel()">&times;</button>
  </div>
  <div class="desk-features" id="panelFeatures"></div>
  <div style="font-size:1rem;color:var(--text-secondary);margin-bottom:1rem;">Select duration:</div>
  <div class="duration-options">
    <button class="duration-btn" onclick="selectDuration(this, '2hr')">2 Hours</button>
    <button class="duration-btn" onclick="selectDuration(this, 'half')">Half Day</button>
    <button class="duration-btn" onclick="selectDuration(this, 'full')">Full Day</button>
  </div>
  <button class="book-btn" id="bookBtn" onclick="bookDesk()">Book This Desk</button>
</div>

<!-- Confirmation Overlay -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-icon">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
  </div>
  <h2 style="font-size:1.6rem;">Desk Reserved</h2>
  <div class="confirm-details">
    <div class="confirm-row"><span class="label">Desk</span><span class="value" id="confirmDesk">4B</span></div>
    <div class="confirm-row"><span class="label">Reserved For</span><span class="value" id="confirmName">John Smith</span></div>
    <div class="confirm-row"><span class="label">Until</span><span class="value" id="confirmUntil">5:00 PM</span></div>
    <div class="confirm-row"><span class="label">Floor</span><span class="value">Floor 3</span></div>
  </div>
  <button class="done-btn" onclick="resetKiosk()">Done</button>
</div>

<div class="help-footer">Need Help? Call Facilities x150</div>

<script>
const params = new URLSearchParams(location.search);
const accentColor = params.get('accent');
if (accentColor) {
  document.documentElement.style.setProperty('--accent', accentColor);
  document.documentElement.style.setProperty('--accent-dim', accentColor + '26');
}

const ROWS = ['A', 'B', 'C', 'D', 'E'];
const COLS = 8;
const TOTAL_DESKS = 40;

const DESK_FEATURES_MAP = {
  standing: [2, 5, 11, 18, 24, 30, 35],
  dualMonitor: [1, 3, 7, 10, 14, 20, 25, 28, 33, 38],
  window: [1, 2, 3, 4, 5, 6, 7, 8],  // Row A = near window
  quiet: [33, 34, 35, 36, 37, 38, 39, 40]  // Row E = quiet zone
};

let desks = [];
let selectedDesk = null;
let selectedDuration = null;
let idleTimer = null;
const IDLE_TIMEOUT = 60000;

const DEMO_NAMES = ['Alice Chen', 'Bob Martinez', 'Carol Johnson', 'Dave Kim', 'Eva Singh', 'Frank Lee', 'Grace Wu', 'Hank Torres', 'Iris Patel', 'Jake Brown', 'Kate Davis', 'Liam Nguyen', 'Mia Garcia', 'Noah Wilson', 'Olivia Hall', 'Peter Yang', 'Quinn Adams', 'Rosa Lopez', 'Sam Clark', 'Tina Foster', 'Uma Shah', 'Vic Moore', 'Wendy Reed'];

function initDesks() {
  desks = [];
  let occupied = 0;
  for (let i = 0; i < TOTAL_DESKS; i++) {
    const row = ROWS[Math.floor(i / COLS)];
    const col = (i % COLS) + 1;
    const id = col + row;
    const deskNum = i + 1;

    let status = 'available';
    const rand = Math.random();
    if (rand < 0.45) { status = 'occupied'; occupied++; }
    else if (rand < 0.55) { status = 'reserved'; }

    const features = [];
    if (DESK_FEATURES_MAP.standing.includes(deskNum)) features.push('Standing Desk');
    if (DESK_FEATURES_MAP.dualMonitor.includes(deskNum)) features.push('Dual Monitor');
    else features.push('Single Monitor');
    if (DESK_FEATURES_MAP.window.includes(deskNum)) features.push('Near Window');
    if (DESK_FEATURES_MAP.quiet.includes(deskNum)) features.push('Quiet Zone');

    desks.push({ id, num: deskNum, status, features, occupant: status === 'occupied' ? DEMO_NAMES[occupied % DEMO_NAMES.length] : null });
  }
  document.getElementById('occupiedCount').textContent = desks.filter(d => d.status !== 'available').length;
  renderDesks();
}

function renderDesks() {
  const grid = document.getElementById('deskGrid');
  grid.innerHTML = '';
  desks.forEach((desk, i) => {
    const cell = document.createElement('div');
    cell.className = 'desk-cell ' + desk.status;
    cell.innerHTML = '<div class="desk-id">' + desk.id + '</div><div class="desk-dot"></div>';
    if (desk.status === 'available') {
      cell.onclick = () => openDeskPanel(desk);
    }
    grid.appendChild(cell);
  });
}

function openDeskPanel(desk) {
  selectedDesk = desk;
  selectedDuration = null;
  document.getElementById('panelDeskId').textContent = 'Desk ' + desk.id;
  const featuresEl = document.getElementById('panelFeatures');
  featuresEl.innerHTML = desk.features.map(f => '<div class="feature-chip">' + f + '</div>').join('');
  document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('bookBtn').classList.remove('ready');
  document.getElementById('deskPanel').classList.add('open');

  // Highlight desk
  document.querySelectorAll('.desk-cell').forEach(c => c.classList.remove('selected'));
  const cells = document.querySelectorAll('.desk-cell');
  const idx = desks.indexOf(desk);
  if (idx >= 0) cells[idx].classList.add('selected');
  resetIdleTimer();
}

function closePanel() {
  document.getElementById('deskPanel').classList.remove('open');
  document.querySelectorAll('.desk-cell').forEach(c => c.classList.remove('selected'));
  selectedDesk = null;
}

function selectDuration(btn, dur) {
  selectedDuration = dur;
  document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('bookBtn').classList.add('ready');
  resetIdleTimer();
}

function bookDesk() {
  if (!selectedDesk || !selectedDuration) return;

  const now = new Date();
  let until = new Date(now);
  if (selectedDuration === '2hr') until.setHours(now.getHours() + 2);
  else if (selectedDuration === 'half') until.setHours(now.getHours() + 4);
  else until.setHours(17, 0, 0, 0);

  document.getElementById('confirmDesk').textContent = selectedDesk.id;
  document.getElementById('confirmName').textContent = 'John Smith';
  document.getElementById('confirmUntil').textContent = until.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

  // Mark desk as reserved
  selectedDesk.status = 'reserved';
  renderDesks();
  closePanel();

  document.getElementById('confirmOverlay').classList.add('show');
  document.getElementById('occupiedCount').textContent = desks.filter(d => d.status !== 'available').length;
}

function resetKiosk() {
  document.getElementById('confirmOverlay').classList.remove('show');
  closePanel();
  initDesks();
  resetIdleTimer();
}

initDesks();

// Clock
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Idle timer
function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => resetKiosk(), IDLE_TIMEOUT);
}
['pointerdown', 'pointermove', 'keydown'].forEach(evt =>
  document.addEventListener(evt, resetIdleTimer, { passive: true })
);

// Touch ripple
document.addEventListener('pointerdown', e => {
  const btn = e.target.closest('.desk-cell.available, .duration-btn, .book-btn, .done-btn');
  if (!btn) return;
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size / 2) + 'px';
  r.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

// Fullscreen on first touch
let fsRequested = false;
document.addEventListener('pointerdown', () => {
  if (!fsRequested && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
    fsRequested = true;
  }
}, { once: true });
</script>
</body>
</html>
