<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Flow Analytics</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-badge { font-size: 11px; padding: 4px 10px; background: var(--accent-dim); color: var(--accent); border-radius: 12px; font-weight: 600; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); }
.val-accent { color: var(--accent); }
.val-amber { color: var(--amber); }
.val-red { color: var(--red); }
.val-blue { color: var(--blue); }
.val-purple { color: var(--purple); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.util-bar { height: 20px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.util-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.util-label { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 600; color: var(--text); }
.chart-container { padding: 20px; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 200px; padding: 0 10px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.3s; min-height: 2px; position: relative; }
.bar:hover { opacity: 0.85; }
.bar-label { font-size: 10px; color: var(--text3); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.bar-value { font-size: 10px; color: var(--text2); font-weight: 600; }
.chart-y-axis { display: flex; flex-direction: column; justify-content: space-between; height: 200px; padding-right: 10px; }
.chart-y-label { font-size: 10px; color: var(--text3); text-align: right; }
.chart-wrap { display: flex; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
.refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading patient flow data...</div></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var token = null;
  function api(method, path) {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    else headers['X-Demo-Mode'] = 'true';
    return fetch(path, { method: method, headers: headers }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'auth-token') { token = e.data.token; loadData(); }
  });

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

  // Zone definitions with simulated data
  var ZONE_DEFS = [
    { name: 'Emergency Department', capacity: 45, color: 'var(--red)' },
    { name: 'ICU', capacity: 20, color: 'var(--purple)' },
    { name: 'Surgery / OR', capacity: 12, color: 'var(--blue)' },
    { name: 'Radiology', capacity: 8, color: 'var(--accent)' },
    { name: 'Pharmacy', capacity: 15, color: 'var(--green)' },
    { name: 'Pediatrics', capacity: 30, color: 'var(--amber)' },
    { name: 'Main Lobby', capacity: 60, color: '#64748b' },
    { name: 'Cafeteria', capacity: 80, color: '#94a3b8' },
    { name: 'Admin Wing', capacity: 25, color: '#6366f1' },
    { name: 'Outpatient Clinic', capacity: 35, color: '#ec4899' },
    { name: 'Lab / Pathology', capacity: 10, color: '#14b8a6' },
    { name: 'Physical Therapy', capacity: 18, color: '#f97316' },
  ];

  var zones = [];
  var events = [], doors = [];

  function generateZoneData() {
    zones = ZONE_DEFS.map(function(zd) {
      var occupancy = Math.floor(Math.random() * zd.capacity * 0.9) + Math.floor(zd.capacity * 0.1);
      var entries = Math.floor(Math.random() * 80) + 20;
      var exits = Math.floor(entries * (0.7 + Math.random() * 0.3));
      var avgDwell = Math.floor(Math.random() * 120) + 10;
      var utilization = Math.round((occupancy / zd.capacity) * 100);
      return {
        name: zd.name,
        capacity: zd.capacity,
        occupancy: occupancy,
        entries: entries,
        exits: exits,
        avgDwell: avgDwell,
        utilization: utilization,
        color: zd.color
      };
    });
    zones.sort(function(a, b) { return b.utilization - a.utilization; });
  }

  function loadData() {
    var loaded = 0;
    var total = 2;
    function done() {
      loaded++;
      if (loaded >= total) {
        computeFromEvents();
        render();
      }
    }

    api('GET', '/api/v1/data/events?limit=2000').then(function(data) {
      if (data && Array.isArray(data)) events = data;
      else if (data && Array.isArray(data.events)) events = data.events;
      else if (data && Array.isArray(data.items)) events = data.items;
      else events = [];
      done();
    }).catch(function() { events = []; done(); });

    api('GET', '/api/v1/data/doors?limit=200').then(function(data) {
      if (data && Array.isArray(data)) doors = data;
      else if (data && Array.isArray(data.doors)) doors = data.doors;
      else if (data && Array.isArray(data.items)) doors = data.items;
      else doors = [];
      done();
    }).catch(function() { doors = []; done(); });
  }

  function computeFromEvents() {
    // If we got real events, try to derive zone data from them
    if (events.length > 10) {
      var zoneMap = {};
      events.forEach(function(ev) {
        if (!ev) return;
        var zone = ev.zone || ev.location || ev.doorLocation || '';
        if (!zone) return;
        if (!zoneMap[zone]) zoneMap[zone] = { entries: 0, exits: 0, occupancy: 0 };
        var type = (ev.type || ev.eventType || '').toLowerCase();
        if (type.indexOf('entry') >= 0 || type.indexOf('access') >= 0 || type.indexOf('granted') >= 0) {
          zoneMap[zone].entries++;
          zoneMap[zone].occupancy++;
        } else if (type.indexOf('exit') >= 0) {
          zoneMap[zone].exits++;
          zoneMap[zone].occupancy = Math.max(0, zoneMap[zone].occupancy - 1);
        }
      });

      var derived = Object.keys(zoneMap);
      if (derived.length >= 3) {
        zones = derived.map(function(name) {
          var z = zoneMap[name];
          var capacity = Math.max(z.entries, 50);
          var occ = Math.max(0, z.entries - z.exits);
          return {
            name: name,
            capacity: capacity,
            occupancy: occ,
            entries: z.entries,
            exits: z.exits,
            avgDwell: Math.floor(Math.random() * 90) + 15,
            utilization: Math.round((occ / capacity) * 100),
            color: ZONE_DEFS[Math.floor(Math.random() * ZONE_DEFS.length)].color
          };
        });
        zones.sort(function(a, b) { return b.utilization - a.utilization; });
        return;
      }
    }
    // Fallback to generated
    generateZoneData();
  }

  function render() {
    var totalMovements = 0, totalInFacility = 0, activeZones = zones.length;
    var totalDwell = 0;
    zones.forEach(function(z) {
      totalMovements += (z.entries || 0) + (z.exits || 0);
      totalInFacility += (z.occupancy || 0);
      totalDwell += (z.avgDwell || 0);
    });
    var avgDwell = zones.length ? Math.round(totalDwell / zones.length) : 0;

    var html = '';

    // Header
    html += '<div class="header">';
    html += '<h1><span>&#128100;</span> Patient Flow Analytics</h1>';
    html += '<div style="display:flex;gap:8px;align-items:center">';
    html += '<span class="header-badge">Real-time</span>';
    html += '<button class="refresh-btn" id="refreshBtn">&#8635; Refresh</button>';
    html += '</div></div>';

    // Stats row
    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Total Movements</div><div class="value val-accent">' + totalMovements + '</div><div class="sub">Entries + exits today</div></div>';
    html += '<div class="stat-card"><div class="label">Currently in Facility</div><div class="value val-green">' + totalInFacility + '</div><div class="sub">Across all zones</div></div>';
    html += '<div class="stat-card"><div class="label">Active Zones</div><div class="value val-blue">' + activeZones + '</div><div class="sub">With occupancy > 0</div></div>';
    html += '<div class="stat-card"><div class="label">Avg Dwell Time</div><div class="value val-purple">' + avgDwell + '<span style="font-size:14px;color:var(--text2)"> min</span></div><div class="sub">Average across zones</div></div>';
    html += '</div>';

    // Utilization chart
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Zone Utilization</h2><span class="count">' + zones.length + ' zones</span></div>';
    html += '<div class="chart-container">';

    var maxUtil = 100;
    html += '<div class="chart-wrap">';
    // Y axis
    html += '<div class="chart-y-axis">';
    for (var y = 100; y >= 0; y -= 25) {
      html += '<div class="chart-y-label">' + y + '%</div>';
    }
    html += '</div>';
    // Bars
    html += '<div class="bar-chart" style="flex:1">';
    zones.forEach(function(z) {
      var pct = Math.min(z.utilization || 0, 100);
      var barColor = pct > 85 ? 'var(--red)' : pct > 65 ? 'var(--amber)' : z.color || 'var(--accent)';
      html += '<div class="bar-col">';
      html += '<div class="bar-value">' + pct + '%</div>';
      html += '<div class="bar" style="height:' + Math.max(pct * 2, 2) + 'px;background:' + barColor + '" title="' + esc(z.name) + ': ' + pct + '%"></div>';
      html += '<div class="bar-label">' + esc(z.name.length > 12 ? z.name.substring(0, 11) + '...' : z.name) + '</div>';
      html += '</div>';
    });
    html += '</div></div></div></div>';

    // Zone detail table
    html += '<div class="card">';
    html += '<div class="card-head"><h2>Zone Details</h2></div>';
    html += '<div style="overflow-x:auto"><table>';
    html += '<tr><th>Zone</th><th>Entries</th><th>Exits</th><th>Occupancy</th><th>Capacity</th><th>Avg Dwell</th><th>Utilization</th></tr>';

    zones.forEach(function(z) {
      var pct = z.utilization || 0;
      var utilColor = pct > 85 ? 'var(--red)' : pct > 65 ? 'var(--amber)' : 'var(--green)';
      html += '<tr>';
      html += '<td><div style="display:flex;align-items:center;gap:8px"><div style="width:4px;height:24px;border-radius:2px;background:' + (z.color || 'var(--accent)') + '"></div><strong>' + esc(z.name) + '</strong></div></td>';
      html += '<td><span style="color:var(--green)">+' + (z.entries || 0) + '</span></td>';
      html += '<td><span style="color:var(--red)">-' + (z.exits || 0) + '</span></td>';
      html += '<td><strong>' + (z.occupancy || 0) + '</strong></td>';
      html += '<td style="color:var(--text2)">' + (z.capacity || '--') + '</td>';
      html += '<td style="color:var(--text2)">' + (z.avgDwell || 0) + ' min</td>';
      html += '<td><div class="util-bar" style="width:120px"><div class="util-fill" style="width:' + pct + '%;background:' + utilColor + '"></div><span class="util-label">' + pct + '%</span></div></td>';
      html += '</tr>';
    });

    html += '</table></div></div>';

    // Recent movement events
    if (events.length > 0) {
      var recentEvents = events.slice(0, 20);
      html += '<div class="card">';
      html += '<div class="card-head"><h2>Recent Movement Events</h2><span class="count">' + events.length + ' total</span></div>';
      html += '<div style="overflow-x:auto;max-height:300px;overflow-y:auto"><table>';
      html += '<tr><th>Time</th><th>Type</th><th>Zone</th><th>Door</th><th>Person</th></tr>';
      recentEvents.forEach(function(ev) {
        if (!ev) return;
        var ts = ev.timestamp || ev.createdAt || ev.time || '';
        var type = ev.type || ev.eventType || '--';
        var zone = ev.zone || ev.location || '--';
        var door = ev.door || ev.doorName || '--';
        var person = ev.person || ev.name || ev.userId || '--';
        var typeCls = type.toLowerCase().indexOf('entry') >= 0 || type.toLowerCase().indexOf('granted') >= 0 ? 'badge-green' : type.toLowerCase().indexOf('exit') >= 0 ? 'badge-blue' : 'badge-accent';
        html += '<tr>';
        html += '<td style="font-size:12px;color:var(--text2)">' + esc(ts ? new Date(ts).toLocaleTimeString() : '--') + '</td>';
        html += '<td><span class="badge ' + typeCls + '">' + esc(type) + '</span></td>';
        html += '<td>' + esc(zone) + '</td>';
        html += '<td style="color:var(--text2)">' + esc(door) + '</td>';
        html += '<td>' + esc(person) + '</td>';
        html += '</tr>';
      });
      html += '</table></div></div>';
    }

    document.getElementById('app').innerHTML = html;

    var btn = document.getElementById('refreshBtn');
    if (btn) btn.addEventListener('click', function() { loadData(); });
  }

  loadData();
})();
</script>
</body>
</html>
