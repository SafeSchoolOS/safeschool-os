<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move In / Move Out</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #252540; --border: #2a2a45;
  --text: #e4e6f0; --text2: #8b8da3; --text3: #5a5c72;
  --accent: #0891b2; --accent-hover: #06b6d4; --accent-dim: rgba(8,145,178,0.15);
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; padding: 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.val-green { color: var(--green); } .val-accent { color: var(--accent); } .val-amber { color: var(--amber); } .val-red { color: var(--red); } .val-blue { color: var(--blue); } .val-purple { color: var(--purple); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head h2 { font-size: 14px; font-weight: 600; }
.card-head .count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg3); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-gray { background: var(--bg3); color: var(--text3); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.btn { background: var(--accent); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
.checklist { padding: 16px 20px; }
.checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.checklist-item:last-child { border-bottom: none; }
.check-box { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; font-size: 12px; }
.check-box.checked { background: var(--green); border-color: var(--green); color: #fff; }
.check-box.pending { background: var(--amber); border-color: var(--amber); color: #000; }
.timeline-card { padding: 20px; }
.tl-item { display: flex; gap: 16px; position: relative; padding-bottom: 20px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before { content: ''; position: absolute; left: 15px; top: 32px; bottom: 0; width: 2px; background: var(--border); }
.tl-item:last-child::before { display: none; }
.tl-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; z-index: 1; }
.tl-dot.move-in { background: rgba(34,197,94,0.2); }
.tl-dot.move-out { background: rgba(239,68,68,0.2); }
.tl-content { flex: 1; }
.tl-title { font-size: 13px; font-weight: 600; }
.tl-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.tl-badges { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
.cred-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 8px 20px 20px; }
.cred-panel h4 { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.cred-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12px; }
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  try {
    var params = new URLSearchParams(location.search);
    var accent = params.get('accent');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '22');
    }
  } catch(e) {}

  var now = new Date();

  var moveInChecklist = [
    { id: 'lease', label: 'Lease signed & filed', icon: '\u{1F4DD}' },
    { id: 'keys', label: 'Keys / fobs issued', icon: '\u{1F511}' },
    { id: 'parking', label: 'Parking space assigned', icon: '\u{1F697}' },
    { id: 'amenity', label: 'Amenity access activated', icon: '\u{1F3CA}' },
    { id: 'welcome', label: 'Welcome packet delivered', icon: '\u{1F4E6}' },
    { id: 'utility', label: 'Utility transfer confirmed', icon: '\u{26A1}' },
    { id: 'badge', label: 'Access badge provisioned', icon: '\u{1F4B3}' },
    { id: 'mailbox', label: 'Mailbox key issued', icon: '\u{1F4EC}' },
  ];

  var moveOutChecklist = [
    { id: 'keys-return', label: 'Keys / fobs returned', icon: '\u{1F511}' },
    { id: 'inspection', label: 'Unit inspection completed', icon: '\u{1F50D}' },
    { id: 'deposit', label: 'Security deposit processed', icon: '\u{1F4B0}' },
    { id: 'access-revoke', label: 'All access revoked', icon: '\u{1F6AB}' },
    { id: 'forwarding', label: 'Forwarding address collected', icon: '\u{1F4E8}' },
    { id: 'badge-deactivate', label: 'Badge deactivated', icon: '\u{1F4B3}' },
    { id: 'parking-release', label: 'Parking spot released', icon: '\u{1F697}' },
    { id: 'final-bill', label: 'Final utility bill settled', icon: '\u{1F4B5}' },
  ];

  var moves = [
    { id: 'MOV-001', unit: '4B', tenant: 'Sarah Mitchell', type: 'Move In', date: new Date(now.getTime() + 86400000 * 2), status: 'Scheduled', elevator: true, dock: true, completed: ['lease','keys'], pending: ['parking','amenity','welcome','utility','badge','mailbox'] },
    { id: 'MOV-002', unit: '11A', tenant: 'James Whitfield', type: 'Move Out', date: new Date(now.getTime() + 86400000 * 5), status: 'Scheduled', elevator: true, dock: false, completed: ['forwarding'], pending: ['keys-return','inspection','deposit','access-revoke','badge-deactivate','parking-release','final-bill'] },
    { id: 'MOV-003', unit: '7C', tenant: 'Lisa Park', type: 'Move In', date: new Date(now.getTime() - 86400000), status: 'In Progress', elevator: true, dock: true, completed: ['lease','keys','parking','welcome','badge'], pending: ['amenity','utility','mailbox'] },
    { id: 'MOV-004', unit: '3D', tenant: 'Robert Chen', type: 'Move Out', date: now, status: 'In Progress', elevator: false, dock: true, completed: ['keys-return','inspection','access-revoke','badge-deactivate','parking-release'], pending: ['deposit','forwarding','final-bill'] },
    { id: 'MOV-005', unit: '9A', tenant: 'Emily Watson', type: 'Move In', date: new Date(now.getTime() + 86400000 * 10), status: 'Scheduled', elevator: true, dock: true, completed: ['lease'], pending: ['keys','parking','amenity','welcome','utility','badge','mailbox'] },
    { id: 'MOV-006', unit: '15B', tenant: 'Michael Torres', type: 'Move Out', date: new Date(now.getTime() + 86400000 * 15), status: 'Scheduled', elevator: false, dock: false, completed: [], pending: ['keys-return','inspection','deposit','access-revoke','forwarding','badge-deactivate','parking-release','final-bill'] },
    { id: 'MOV-007', unit: '2C', tenant: 'Anna Rodriguez', type: 'Move In', date: new Date(now.getTime() - 86400000 * 3), status: 'Completed', elevator: true, dock: true, completed: ['lease','keys','parking','amenity','welcome','utility','badge','mailbox'], pending: [] },
    { id: 'MOV-008', unit: '12D', tenant: 'Kevin Park', type: 'Move Out', date: new Date(now.getTime() - 86400000 * 5), status: 'Completed', elevator: true, dock: false, completed: ['keys-return','inspection','deposit','access-revoke','forwarding','badge-deactivate','parking-release','final-bill'], pending: [] },
    { id: 'MOV-009', unit: '6A', tenant: 'Rachel Kim', type: 'Move In', date: new Date(now.getTime() + 86400000 * 22), status: 'Scheduled', elevator: true, dock: true, completed: [], pending: ['lease','keys','parking','amenity','welcome','utility','badge','mailbox'] },
    { id: 'MOV-010', unit: '8C', tenant: 'David Nguyen', type: 'Move Out', date: new Date(now.getTime() + 86400000 * 28), status: 'Scheduled', elevator: false, dock: true, completed: [], pending: ['keys-return','inspection','deposit','access-revoke','forwarding','badge-deactivate','parking-release','final-bill'] },
  ];

  var selectedMove = null;
  var currentTab = 'overview';

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function dateStr(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

  function statusBadge(s) {
    if (s === 'Completed') return '<span class="badge badge-green">Completed</span>';
    if (s === 'In Progress') return '<span class="badge badge-blue">In Progress</span>';
    if (s === 'Scheduled') return '<span class="badge badge-amber">Scheduled</span>';
    return '<span class="badge badge-gray">' + esc(s) + '</span>';
  }
  function typeBadge(t) {
    return t === 'Move In' ? '<span class="badge badge-green">Move In</span>' : '<span class="badge badge-red">Move Out</span>';
  }

  function render() {
    var moveIns = moves.filter(function(m){ return m.type === 'Move In'; }).length;
    var moveOuts = moves.filter(function(m){ return m.type === 'Move Out'; }).length;
    var inProgress = moves.filter(function(m){ return m.status === 'In Progress'; }).length;
    var upcoming = moves.filter(function(m){ return m.status === 'Scheduled'; }).length;

    var html = '<div class="header"><h1><span>Move In</span> / Move Out</h1></div>';

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="label">Move Ins</div><div class="value val-green">' + moveIns + '</div><div class="sub">Total scheduled & completed</div></div>';
    html += '<div class="stat-card"><div class="label">Move Outs</div><div class="value val-red">' + moveOuts + '</div><div class="sub">Total scheduled & completed</div></div>';
    html += '<div class="stat-card"><div class="label">In Progress</div><div class="value val-blue">' + inProgress + '</div><div class="sub">Currently active</div></div>';
    html += '<div class="stat-card"><div class="label">Upcoming</div><div class="value val-amber">' + upcoming + '</div><div class="sub">Next 30 days</div></div>';
    html += '</div>';

    html += '<div class="tab-bar">';
    html += '<button class="tab-btn' + (currentTab==='overview'?' active':'') + '" onclick="switchTab(\'overview\')">All Moves</button>';
    html += '<button class="tab-btn' + (currentTab==='timeline'?' active':'') + '" onclick="switchTab(\'timeline\')">Timeline</button>';
    html += '<button class="tab-btn' + (currentTab==='credentials'?' active':'') + '" onclick="switchTab(\'credentials\')">Credentials</button>';
    html += '</div>';

    if (currentTab === 'overview') html += renderOverview();
    else if (currentTab === 'timeline') html += renderTimeline();
    else if (currentTab === 'credentials') html += renderCredentials();

    document.getElementById('app').innerHTML = html;
  }

  function renderOverview() {
    var html = '<div class="card"><div class="card-head"><h2>Active Moves</h2><span class="count">' + moves.length + ' total</span></div>';
    html += '<div style="padding:0;overflow-x:auto"><table><thead><tr><th>ID</th><th>Unit</th><th>Tenant</th><th>Type</th><th>Date</th><th>Status</th><th>Elevator</th><th>Dock</th><th>Progress</th><th>Actions</th></tr></thead><tbody>';

    moves.forEach(function(m) {
      var checklist = m.type === 'Move In' ? moveInChecklist : moveOutChecklist;
      var total = checklist.length;
      var done = m.completed.length;
      var pct = Math.round((done / total) * 100);

      html += '<tr>';
      html += '<td style="color:var(--text3);font-size:12px">' + esc(m.id) + '</td>';
      html += '<td><strong>' + esc(m.unit) + '</strong></td>';
      html += '<td>' + esc(m.tenant) + '</td>';
      html += '<td>' + typeBadge(m.type) + '</td>';
      html += '<td>' + dateStr(m.date) + '</td>';
      html += '<td>' + statusBadge(m.status) + '</td>';
      html += '<td>' + (m.elevator ? '<span class="badge badge-green">Reserved</span>' : '<span class="badge badge-gray">No</span>') + '</td>';
      html += '<td>' + (m.dock ? '<span class="badge badge-green">Reserved</span>' : '<span class="badge badge-gray">No</span>') + '</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px"><div style="width:60px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:' + (pct===100?'var(--green)':'var(--accent)') + ';border-radius:3px"></div></div><span style="font-size:11px;color:var(--text3)">' + pct + '%</span></div></td>';
      html += '<td><button class="btn btn-sm btn-outline" onclick="viewMove(\'' + m.id + '\')">Details</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';

    // Detail panel if selected
    if (selectedMove) {
      var m = selectedMove;
      var checklist = m.type === 'Move In' ? moveInChecklist : moveOutChecklist;

      html += '<div class="grid-2">';
      html += '<div class="card"><div class="card-head"><h2>' + esc(m.type) + ' Checklist &mdash; Unit ' + esc(m.unit) + '</h2><span class="count">' + esc(m.tenant) + '</span></div>';
      html += '<div class="checklist">';
      checklist.forEach(function(item) {
        var done = m.completed.indexOf(item.id) >= 0;
        html += '<div class="checklist-item">';
        html += '<div class="check-box ' + (done ? 'checked' : '') + '" onclick="toggleCheck(\'' + m.id + '\',\'' + item.id + '\')">' + (done ? '\u2713' : '') + '</div>';
        html += '<span>' + item.icon + ' ' + esc(item.label) + '</span>';
        html += '</div>';
      });
      html += '</div></div>';

      // Move details
      html += '<div class="card"><div class="card-head"><h2>Move Details</h2></div><div style="padding:20px">';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">Unit</span><span>' + esc(m.unit) + '</span></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">Tenant</span><span>' + esc(m.tenant) + '</span></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">Date</span><span>' + dateStr(m.date) + '</span></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">Status</span><span>' + statusBadge(m.status) + '</span></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3)">Elevator</span><span>' + (m.elevator ? 'Reserved (Elev A, 8AM-12PM)' : 'Not reserved') + '</span></div>';
      html += '<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px"><span style="color:var(--text3)">Loading Dock</span><span>' + (m.dock ? 'Reserved' : 'Not reserved') + '</span></div>';

      html += '<div style="margin-top:16px;display:flex;gap:8px">';
      if (m.status === 'Scheduled') html += '<button class="btn btn-sm" onclick="startMove(\'' + m.id + '\')">Start Move</button>';
      if (m.status === 'In Progress') html += '<button class="btn btn-sm" onclick="completeMove(\'' + m.id + '\')">Mark Complete</button>';
      html += '<button class="btn btn-sm btn-outline" onclick="selectedMove=null;render()">Close</button>';
      html += '</div>';
      html += '</div></div>';
      html += '</div>';
    }

    return html;
  }

  function renderTimeline() {
    var sorted = moves.slice().sort(function(a,b){ return a.date - b.date; });
    var html = '<div class="card"><div class="card-head"><h2>Upcoming Moves &mdash; Next 30 Days</h2></div>';
    html += '<div class="timeline-card">';
    sorted.forEach(function(m) {
      var isIn = m.type === 'Move In';
      html += '<div class="tl-item">';
      html += '<div class="tl-dot ' + (isIn ? 'move-in' : 'move-out') + '">' + (isIn ? '\u2B06' : '\u2B07') + '</div>';
      html += '<div class="tl-content">';
      html += '<div class="tl-title">' + esc(m.tenant) + ' &mdash; Unit ' + esc(m.unit) + '</div>';
      html += '<div class="tl-meta">' + dateStr(m.date) + '</div>';
      html += '<div class="tl-badges">' + typeBadge(m.type) + ' ' + statusBadge(m.status);
      if (m.elevator) html += ' <span class="badge badge-accent">Elevator</span>';
      if (m.dock) html += ' <span class="badge badge-accent">Loading Dock</span>';
      html += '</div>';
      html += '</div></div>';
    });
    html += '</div></div>';
    return html;
  }

  function renderCredentials() {
    var html = '<div class="card"><div class="card-head"><h2>Credential Provisioning</h2><span class="count">Auto-managed on move in/out</span></div>';

    // Move-ins needing badge provisioning
    var needBadge = moves.filter(function(m){ return m.type === 'Move In' && m.completed.indexOf('badge') < 0 && m.status !== 'Completed'; });
    var needRevoke = moves.filter(function(m){ return m.type === 'Move Out' && m.completed.indexOf('badge-deactivate') < 0 && m.status !== 'Completed'; });

    html += '<div class="cred-panel"><h4>Badges to Provision (' + needBadge.length + ')</h4>';
    if (needBadge.length === 0) {
      html += '<div style="color:var(--text3);font-size:12px;padding:8px 0">All move-in badges provisioned</div>';
    } else {
      needBadge.forEach(function(m) {
        html += '<div class="cred-row"><span>' + esc(m.tenant) + ' &mdash; Unit ' + esc(m.unit) + '</span>';
        html += '<button class="btn btn-sm" onclick="provisionBadge(\'' + m.id + '\')">Provision Badge</button></div>';
      });
    }
    html += '</div>';

    html += '<div class="cred-panel"><h4>Badges to Revoke (' + needRevoke.length + ')</h4>';
    if (needRevoke.length === 0) {
      html += '<div style="color:var(--text3);font-size:12px;padding:8px 0">All move-out badges revoked</div>';
    } else {
      needRevoke.forEach(function(m) {
        html += '<div class="cred-row"><span>' + esc(m.tenant) + ' &mdash; Unit ' + esc(m.unit) + '</span>';
        html += '<button class="btn btn-sm" style="background:var(--red)" onclick="revokeBadge(\'' + m.id + '\')">Revoke Badge</button></div>';
      });
    }
    html += '</div>';

    // Recent credential activity
    html += '<div style="padding:20px"><h4 style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px">Recent Credential Activity</h4>';
    var activity = [
      { time: '2 hours ago', action: 'Badge provisioned', tenant: 'Lisa Park', unit: '7C', type: 'provision' },
      { time: '1 day ago', action: 'Access revoked', tenant: 'Robert Chen', unit: '3D', type: 'revoke' },
      { time: '3 days ago', action: 'Badge provisioned', tenant: 'Anna Rodriguez', unit: '2C', type: 'provision' },
      { time: '5 days ago', action: 'Access revoked', tenant: 'Kevin Park', unit: '12D', type: 'revoke' },
    ];
    activity.forEach(function(a) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">';
      html += '<div><span style="color:' + (a.type==='provision'?'var(--green)':'var(--red)') + ';font-weight:600">' + esc(a.action) + '</span> &mdash; ' + esc(a.tenant) + ' (Unit ' + esc(a.unit) + ')</div>';
      html += '<span style="color:var(--text3)">' + esc(a.time) + '</span></div>';
    });
    html += '</div></div>';
    return html;
  }

  window.switchTab = function(t) { currentTab = t; render(); };
  window.viewMove = function(id) {
    selectedMove = moves.find(function(m){ return m.id === id; }) || null;
    render();
  };
  window.toggleCheck = function(moveId, itemId) {
    var m = moves.find(function(x){ return x.id === moveId; });
    if (!m) return;
    var idx = m.completed.indexOf(itemId);
    if (idx >= 0) {
      m.completed.splice(idx, 1);
      m.pending.push(itemId);
    } else {
      m.completed.push(itemId);
      var pi = m.pending.indexOf(itemId);
      if (pi >= 0) m.pending.splice(pi, 1);
    }
    render();
  };
  window.startMove = function(id) {
    var m = moves.find(function(x){ return x.id === id; });
    if (m) m.status = 'In Progress';
    render();
  };
  window.completeMove = function(id) {
    var m = moves.find(function(x){ return x.id === id; });
    if (m) m.status = 'Completed';
    render();
  };
  window.provisionBadge = function(id) {
    var m = moves.find(function(x){ return x.id === id; });
    if (m && m.completed.indexOf('badge') < 0) { m.completed.push('badge'); var pi = m.pending.indexOf('badge'); if (pi >= 0) m.pending.splice(pi, 1); }
    render();
  };
  window.revokeBadge = function(id) {
    var m = moves.find(function(x){ return x.id === id; });
    if (m && m.completed.indexOf('badge-deactivate') < 0) { m.completed.push('badge-deactivate'); var pi = m.pending.indexOf('badge-deactivate'); if (pi >= 0) m.pending.splice(pi, 1); }
    render();
  };

  render();
})();
</script>
</body>
</html>
