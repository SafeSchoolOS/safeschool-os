name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Build all packages
        run: npx turbo run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_ENV: test
      EDGERUNTIME_HMAC_SECRET: test-hmac-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Build packages
        run: npx turbo run build

      - name: Run tests
        run: npx turbo run test

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --omit=dev
